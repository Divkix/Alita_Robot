name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release with v prefix (e.g., v2.19.4)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-ci-checks:
    name: Release CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@v2.27.1
        with:
          args: -no-fail ./...

      - name: Run vulnerability check
        continue-on-error: true
        uses: golang/govulncheck-action@v1

      - name: Test release build
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o alita_robot .
          if [ ! -f alita_robot ]; then
            echo "Build failed"
            exit 1
          fi
          echo "Build successful"

  goreleaser:
    name: Release with GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [release-ci-checks]
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Resolve release tag
        id: tag
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            tag="v${INPUT_TAG#v}"
          else
            tag="$REF_NAME"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::tag '$tag' must be vMAJOR.MINOR.PATCH[-prerelease]" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      - name: Bump bot version
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          bash scripts/bump_version.sh "$TAG"
          if [ -n "$(git status --porcelain)" ]; then
            git commit -am "chore(release): set BotVersion to ${TAG}"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          else
            echo "BotVersion already at ${TAG}; nothing to commit"
          fi

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping creation"
          else
            echo "Creating tag $TAG"
            git tag -a "$TAG" -m "Release $TAG"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$TAG"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Clean up existing release (handle tag moves)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" &>/dev/null 2>&1; then
            echo "Existing release for $TAG found, deleting before recreate..."
            gh release delete "$TAG" --yes
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.13.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: dist/*
          retention-days: 7

  attest-artifacts:
    name: Attest Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [goreleaser]
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: ./artifacts

      - name: Attest artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "./artifacts/*"

  post-release-scan:
    name: Post-Release Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [goreleaser]
    if: always() && needs.goreleaser.result == 'success'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/divkix/alita_robot:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Release notification
        run: |
          echo "Release completed successfully!"
          echo "Artifacts published to GitHub Releases"
          echo "Docker images available at ghcr.io/divkix/alita_robot"
