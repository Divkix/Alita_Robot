schema: spec-driven

context: |
  Go 1.25+ Telegram group management bot using gotgbot/v2.
  Stack: PostgreSQL (GORM), Redis (gocache), OpenTelemetry, Prometheus, logrus.
  Build: GoReleaser v2, multi-arch Docker to ghcr.io, golangci-lint.
  CI: GitHub Actions (gosec, govulncheck, golangci-lint, multi-arch Docker).
  Structure: alita/{modules,db,utils,i18n,config}, migrations/, locales/, docs/ (Astro).
  Conventions: conventional commits, snake_case files, goimports 3-group ordering, strict TDD (red-green-refactor).
  Testing: standard Go testing package, parallel tests, 10m timeout.
  i18n: embedded YAML locales (en, es, fr, hi) with named-to-positional param mapping.

rules:
  proposal:
    - Always include a "Non-goals" section
    - Reference affected modules by path
  tasks:
    - Break tasks into chunks of max 2 hours
    - Include test criteria for each task
