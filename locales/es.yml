disabling_help_msg:
  "Este módulo te permite deshabilitar algunos comandos comúnmente usados,
  Así, nadie puede usarlos. También te permitirá eliminarlos automáticamente, deteniendo a la gente
  de enviar texto azul.


  *Comandos de administrador*:

  × /disable `<nombre del comando>`: Evitar que los usuarios usen el nombre del comando en este grupo.

  × /enable `<nombre del elemento>`: Permitir a los usuarios usar el nombre del comando en este grupo.

  × /disableable: Listar todos los comandos deshabilitables.

  × /disabledel `<yes/no/on/off>`: Eliminar comandos deshabilitados cuando sean usados por no administradores.

  × /disabled: Listar los comandos deshabilitados en este chat.


  Nota:

  Al deshabilitar un comando, el comando solo se deshabilita para no administradores. Todos los administradores
  aún pueden usar esos comandos.

  Los comandos deshabilitados siguen siendo accesibles a través de la función /connect. Si estuvieras
  interesado en ver esto también deshabilitado, házmelo saber en el chat de soporte."
filters_help_msg:
  "Los filtros no distinguen mayúsculas y minúsculas; cada vez que alguien diga tus palabras
  disparadoras, ¡Alita responderá algo más! Esto se puede usar para crear tus comandos,
  si lo deseas.


  Comandos:

  - /filter <disparador> <respuesta>: Cada vez que alguien diga disparador, el bot responderá
  con la oración. Para filtros de múltiples palabras, cita el disparador.

  - /filters: Listar todos los filtros del chat.

  - /stop <disparador>: Detener al bot de responder al disparador.

  - /stopall: Detener TODOS los filtros en el chat actual. Esta acción no se puede deshacer.


  Ejemplos:

  - Establecer un filtro:

  -> /filter hola ¡Hola! ¿Cómo estás?

  - Establecer un filtro de múltiples palabras:

  -> /filter hola amigo ¡Hola de vuelta! ¡Hace mucho que no te veo!

  - Establecer un filtro que solo puede ser usado por administradores:

  -> /filter ejemplo Este filtro no sucederá si un usuario normal lo dice {admin}

  - Para guardar un archivo, imagen, gif, o cualquier otro adjunto, simplemente responde al archivo
  con:

  -> /filter disparador"
formatting_fillings: "<b>Rellenos</b>


  También puedes personalizar el contenido de tu mensaje con datos contextuales. Por ejemplo,
  ¡podrías mencionar a un usuario por nombre en el mensaje de bienvenida, o mencionarlo en un filtro!

  ¡También puedes usar estos para mencionar a un usuario en notas!


  <b>Rellenos soportados:</b>

  - <code>{first}</code>: El primer nombre del usuario.

  - <code>{last}</code>: El apellido del usuario.

  - <code>{fullname}</code>: El nombre completo del usuario.

  - <code>{username}</code>: El nombre de usuario del usuario. Si no tiene uno, menciona
  al usuario en su lugar.

  - <code>{mention}</code>: Menciona al usuario con su primer nombre.

  - <code>{id}</code>: El ID del usuario.

  - <code>{chatname}</code>: El nombre del chat.

  - <code>{rules}</code>: Añade botón de Reglas al Mensaje.

  - <code>{protect}</code>: Protege el contenido de ser compartido.

  - <code>{preview}</code>: Habilita vistas previas en los mensajes.

  - <code>{nonotif}</code>: Deshabilita la notificación para ese mensaje."
formatting_help_msg: "Alita soporta un gran número de opciones de formato para hacer tus mensajes más expresivos. ¡Echa un vistazo haciendo clic en los botones de abajo!"
formatting_markdown: |
  <b>Formato Markdown</b>

  Puedes formatear tu mensaje usando <b>negrita</b>, <i>cursiva</i>, <u>subrayado</u>,
  y mucho más. ¡Adelante y experimenta!

  <b>Markdown soportado</b>:

  - <code>`palabras código`</code>: Las comillas invertidas se usan para fuentes monoespaciadas. Se muestra como: <code>palabras código</code>.

  - <code>_palabras cursivas_</code>: Los guiones bajos se usan para fuentes cursivas. Se muestra como: <i>palabras cursivas</i>.

  - <code>*palabras negrita*</code>: Los asteriscos se usan para fuentes negrita. Se muestra como: <b>palabras negrita</b>.

  - <code>~tachado~</code>: Las tildes se usan para tachado. Se muestra como: <strike>tachado</strike>.

  - <code>||spoiler||</code>: Las barras verticales dobles se usan para spoilers. Se muestra como: <tg-spoiler>Spoiler</tg-spoiler>.

  - <code>```pre```</code>: Para hacer que el formateador ignore otros caracteres de formato dentro del texto formateado con '```', será como: <code>**negrita** | *negrita*</code>.

  - <code>__subrayado__</code>: Los guiones bajos dobles se usan para subrayados. Se muestra como: subrayado. NOTA: Algunos clientes intentan ser inteligentes e interpretarlo como cursiva. En ese caso, intenta usar el formato incorporado de tu aplicación.

  - <code>[hipervínculo](example.com)</code>: Este es el formato usado para hipervínculos. Se muestra como: <a href='https://example.com/'>hipervínculo</a>.

  - <code>[Mi Botón](buttonurl://example.com)</code>: Este es el formato usado para crear botones. Este ejemplo creará un botón llamado "Mi botón" que abre <code>example.com</code> cuando se hace clic.

  Si deseas enviar botones en la misma fila, usa el formato <code>:same</code>.

  <b>Ejemplo:</b>

  <code>[botón 1](buttonurl:example.com)</code>

  <code>[botón 2](buttonurl://example.com:same)</code>

  <code>[botón 3](buttonurl://example.com)</code>

  Esto mostrará el botón 1 y 2 en la misma línea, con el 3 debajo.
formatting_random: |
  <b>Contenido Aleatorio</b>

  Otra cosa que puede ser divertida, es aleatorizar el contenido de un mensaje. ¡Haz las cosas
  un poco más personales cambiando mensajes de bienvenida, o cambiando notas!

  Cómo usar contenido aleatorio:

  - %%%: Este separador se puede usar para añadir respuestas aleatorias al bot.

  Por ejemplo:

  <code>hola

  %%%

  cómo estás</code>

  Esto elegirá aleatoriamente entre enviar el primer mensaje, "hola", o el segundo
  mensaje, "cómo estás".

  ¡Usa esto para hacer que Alita se sienta un poco más personalizada! (solo funciona en filtros/notas)

  Ejemplo de mensaje de bienvenida:

  - Cada vez que un nuevo usuario se une, se le presentará uno de los tres mensajes
  mostrados aquí.

  -> /filter "hey"

  hola <code>{first}</code>!

  %%%

  Ooooh, <code>{first}</code> ¿cómo estás?

  %%%

  ¿Qué tal? <code>{first}</code>
greetings_help_msg:
  "¡Da la bienvenida a nuevos miembros a tus grupos o despídete después de que
  se vayan!


  *Comandos de Administrador:*

  × /setwelcome `<responder/texto>`: Establece texto de bienvenida para el grupo.

  × /welcome `<yes/no/on/off>`: Habilita o Deshabilita configuración de bienvenida para el grupo.

  × /resetwelcome: Restablece el mensaje de bienvenida al predeterminado.

  × /setgoodbye `<responder/texto>`: Establece texto de despedida para el grupo.

  × /goodbye `<yes/no/on/off>`: Habilita o Deshabilita configuración de despedida para el grupo.

  × /resetgoodbye: Restablece el mensaje de despedida al predeterminado.

  × /cleanservice `<yes/no/on/off>`: Eliminar todos los mensajes de servicio como notificación de 'x se unió
  al grupo'.

  × /cleanwelcome `<yes/no/on/off>`: Eliminar el mensaje de bienvenida antiguo, cuando un nuevo
  miembro se une.

  × /autoapprove `<yes/no/on/off>`: Aprobar automáticamente a todos los nuevos miembros."
help_about:
  "@%s es uno de los administradores de grupos más rápidos y con más funciones.


  Alita ✨ es desarrollado y mantenido activamente por @DivideProjects!


  ¡Alita ha estado en línea desde 2020 y ha servido a miles de grupos con cientos
  de miles de usuarios!


  <b>Por qué Alita:</b>

  - Simple: Uso fácil y compatible con muchos comandos de bot.

  - Con funciones: Muchas funciones que otros bots de administración de grupos no tienen.

  - Rápido: ¿Adivina qué? No está hecho usando Python, usamos <a href='https://go.dev/'>Go</a>
  como nuestro lenguaje de programación principal.


  <b>Versión actual:</b> %s"
help_configuration_step-1: "Bienvenido a la Configuración de Alita


  ¡Lo primero que debes hacer es añadir Alita ✨ a tu grupo! Para hacer eso, presiona el
  botón de abajo y selecciona tu grupo, luego presiona Listo para continuar el tutorial."
help_configuration_step-2: "¡Ok, bien hecho!


  Ahora para dejarme trabajar correctamente, ¡necesitas hacerme Administrador de tu Grupo!

  Para hacer eso, sigue estos sencillos pasos:

  ▫️ Ve a tu grupo

  ▫️ Presiona el nombre del Grupo

  ▫️ Presiona Modificar

  ▫️ Presiona en Administrador

  ▫️ Presiona Añadir Administrador

  ▫️ Presiona la Lupa

  ▫️ Busca @%s

  ▫️ Confirma"
help_configuration_step-3: "¡Excelente!

  ¡Ahora el Bot está listo para usar!

  Todos los comandos se pueden usar con / o !


  Si tienes alguna dificultad configurándome en tu grupo, no dudes
  en venir a @DivideSupport.

  Nos encantaría ayudarte."
help_donatetext: "¿Así que quieres donar? ¡Increíble!

  Cuando donas, todos los fondos van hacia mi desarrollo lo que me hace rápido y
  receptivo.

  Tu donación también podría conseguirme una o dos funciones nuevas, que no pude obtener
  debido a limitaciones del servidor.

  ¡Todos los fondos se destinarían a mis servicios como base de datos, almacenamiento y alojamiento!

  Puedes donar contactando a mi propietario aquí: @DivideProjectsBot"
lang_sample: Español
language_flag: 🇪🇸
language_name: Español
languages_help_msg: "¿No puedes cambiar el idioma del bot?

  ¡Cambia fácilmente usando este módulo!


  Solo escribe /lang y usa el teclado en línea para elegir un idioma para ti o tu
  grupo.


  Puedes ayudarnos a llevar el bot a más idiomas ayudando en [Crowdin](https://crowdin.com/project/alita_robot)"
locks_help_msg: "*Solo administrador*:

  × /lock `<permiso>`: Bloquear permiso del Chat..

  × /unlock `<permiso>`: Desbloquear permiso del Chat.

  × /locks: Ver permisos del Chat.

  × /locktypes: ¡Verificar tipos de bloqueo disponibles!


  Los bloqueos se pueden usar para restringir a los usuarios de un grupo.

  Bloquear URLs eliminará automáticamente todos los mensajes con URLs, bloquear stickers eliminará
  todos los stickers, etc.

  Bloquear bots evitará que los no administradores añadan bots al chat.


  **Ejemplo:**

  `/lock media`: esto bloquea todos los mensajes de medios en el chat."
misc_help_msg:
  "× /info: Obtén tu información de usuario, que se puede usar como respuesta o pasando
  un ID de Usuario o Nombre de usuario.

  × /id: Obtener el id del grupo actual. Si se usa respondiendo a un mensaje, obtener el id de ese usuario.

  × /ping: ¡Hacer ping al Servidor de Telegram!

  × /tr <código de idioma> <msg/responder al mensaje>: Traducir el mensaje.

  × /removebotkeyboard: Elimina el teclado del bot atascado de tu chat.

  × /stat: Obtiene el conteo del número total de mensajes en el chat."
mutes_help_msg:
  "A veces los usuarios pueden ser molestos y podrías querer restringirlos
  de enviar mensajes al chat, este módulo está aquí para ayudar, puedes usar este módulo
  para silenciar miembros en tu grupo.


  *Comandos de Silenciar:* (Solo administrador)

  × /mute <nombre de usuario>: silencia a un usuario, (vía nombre de usuario, o respuesta)

  × /smute <nombre de usuario>: silencia a un usuario silenciosamente, no envía mensaje al grupo,
  y también elimina tu comando. (vía nombre de usuario, o respuesta)

  × /dmute <nombre de usuario>: silencia a un usuario y elimina el mensaje respondido. (vía nombre de usuario,
  o respuesta)

  × /tmute <nombre de usuario> x(m/h/d): silencia a un usuario por `x` tiempo. (vía nombre de usuario, o respuesta).
  m = minutos, h = horas, d = días.

  × /unmute <nombre de usuario>: desilencia a un usuario. (vía nombre de usuario, o respuesta)"
notes_help_msg: '¡Guarda datos para futuros usuarios con notas!

  Las notas son geniales para guardar pedazos aleatorios de información; un número de teléfono, un gif agradable,
  una imagen divertida - ¡cualquier cosa!

  *Comandos de usuario:*

  - /get <nombredenota>: Obtener una nota.

  - #nombredenota: Igual que /get.

  Comandos de administrador:

  - /save <nombredenota> <texto de nota>: Guardar una nueva nota llamada "palabra". Responder a un mensaje
  guardará ese mensaje. ¡Incluso funciona con medios!

  - /clear <nombredenota>: Eliminar la nota asociada.

  - /notes: Listar todas las notas en el chat actual.

  - /saved: Igual que /notes.

  - /clearall: Eliminar TODAS las notas en un chat. Esto no se puede deshacer.

  - /privatenotes: Si enviar o no notas en PM. Enviará un mensaje con un
  botón en el que los usuarios pueden hacer clic para obtener la nota en PM.'
pins_help_msg:
  "Todos los comandos relacionados con anclar se pueden encontrar aquí; mantén tu chat actualizado
  sobre las últimas noticias con un simple mensaje anclado!


  *Comandos de usuario:*

  × /pinned: Obtener el mensaje anclado actual.


  *Comandos de administrador:*

  × /pin: Anclar el mensaje al que respondiste. Añade 'loud' o 'notify' para enviar una notificación
  a los miembros del grupo.

  × /pinned: Obtiene el último mensaje anclado en el Chat actual.

  × /permapin <texto>: Anclar un mensaje personalizado a través del bot. Este mensaje puede contener
  markdown, botones, y todas las demás características geniales.

  × /unpin: Desanclar el mensaje anclado actual. Si se usa como respuesta, desancla el mensaje
  respondido.

  × /unpinall: Desancla todos los mensajes anclados.

  × /antichannelpin <yes/no/on/off>: No dejar que telegram ancle automáticamente canales vinculados.
  Si no se dan argumentos, mostrar la configuración actual.

  × /cleanlinked <yes/no/on/off>: Eliminar mensajes enviados por el canal vinculado.

  Nota: Al usar pines anti canal, asegúrate de usar el comando /unpin, en lugar
  de hacerlo manualmente. De lo contrario, el mensaje antiguo será re-anclado cuando el canal
  envíe cualquier mensaje."
purges_help_msg: "*Solo administrador:*

  - /purge: elimina todos los mensajes entre este y el mensaje respondido.

  - /del: elimina el mensaje al que respondiste.


  *Ejemplos*:

  - Eliminar todos los mensajes desde el mensaje respondido, hasta ahora.

  -> `/purge`"
reports_help_msg:
  "Todos somos personas ocupadas que no tenemos tiempo para monitorear nuestros grupos
  24/7. ¿Pero cómo reaccionas si alguien en tu grupo está haciendo spam?


  × /report `<razón>`: responder a un mensaje para reportarlo a los administradores.

  - @admin: igual que /report pero no es un comando.


  *Solo Administradores:*

  × /reports `<on/off/yes/no>`: cambiar configuración de reporte, o ver estado actual.

  - Si se hace en PM, cambia tu estado.

  - Si en un grupo, cambia el estado de ese grupo.

  × /reports `block` (solo vía respuesta): Bloquear a un usuario de usar /report o @admin.

  × /reports `unblock` (solo vía respuesta): Desbloquear a un usuario de usar /report o @admin.

  × /reports `showblocklist`: Verificar todos los usuarios bloqueados que no pueden usar /report o
  @admin.


  Para reportar a un usuario, simplemente responde a su mensaje con @admin o /report; Natalie
  entonces responderá con un mensaje indicando que los administradores han sido notificados.

  DEBES responder a un mensaje para reportar a un usuario; ¡no puedes usar @admin para etiquetar
  administradores sin razón!


  *NOTA:* Ninguno de estos se activará si es usado por administradores."
rules_help_msg:
  "Cada chat funciona con diferentes reglas; ¡este módulo ayudará a hacer
  esas reglas más claras!

  *Comandos de usuario*:

  × /rules: Verificar las reglas actuales del chat.

  *Comandos de administrador*:

  × /setrules `<texto>`: Establecer las reglas para este chat.

  × /privaterules `<yes/no/on/off>`: Habilitar/deshabilitar si las reglas deben enviarse
  en privado.

  × /resetrules: Restablecer las reglas del chat a predeterminadas

  × /rulesbtn `<texto personalizado>`: Establece el texto del botón de reglas.

  × /resetrulesbutton: Restablecer el texto del botón de reglas a predeterminado.

  × /resetrulesbtn: Igual que arriba."
