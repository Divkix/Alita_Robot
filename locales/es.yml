bans_help_msg:
  "A veces los usuarios pueden ser molestos y podrías querer eliminarlos
  de tu chat, ¡este módulo te ayuda exactamente con eso!

  Banea/expulsa usuarios de tu chat, y desbáneelos más tarde si se comportan bien.


  *Comandos de Usuario:*

  × /kickme: expulsa al usuario que emitió el comando.


  *Comandos de Ban* (Solo administradores):

  × /ban <nombre de usuario>: banea a un usuario. (vía nombre de usuario, o respuesta)

  × /sban <nombre de usuario>: banea a un usuario silenciosamente, no envía mensaje al grupo y también
  elimina tu comando. (vía nombre de usuario, o respuesta)

  × /dban <nombre de usuario>: banea a un usuario y elimina el mensaje respondido. (vía nombre de usuario, o
  respuesta)

  × /tban <nombre de usuario> x(m/h/d): banea a un usuario por `x` tiempo. (vía nombre de usuario, o respuesta).
  m = minutos, h = horas, d = días.

  × /unban <nombre de usuario>: desbanea a un usuario. (vía nombre de usuario, o respuesta)


  *Comandos de Restricción:* (Solo administradores)

  × /restrict: Muestra un teclado en línea para elegir opciones de expulsar, banear y silenciar

