connections_help_msg: |
  "Modul ini memungkinkan Anda untuk terhubung ke database obrolan, dan
  menambahkan sesuatu ke sana tanpa obrolan mengetahuinya! Untuk alasan yang jelas, Anda perlu
  menjadi admin untuk menambahkan sesuatu; tetapi anggota mana pun dapat melihat data Anda. (pengguna yang dilarang/ditendang tidak bisa!)


  *Perintah*:

  × /connect `<chatid>`: Terhubung ke obrolan yang ditentukan, memungkinkan Anda untuk melihat/mengedit
  konten.

  × /disconnect: Memutuskan dari obrolan saat ini.

  × /reconnect: Menghubungkan kembali ke obrolan yang terhubung sebelumnya

  × /connection: Melihat informasi tentang obrolan yang saat ini terhubung.


  *Perintah Admin:*

  × /allowconnect <yes/no>: Izinkan pengguna untuk terhubung ke obrolan atau tidak.


  Anda dapat mengambil id obrolan dengan menggunakan perintah /id di obrolan Anda. Jangan terkejut
  jika id negatif; semua grup super memiliki id negatif."
