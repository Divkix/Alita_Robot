# Extended documentation locale keys - Notes module
notes_extended_docs: |
  <b>Fitur:</b>
  • <b>Dukungan Teks &amp; Media</b>: Simpan pesan teks, foto, video, dokumen, dan lainnya
  • <b>Tombol Kustom</b>: Tambahkan tombol keyboard inline ke catatan
  • <b>Opsi Pemformatan</b>: Kontrol visibilitas dan perilaku catatan
  • <b>Catatan Khusus Admin</b>: Batasi catatan tertentu hanya untuk administrator
  • <b>Catatan Pribadi</b>: Kirim catatan secara pribadi ke pengguna melalui DM
  • <b>Kontrol Pratinjau Web</b>: Aktifkan atau nonaktifkan pratinjau tautan
  • <b>Konten Dilindungi</b>: Cegah konten catatan diteruskan

  <b>Opsi Pemformatan Catatan:</b>
  Ketika menyimpan catatan, Anda dapat menggunakan tag khusus untuk mengontrol perilakunya:
  • <code>{private}</code> - Catatan hanya akan dikirim melalui DM, tidak pernah di grup
  • <code>{noprivate}</code> - Catatan hanya akan dikirim di grup, tidak pernah melalui DM
  • <code>{admin}</code> - Catatan hanya dapat diakses oleh admin
  • <code>{protect}</code> - Konten tidak dapat diteruskan
  • <code>{nonotif}</code> - Kirim tanpa suara notifikasi
  • <code>{nopreview}</code> - Nonaktifkan pratinjau tautan

  <b>Mode Catatan Pribadi:</b>
  Ketika catatan pribadi diaktifkan (<code>/privatenotes on</code>), semua catatan dikirim ke pengguna melalui DM sebagai gantinya di grup. Ini menjaga grup tetap bersih.

  Catatan individual dapat mengganti perilaku ini:
  • <code>{private}</code> - Selalu kirim secara pribadi
  • <code>{noprivate}</code> - Selalu kirim di grup

  <b>Catatan Mentah (Tanpa Pemformatan):</b>
  Untuk melihat konten catatan mentah tanpa pemformatan (untuk diedit):
  <code>/get namacatatan noformat</code>

notes_permissions_docs: |
  <b>Izin yang Diperlukan:</b>
  • Simpan/Hapus catatan: Ubah Info Grup
  • Lihat catatan admin: Status admin
  • Hapus semua catatan: Pemilik Obrolan
  • Dapatkan catatan biasa: Pengguna mana pun

# Extended documentation locale keys - Pins module
pins_extended_docs: |
  <b>Fitur:</b>

  <b>Anti-Channel Pin:</b>
  Ketika diaktifkan, bot akan secara otomatis melepas pin pesan apa pun yang dipin secara otomatis oleh kanal yang terhubung. Ini berguna ketika Anda ingin menjaga kontrol atas apa yang disematkan di grup Anda.

  <b>Penting:</b> Ketika menggunakan pin anti kanal, selalu gunakan perintah <code>/unpin</code> sebagai gantinya melepas pin secara manual melalui Telegram. Melepas pin secara manual akan menyebabkan pesan lama dipin ulang ketika kanal mengirim pesan baru.

  <b>Bersihkan Tautan:</b>
  Ketika diaktifkan, bot akan secara otomatis menghapus pesan apa pun yang dikirim ke grup dari kanal yang terhubung. Ini menjaga obrolan grup Anda tetap bersih dari konten kanal yang cross-posted.

  <b>Permapin:</b>
  Buat pesan pin kustom dengan:
  • Teks dengan pemformatan HTML/Markdown
  • Tombol inline dengan URL
  • Lampiran media (foto, dokumen, stiker, audio, video, catatan suara, catatan video)
  • Semua pengisian pesan standar ({first}, {chatname}, dll.)

  <b>Didukung melalui Koneksi:</b>
  Perintah berikut berfungsi ketika terhubung ke obrolan melalui <code>/connect</code>:
  • <code>/antichannelpin</code>
  • <code>/cleanlinked</code>

pins_notes_docs: |
  <b>Catatan:</b>
  • Perintah <code>/unpinall</code> menampilkan dialog konfirmasi sebelum melepas pin semua pesan
  • Permapin mendukung semua tipe media yang didukung Telegram untuk penyematan
  • Pengaturan pin anti-kanal dan bersihkan tautan disimpan per-obrolan dan bertahan di seluruh restart bot

  <b>Izin yang Diperlukan:</b>
  <b>Bot:</b> Harus admin dengan izin "Pin Pesan"
  <b>Pengguna:</b> Kebanyakan perintah memerlukan admin dengan izin "Pin Pesan"

# Extended documentation locale keys - Purges module
purges_extended_docs: |
  <b>Penghapusan Rentang dengan purgefrom/purgeto:</b>
  Ketika Anda membutuhkan lebih banyak kontrol atas rentang penghapusan:

  1. Balas ke pesan <b>pertama</b> dalam rentang:
  <code>/purgefrom</code>
  Bot akan mengonfirmasi pesan ditandai (kedaluwarsa setelah 30 detik).

  2. Balas ke pesan <b>terakhir</b> dalam rentang:
  <code>/purgeto</code>
  Semua pesan antara dua penanda (inklusif) akan dihapus.

  Ini berguna ketika Anda tidak dapat dengan mudah menggulir ke titik awal atau perlu memverifikasi rentang sebelum penghapusan.

  <b>Batas dan Pembatasan:</b>
  • <b>Maksimum pesan per pembersihan:</b> 1000 pesan
  • <b>Batas usia pesan:</b> Pesan yang lebih dari 48 jam mungkin tidak dapat dihapus (pembatasan API Telegram)
  • <b>Izin yang diperlukan:</b> Baik pengguna maupun bot harus memiliki izin "Hapus Pesan"

purges_notes_docs: |
  <b>Catatan:</b>
  • Penanda <code>/purgefrom</code> kedaluwarsa setelah 30 detik jika tidak diikuti dengan <code>/purgeto</code>
  • Menghapus rentang besar menggunakan pemrosesan konkuren untuk kinerja yang lebih baik
  • Pesan status (menunjukkan berapa banyak pesan yang dihapus) menghapus diri secara otomatis setelah 3 detik
  • Bot menangani pesan yang sudah dihapus dengan anggun tanpa kesalahan

# Extended documentation locale keys - Reports module
reports_extended_docs: |
  <b>Cara Kerja:</b>

  <b>Melaporkan Pesan:</b>
  1. <b>Balas ke pesan yang melanggar</b> dengan <code>/report</code> atau sebutkan <code>@admin</code>
  2. Bot mengirim notifikasi menyebut semua admin yang mengaktifkan laporan
  3. Notifikasi menyertakan tombol tindakan untuk moderasi cepat

  <b>Tombol Tindakan Admin:</b>
  • <b>📩 Pesan</b> - Tautan ke pesan yang dilaporkan
  • <b>👢 Tendang</b> - Tendang pengguna yang dilaporkan (mereka dapat bergabung kembali)
  • <b>🚫 Blokir</b> - Blokir pengguna yang dilaporkan secara permanen
  • <b>🗑 Hapus</b> - Hapus pesan yang dilaporkan
  • <b>✅ Selesai</b> - Tandai laporan sebagai selesai tanpa tindakan

  <b>Pengaturan Pribadi vs Grup:</b>
  • <b>Di PM:</b> <code>/reports on/off</code> mengalihkan apakah ANDA menerima notifikasi laporan
  • <b>Di Grup:</b> <code>/reports on/off</code> mengalihkan apakah pelaporan diaktifkan untuk grup itu

reports_permissions_docs: |
  <b>Siapa yang Dapat Melaporkan?</b>
  ✅ Pengguna biasa
  ❌ Admin (tidak perlu melaporkan ke diri mereka sendiri)
  ❌ Pengguna yang diblokir
  ❌ Kanal anonim / Akun sistem Telegram

  <b>Siapa yang Dapat Dilaporkan?</b>
  ✅ Pengguna biasa
  ❌ Bot itu sendiri
  ❌ Admin (dilindungi dari laporan)
  ❌ Kanal anonim / Akun sistem Telegram

# Extended documentation locale keys - Rules module
rules_extended_docs: |
  <b>Fitur:</b>

  <b>Aturan Pribadi:</b>
  Aktifkan aturan pribadi (<code>/privaterules on</code>) untuk mengirim aturan melalui PM sebagai gantinya di grup. Ini menjaga obrolan grup tetap bersih.

  <b>Tombol Aturan Kustom:</b>
  Atur teks tombol kustom (maks 30 karakter):
  <code>/rulesbtn Lihat Aturan</code>

  Atur ulang ke default:
  <code>/resetrulesbtn</code>

  <b>Mengatur Aturan:</b>
  Anda dapat mengatur aturan dengan memberikan teks langsung atau dengan membalas pesan:
  <code>/setrules Harap menghormati semua anggota.</code>

  Atau balas ke pesan:
  <code>/setrules</code>

  <b>Izin yang Diperlukan:</b>
  • Perintah pengguna: Tersedia untuk semua pengguna
  • Perintah admin: Memerlukan izin admin di obrolan

# Extended documentation locale keys - Warns module
warns_extended_docs: |
  <b>Pengaturan Default:</b>
  • <b>Batas peringatan default:</b> 3 peringatan
  • <b>Mode peringatan default:</b> mute

  <b>Mode Peringatan yang Tersedia:</b>
  • <code>ban</code> - Blokir pengguna secara permanen dari obrolan
  • <code>kick</code> - Tendang pengguna (mereka dapat bergabung kembali)
  • <code>mute</code> - Bisu pengguna (tidak dapat mengirim pesan)

  <b>Peringatan Diam dan Hapus:</b>
  • <code>/swarn</code> - Hapus perintah Anda dan peringatkan secara diam-diam
  • <code>/dwarn</code> - Hapus pesan pengguna dan peringatkan mereka

warns_permissions_docs: |
  <b>Persyaratan Izin:</b>
  • <code>/warn</code>, <code>/dwarn</code>, <code>/swarn</code>: Bot admin + Pengguna admin dengan pembatasan
  • <code>/rmwarn</code>, <code>/unwarn</code>: Bot admin + Pengguna admin
  • <code>/resetwarn</code>, <code>/resetwarns</code>: Bot admin + Pengguna admin
  • <code>/resetallwarns</code>: Pemilik obrolan saja
  • <code>/setwarnmode</code>, <code>/setwarnlimit</code>: Bot admin + Pengguna admin
  • <code>/warnings</code>: Bot admin + Pengguna admin
  • <code>/warns</code>: Pengguna mana pun (dapat dinonaktifkan)

warns_notes_docs: |
  <b>Catatan:</b>
  • Ketika pengguna mencapai batas peringatan, tindakan yang dikonfigurasi (ban/kick/mute) diterapkan secara otomatis
  • Alasan peringatan disimpan dan ditampilkan ketika memeriksa peringatan pengguna
  • Perintah <code>/warns</code> adalah satu-satunya perintah dalam modul ini yang dapat dinonaktifkan oleh admin
  • Posting kanal anonim tidak dapat diperingatkan
  • Admin tidak dapat diperingatkan

# Extended documentation locale keys - Mutes module
mutes_extended_docs: |
  <b>Format Waktu untuk Bisu Sementara:</b>
  • <code>m</code> = menit (mis., <code>30m</code>)
  • <code>h</code> = jam (mis., <code>2h</code>)
  • <code>d</code> = hari (mis., <code>1d</code>)

  <b>Varian Bisu:</b>
  • <code>/mute</code> - Bisu standar dengan alasan opsional
  • <code>/smute</code> - Bisu diam (menghapus pesan perintah Anda)
  • <code>/dmute</code> - Bisu hapus (bisu pengguna dan hapus pesan mereka)
  • <code>/tmute</code> - Bisu sementara dengan durasi yang ditentukan

  <b>Izin yang Diperlukan:</b>
  <b>Perintah admin saja.</b> Pengguna yang mengeksekusi perintah ini harus memiliki:
  • Status admin di obrolan
  • Izin untuk membatasi anggota

  Bot juga harus memiliki hak istimewa admin dengan izin untuk membatasi anggota.

# Extended documentation locale keys - Filters module
filters_extended_docs: |
  <b>Fitur Lanjutan:</b>

  <b>Balasan Acak:</b>
  Gunakan <code>%%%</code> untuk memisahkan banyak balasan. Satu akan dipilih secara acak:
  <code>/filter halo Hai!%%%Halo!%%%Hai, apa kabar?</code>

  <b>Filter Media:</b>
  Balas ke media apa pun (foto, video, dokumen, stiker, dll.) dengan <code>/filter trigger</code> untuk membuat filter yang mengirim media itu.

  <b>Mode Noformat:</b>
  Admin dapat melihat konten filter mentah (termasuk kode pemformatan) dengan menambahkan <code>noformat</code> setelah trigger:
  <code>halo noformat</code>
  Ini berguna untuk debugging filter atau melihat konfigurasi tombol.

  <b>Tombol Filter:</b>
  Anda dapat menambahkan tombol inline ke filter Anda:
  <code>/filter halo Halo! Lihat tautan ini:
  [Tombol 1](buttonurl:https://example.com)
  [Tombol 2](buttonurl:https://example2.com)</code>

filters_technical_docs: |
  <b>Cara Kerja Filter:</b>
  1. Ketika pesan diterima, bot mengambil semua filter untuk obrolan menggunakan query cache teroptimasi
  2. Algoritma Aho-Corasick secara efisien mencocokkan semua kata kunci filter dengan teks pesan
  3. Filter yang cocok pertama memicu balasan
  4. Filter mendukung balasan teks, media, dan tombol

  <b>Konfirmasi Timpa:</b>
  Ketika Anda mencoba menambahkan filter yang sudah ada, bot akan meminta konfirmasi sebelum menimpa. Konfirmasi kedaluwarsa setelah 5 menit.

  <b>Perilaku Cache:</b>
  • Daftar filter di-cache selama 15 menit per obrolan
  • Cache secara otomatis dihapus ketika filter ditambahkan atau dihapus

filters_limits_docs: |
  <b>Batasan:</b>
  • Maksimum 150 filter per obrolan
  • Maksimum 100 karakter per kata kunci filter
  • Kata kunci filter disimpan dalam huruf kecil

  <b>Izin yang Diperlukan:</b>
  • <code>/filter</code>, <code>/addfilter</code>: Admin dengan izin Ubah Info
  • <code>/stop</code>, <code>/rmfilter</code>, <code>/removefilter</code>: Admin dengan izin Ubah Info
  • <code>/stopall</code>: Pemilik Obrolan saja
  • <code>/filters</code>: Tersedia untuk semua pengguna

# Extended documentation locale keys - Captcha module
captcha_extended_docs: |
  <b>Cara Kerja:</b>
  1. Ketika captcha diaktifkan, anggota baru secara otomatis dibisukan saat bergabung
  2. Tantangan captcha dikirim ke anggota baru
  3. Pengguna harus memilih jawaban yang benar dari opsi yang disediakan
  4. Jika berhasil, pengguna dibuka bisunya dan dapat berpartisipasi di grup
  5. Jika mereka gagal atau batas waktu habis, tindakan yang dikonfigurasi diambil (tendang, blokir, atau bisu)

  <b>Tipe Captcha:</b>
  • <b>Matematika</b>: Selesaikan masalah aritmatika sederhana (penjumlahan, pengurangan, perkalian)
  • <b>Teks</b>: Identifikasi teks yang ditampilkan dalam gambar yang terdistorsi

  <b>Fitur Pesan Tertunda:</b>
  Ketika pengguna menyelesaikan captcha, pesan apa pun yang mereka coba kirim disimpan dan dihapus. Admin dapat:
  • Melihat pesan apa yang dicoba dikirim pengguna menggunakan <code>/captchapending</code>
  • Menghapus pesan yang disimpan menggunakan <code>/captchaclear</code>

  Ini membantu mengidentifikasi upaya spam potensial sebelum pengguna menyelesaikan verifikasi.

captcha_permissions_docs: |
  <b>Persyaratan Bot:</b>
  • Blokir pengguna (untuk tindakan tendang/blokir)
  • Batasi anggota (untuk membisukan selama verifikasi)
  • Hapus pesan (untuk membersihkan pesan captcha)

  <b>Tindakan Kegagalan:</b>
  • <code>kick</code> - Blokir kemudian segera buka blokir (memungkinkan pengguna bergabung kembali)
  • <code>ban</code> - Blokir pengguna secara permanen
  • <code>mute</code> - Pertahankan pengguna dibisukan selama 24 jam

# Extended documentation locale keys - Blacklists module
blacklists_extended_docs: |
  <b>Tindakan yang Tersedia:</b>
  Tindakan berikut dapat diatur menggunakan <code>/blaction</code>:
  • <code>none</code> - Hanya menghapus pesan tanpa tindakan lebih lanjut
  • <code>warn</code> - Hapus pesan dan berikan peringatan ke pengguna (default)
  • <code>mute</code> - Hapus pesan dan bisu pengguna
  • <code>kick</code> - Hapus pesan dan tendang pengguna (mereka dapat bergabung kembali)
  • <code>ban</code> - Hapus pesan dan blokir pengguna secara permanen

  <b>Catatan:</b>
  Mode default untuk Daftar Hitam adalah <b>warn</b>, yang akan menghapus pesan dan memberikan peringatan ke pengguna.

  <b>Perintah:</b>
  • <code>/addblacklist &lt;trigger&gt;</code> - Menambahkan kata ke daftar hitam di obrolan saat ini
  • <code>/rmblacklist &lt;trigger&gt;</code> - Menghapus kata dari Kata-kata yang Didaftar Hitam di Obrolan saat ini
  • <code>/blaction &lt;mute/kick/ban/warn/none&gt;</code> - Mengatur tindakan yang akan dilakukan oleh bot ketika kata daftar hitam terdeteksi
  • <code>/remallbl</code> - Menghapus semua kata yang didaftar hitam dari obrolan (Khusus Pemilik)

# Extended documentation locale keys - Disabling module
disabling_extended_docs: |
  <b>Fitur Utama:</b>
  • Nonaktifkan perintah bot tertentu untuk pengguna non-admin
  • Admin selalu dapat melewati perintah yang dinonaktifkan
  • Penghapusan otomatis opsional dari pesan perintah yang dinonaktifkan
  • Dukungan untuk menonaktifkan banyak perintah sekaligus

  <b>Nonaktifkan Banyak Perintah:</b>
  <code>/disable adminlist rules info</code>
  Menonaktifkan perintah <code>/adminlist</code>, <code>/rules</code>, dan <code>/info</code> sekaligus.

  <b>Alihkan Penghapusan:</b>
  <code>/disabledel on</code> - Pesan yang dinonaktifkan sekarang akan dihapus.
  <code>/disabledel off</code> - Pesan yang dinonaktifkan tidak akan lagi dihapus.
  <code>/disabledel</code> - Periksa pengaturan penghapusan saat ini.

disabling_notes_docs: |
  <b>Catatan Penting:</b>
  • <b>Lewatkan Admin:</b> Perintah yang dinonaktifkan hanya memengaruhi pengguna non-admin. Semua admin masih dapat menggunakan perintah apa pun.
  • <b>Dukungan Koneksi:</b> Perintah yang dinonaktifkan masih dapat diakses melalui fitur <code>/connect</code> untuk obrolan yang terhubung.
  • <b>Banyak Perintah:</b> Baik <code>/disable</code> maupun <code>/enable</code> mendukung banyak nama perintah dalam satu pesan.
  • <b>Penanganan Kesalahan:</b> Jika beberapa perintah gagal untuk dinonaktifkan/diaktifkan, Anda akan diberitahu mana yang berhasil dan mana yang gagal.

  <b>Izin yang Diperlukan:</b>
  • <code>/disable</code>, <code>/enable</code>, <code>/disabledel</code>: Admin saja
  • <code>/disableable</code>, <code>/disabled</code>: Semua pengguna (tetapi <code>/disabled</code> dapat dinonaktifkan)

# Extended documentation locale keys - Help module
help_extended_docs: |
  <b>Sistem Navigasi:</b>
  Modul Bantuan menyediakan titik masuk utama dan navigasi bot. Ketika pengguna mengirim <code>/start</code> di chat pribadi, bot menampilkan pesan selamat datang dengan keyboard inline untuk menavigasi ke modul yang berbeda.

  Perintah <code>/help</code> menampilkan daftar modul. Mengklik tombol modul menampilkan perintah dan informasi penggunaan modul tersebut. Ketika <code>/help</code> digunakan di chat grup, bot mengarahkan pengguna ke pesan pribadi untuk bantuan terperinci guna menghindari kekacauan grup.

  <code>/about</code> menampilkan informasi bot, versi, dan tautan, sementara <code>/donate</code> menampilkan informasi donasi untuk mendukung proyek.

# Extended documentation locale keys - Devs module
devs_extended_docs: |
  <b>Hierarki Tim:</b>
  Modul Devs menyediakan perintah manajemen bot dan diagnostik yang dibatasi untuk tim internal bot. Tim memiliki tiga tingkat dengan level hak istimewa yang menurun.

  <b>Tingkat 1 — Pemilik:</b> Diatur melalui variabel lingkungan <code>OWNER_ID</code> saat penyebaran. Kontrol penuh: mengelola daftar tim, semua perintah diagnostik, semua perintah tim.

  <b>Tingkat 2 — Sudo / Dev:</b> Ditugaskan oleh pemilik melalui <code>/addsudo</code> atau <code>/adddev</code>. Perintah diagnostik: statistik bot, info chat, manajemen chat.

  <b>Tingkat 3 — Anggota Tim:</b> Secara otomatis mencakup pemilik + semua pengguna sudo + semua pengguna dev. Lihat daftar tim hanya melalui <code>/teamusers</code>.

  <b>Catatan:</b> Sudo dan Dev memiliki akses perintah yang identik. Perbedaan ini ada untuk tujuan organisasi.

  <b>Penting:</b> Perintah ini tidak terlihat di menu bantuan publik dan secara diam-diam mengabaikan pengguna yang tidak berwenang.

# Extended documentation locale keys - Users module
users_extended_docs: |
  <b>Pelacak Latar Belakang:</b>
  Modul Pengguna adalah modul latar belakang pasif tanpa perintah yang terlihat pengguna. Modul ini berjalan secara diam-diam pada setiap pesan yang diproses bot, secara otomatis melacak semua pengirim pesan dan semua chat tempat bot aktif.

  <b>Apa yang Dilacak:</b>
  • ID pengguna, nama pengguna, dan nama tampilan untuk setiap pengirim pesan
  • ID chat dan nama untuk setiap grup tempat bot berada
  • ID saluran, nama, dan nama pengguna untuk saluran tertaut

  <b>Pembatasan Kecepatan:</b>
  • Pembaruan pengguna: dibatasi satu per <code>UserUpdateInterval</code>
  • Pembaruan chat: dibatasi satu per <code>ChatUpdateInterval</code>
  • Ini mencegah penulisan basis data yang berlebihan sambil menjaga data tetap terkini secara wajar

  <b>Operasi Pasif:</b>
  • Berjalan sebagai pengawas pesan di grup penangan -1 (dijalankan sebelum semua penangan perintah)
  • Tidak perlu interaksi pengguna — sepenuhnya otomatis
  • Modul lain, seperti <code>/info</code>, bergantung pada data yang dikumpulkan oleh modul ini

