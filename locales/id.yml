# Backup/Restore module strings
backup_help_msg: |
  <b>📦 Cadangkan & Pulihkan</b>

  Cadangkan dan pulihkan pengaturan grup Anda menggunakan perintah ini:

  <b>Perintah Pengguna:</b>
  • /export - Ekspor semua pengaturan grup ke file JSON
  • /export notes filters rules - Ekspor modul tertentu saja

  <b>Perintah Pembuat Grup:</b>
  • /import - Balas ke file cadangan untuk memulihkan pengaturan
  • /import notes filters - Impor modul tertentu saja
  • /reset - Atur ulang semua pengaturan ke default
  • /reset warnings locks - Atur ulang modul tertentu saja

  <b>Batas Rate:</b>
  • Ekspor: 1 per 5 menit
  • Impor: 1 per 10 menit
  • Atur Ulang: 1 per jam

