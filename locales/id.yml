captcha_help_msg: |
  "Lindungi grup Anda dari bot dan spammer dengan verifikasi CAPTCHA!


  Paksa anggota baru untuk membuktikan mereka manusia dengan menyelesaikan tantangan sederhana sebelum mereka
  dapat mengirim pesan.


  *Tipe Captcha:*

  × Matematika: Selesaikan masalah aritmatika sederhana

  × Teks: Identifikasi teks yang ditampilkan dalam gambar


  *Perintah Admin:*

  × /captcha `<on/off>`: Aktifkan atau nonaktifkan verifikasi captcha

  × /captchamode `<math/text>`: Atur tipe captcha (masalah matematika atau pengenalan teks)

  × /captchatime `<1-10>`: Atur batas waktu dalam menit (default: 2)

  × /captchaaction `<kick/ban/mute>`: Atur tindakan untuk verifikasi gagal (default:
  kick)

  × /captchaattempts `<1-10>`: Atur maksimum percobaan verifikasi (default: 3)


  Ketika diaktifkan, anggota baru akan dibisukan secara otomatis sampai mereka menyelesaikan captcha.

  Jika mereka gagal atau batas waktu habis, tindakan yang dikonfigurasi akan diambil."
