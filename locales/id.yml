warns_help_msg: |
  "Jaga anggota Anda dengan peringatan; hentikan mereka keluar dari
  kendali!

  Jika Anda mencari peringatan otomatis, baca tentang modul daftar hitam!


  *Perintah Admin:*

  - /warn <alasan>: Peringatkan pengguna.

  - /dwarn <alasan>: Peringatkan pengguna dengan balasan, dan hapus pesan mereka.

  - /swarn <alasan>: Secara diam-diam peringatkan pengguna, dan hapus pesan Anda.

  - /warns: Lihat peringatan pengguna.

  - /rmwarn: Hapus peringatan terbaru pengguna.

  - /resetwarn: Atur ulang semua peringatan pengguna ke 0.

  - /resetallwarns: Hapus semua peringatan di obrolan. Semua pengguna kembali ke 0 peringatan.

  - /warnings: Dapatkan pengaturan peringatan obrolan.

  - /setwarnmode <ban/kick/mute>: Atur mode peringatan obrolan.

  - /setwarnlimit <number>: Atur jumlah peringatan sebelum pengguna dihukum.


  *Contoh*

  - Peringatkan pengguna.

  -> `/warn @user Karena tidak menaati aturan`"
users_help_msg:
  "Pelacak pengguna dan chat latar belakang otomatis. Modul ini tidak memiliki perintah
  yang terlihat pengguna — modul ini secara diam-diam mencatat setiap pengirim pesan dan chat tempat bot aktif.

  *Apa yang Dilacak:*

  × ID pengguna, nama pengguna, dan nama tampilan untuk setiap pengirim pesan.

  × ID chat dan nama untuk setiap grup tempat bot berada.

  × ID saluran, nama, dan nama pengguna untuk saluran tertaut.

  *Pembatasan Kecepatan:*

  × Pembaruan pengguna dibatasi satu per UserUpdateInterval.

  × Pembaruan chat dibatasi satu per ChatUpdateInterval.

  Modul lain, seperti /info, bergantung pada data yang dikumpulkan oleh modul ini."

