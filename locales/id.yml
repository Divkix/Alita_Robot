disabling_help_msg: |
  "Modul ini memungkinkan Anda untuk menonaktifkan beberapa perintah yang umum digunakan,
  Jadi, tidak ada yang bisa menggunakannya. Ini juga akan memungkinkan Anda untuk menghapusnya secara otomatis, menghentikan orang
  dari blue texting.


  *Perintah Admin*:

  × /disable `<commandname>`: Hentikan pengguna dari menggunakan commandname di grup ini.

  × /enable `<item name>`: Izinkan pengguna dari menggunakan commandname di grup ini.

  × /disableable: Daftar semua perintah yang dapat dinonaktifkan.

  × /disabledel `<yes/no/on/off>`: Hapus perintah yang dinonaktifkan ketika digunakan oleh non-admin.

  × /disabled: Daftar perintah yang dinonaktifkan di obrolan ini.


  Catatan:

  Ketika menonaktifkan perintah, perintah hanya dinonaktifkan untuk non-admin. Semua admin
  masih dapat menggunakan perintah tersebut.

  Perintah yang dinonaktifkan masih dapat diakses melalui fitur /connect. Jika Anda ingin
  melihat ini dinonaktifkan juga, beri tahu saya di obrolan dukungan."
devs_help_msg:
  "Perintah manajemen bot dan diagnostik yang dibatasi untuk pemilik bot dan
  pengembang tepercaya. Perintah ini tidak ditampilkan kepada pengguna biasa.

  *Perintah Tim:*

  × /stats: Menampilkan statistik bot dan info sistem.

  × /teamusers: Daftar semua anggota tim.

  *Perintah Pemilik:*

  × /addsudo: Berikan izin sudo kepada pengguna.

  × /adddev: Berikan izin pengembang kepada pengguna.

  × /remsudo: Cabut izin sudo dari pengguna.

  × /remdev: Cabut izin pengembang dari pengguna.

  *Perintah Diagnostik:*

  × /chatinfo: Menampilkan informasi terperinci tentang chat.

  × /chatlist: Hasilkan dan kirim daftar semua chat aktif.

  × /leavechat: Paksa bot untuk meninggalkan chat yang ditentukan."
filters_help_msg: |
  "Filter tidak peka huruf besar/kecil; setiap kali seseorang mengucapkan kata pemicu
  Anda, Alita akan membalas sesuatu yang lain! Ini dapat digunakan untuk membuat perintah Anda
  sendiri, jika diinginkan.


  Perintah:

  - /filter <trigger> <reply>: Setiap kali seseorang mengatakan trigger, bot akan membalas
  dengan kalimat. Untuk filter multi-kata, tandai trigger.

  - /filters: Daftar semua filter obrolan.

  - /stop <trigger>: Hentikan bot membalas ke trigger.

  - /stopall: Hentikan SEMUA filter di obrolan saat ini. Tindakan ini tidak dapat dibatalkan.


  Contoh:

  - Atur filter:

  -> /filter halo Halo! Bagaimana kabar Anda?

  - Atur filter multi-kata:

  -> /filter "teman saya" Halo kembali! Lama tidak bertemu!

  - Atur filter yang hanya dapat digunakan oleh admin:

  -> /filter contoh Filter ini tidak akan terjadi jika pengguna normal mengatakannya {admin}

  - Untuk menyimpan file, gambar, gif, atau lampiran lain, cukup balas ke file
  dengan:

  -> /filter trigger"
formatting_fillings: "<b>Isian</b>


  Anda juga dapat menyesuaikan konten pesan Anda dengan data kontekstual. Misalnya,
  Anda bisa menyebut pengguna dengan nama di pesan selamat datang, atau menyebut mereka di filter!

  Anda dapat menggunakan ini untuk menyebut pengguna di catatan juga!


  <b>Isian yang didukung:</b>

  - <code>{first}</code>: Nama depan pengguna.

  - <code>{last}</code>: Nama belakang pengguna.

  - <code>{fullname}</code>: Nama lengkap pengguna.

  - <code>{username}</code>: Nama pengguna pengguna. Jika mereka tidak memilikinya, menyebut
  pengguna sebagai gantinya.

  - <code>{mention}</code>: Menyebut pengguna dengan nama depan mereka.

  - <code>{id}</code>: ID pengguna.

  - <code>{chatname}</code>: Nama obrolan.

  - <code>{rules}</code>: Menambahkan Tombol Aturan ke Pesan.

  - <code>{protect}</code>: Melindungi konten dari dibagikan.

  - <code>{preview}</code>: Mengaktifkan pratinjau di pesan.

  - <code>{nonotif}</code>: Menonaktifkan notifikasi untuk pesan itu."
formatting_help_msg: "Alita mendukung banyak opsi pemformatan untuk membuat pesan Anda lebih ekspresif. Lihat dengan mengklik tombol di bawah!"
formatting_markdown: |
  <b>Pemformatan Markdown</b>

  Anda dapat memformat pesan Anda menggunakan <b>tebal</b>, <i>miring</i>, <u>garis bawah</u>,
  dan banyak lagi. Ayo coba!

  <b>Markdown yang didukung</b>:

  - <code>`kode kata`</code>: Tanda backtick digunakan untuk font monospace. Menampilkan sebagai: <code>kode kata</code>.

  - <code>_kata miring_</code>: Garis bawah digunakan untuk font miring. Menampilkan sebagai: <i>kata miring</i>.

  - <code>*kata tebal*</code>: Asterisk digunakan untuk font tebal. Menampilkan sebagai: <b>kata tebal</b>.

  - <code>~coret~</code>: Tilde digunakan untuk coretan. Menampilkan sebagai: <strike>coret</strike>.

  - <code>||spoiler||</code>: Bilah vertikal ganda digunakan untuk spoiler. Menampilkan sebagai: <tg-spoiler>Spoiler</tg-spoiler>.

  - <code>```pre```</code>: Untuk membuat pemformatan mengabaikan karakter pemformatan lain di dalam teks yang diformat dengan '```', akan seperti: <code>**tebal** | *tebal*</code>.

  - <code>__garis bawah__</code>: Garis bawah ganda digunakan untuk garis bawah. Menampilkan sebagai: garis bawah. CATATAN: Beberapa klien mencoba menjadi pintar dan menginterpretasikannya sebagai miring. Dalam kasus itu, coba gunakan pemformatan bawaan aplikasi Anda.

  - <code>[hyperlink](example.com)</code>: Ini adalah pemformatan yang digunakan untuk hyperlink. Menampilkan sebagai: <a href='https://example.com/'>hyperlink</a>.

  - <code>[Tombol Saya](buttonurl://example.com)</code>: Ini adalah pemformatan yang digunakan untuk membuat tombol. Contoh ini akan membuat tombol bernama "Tombol saya" yang membuka <code>example.com</code> ketika diklik.

  Jika Anda ingin mengirim tombol di baris yang sama, gunakan pemformatan <code>:same</code>.

  <b>Contoh:</b>

  <code>[tombol 1](buttonurl:example.com)</code>

  <code>[tombol 2](buttonurl://example.com:same)</code>

  <code>[tombol 3](buttonurl://example.com)</code>

  Ini akan menampilkan tombol 1 dan 2 di baris yang sama, dengan 3 di bawahnya.
formatting_random: |
  <b>Konten Acak</b>

  Hal lain yang bisa menyenangkan, adalah mengacak konten pesan. Buat hal-hal
  sedikit lebih personal dengan mengubah pesan selamat datang, atau mengubah catatan!

  Cara menggunakan konten acak:

  - %%%: Pemisah ini dapat digunakan untuk menambahkan balasan acak ke bot.

  Misalnya:

  <code>halo

  %%%

  apa kabar</code>

  Ini akan secara acak memilih antara mengirim pesan pertama, "halo", atau pesan kedua,
  "apa kabar".

  Gunakan ini untuk membuat Alita terasa sedikit lebih disesuaikan! (hanya berfungsi di filter/catatan)

  Contoh pesan selamat datang:

  - Setiap kali pengguna baru bergabung, mereka akan diberikan salah satu dari tiga pesan
  yang ditampilkan di sini.

  -> /filter "halo"

  halo <code>{first}</code>!

  %%%

  Ooooh, <code>{first}</code> apa kabar?

  %%%

  Ada apa? <code>{first}</code>
greetings_help_msg: |
  "Sambut pengguna baru ke grup Anda atau ucapkan Selamat Tinggal setelah mereka
  pergi!


  *Perintah Admin:*

  × /setwelcome `<reply/text>`: Mengatur teks selamat datang untuk grup.

  × /welcome `<yes/no/on/off>`: Mengaktifkan atau Menonaktifkan pengaturan selamat datang untuk grup.

  × /resetwelcome: Mengatur ulang pesan selamat datang ke default.

  × /setgoodbye `<reply/text>`: Mengatur teks selamat tinggal untuk grup.

  × /goodbye `<yes/no/on/off>`: Mengaktifkan atau Menonaktifkan pengaturan selamat tinggal untuk grup.

  × /resetgoodbye: Mengatur ulang pesan selamat tinggal ke default.

  × /cleanservice `<yes/no/on/off>`: Hapus semua pesan layanan seperti notifikasi 'x bergabung
  dengan grup'.

  × /cleanwelcome `<yes/no/on/off>`: Hapus pesan selamat datang lama, setiap kali anggota baru
  bergabung.

  × /autoapprove `<yes/no/on/off>`: Secara otomatis menyetujui semua anggota baru."
help_about: "@%s  adalah salah satu manajer grup tercepat dan paling penuh fitur.


  Alita ✨ dikembangkan dan dikelola secara aktif oleh @DivideProjects!


  Alita telah online sejak 2020 dan telah melayani ribuan grup dengan ratusan
  ribu pengguna!


  <b>Mengapa Alita:</b>

  - Sederhana: Penggunaan mudah dan kompatibel dengan banyak perintah bot.

  - Fitur Lengkap: Banyak fitur yang tidak dimiliki bot manajemen grup lain.

  - Cepat: Tebak apa? Ini tidak dibuat menggunakan Python, kami menggunakan <a href='https://go.dev/'>Go</a>
  sebagai bahasa pemrograman inti kami.


  <b>Versi Saat Ini:</b> %s"
help_configuration_step-1: "Selamat datang di Konfigurasi Alita


  Hal pertama yang harus dilakukan adalah menambahkan Alita ✨ ke grup Anda! Untuk melakukan itu, tekan
  tombol di bawah dan pilih grup Anda, lalu tekan Selesai untuk melanjutkan tutorial."
help_configuration_step-2: "Ok, bagus!


  Sekarang untuk membiarkan saya bekerja dengan benar, Anda perlu menjadikan saya Admin dari Grup Anda!

  Untuk melakukan itu, ikuti langkah-langkah mudah ini:

  ▫️ Pergi ke grup Anda

  ▫️ Tekan Nama Grup

  ▫️ Tekan Modifikasi

  ▫️ Tekan pada Administrator

  ▫️ Tekan Tambah Administrator

  ▫️ Tekan Kaca Pembesar

  ▫️ Cari @%s

  ▫️ Konfirmasi"
help_configuration_step-3: "Sangat bagus!


  Sekarang Bot siap digunakan!

  Semua perintah dapat digunakan dengan / atau !


  Jika Anda menghadapi kesulitan dalam menyiapkan saya di grup Anda, jangan ragu
  untuk datang ke @DivideSupport.

  Kami akan dengan senang hati membantu Anda."
help_donatetext: "Jadi Anda ingin donasi? Luar biasa!

  Ketika Anda berdonasi, semua dana masuk ke pengembangan saya yang membuat cepat dan
  responsif.

  Donasi Anda mungkin juga memberi saya fitur baru, yang tidak dapat saya dapatkan
  karena keterbatasan server.

  Semua dana akan dimasukkan ke layanan saya seperti database, penyimpanan, dan hosting!

  Anda dapat berdonasi dengan menghubungi pemilik saya di sini: @DivideProjectsBot"
help_help_msg:
  "Titik masuk utama dan sistem navigasi untuk Alita Robot.

  *Perintah Navigasi:*

  × /start: Tampilkan pesan selamat datang dengan menu navigasi.

  × /help: Tampilkan menu bantuan dengan daftar modul; gunakan /help <modul> untuk detail.

  × /about: Tampilkan informasi bot, versi, dan tautan berguna.

  × /donate: Tampilkan informasi donasi untuk mendukung proyek."
languages_help_msg: "Tidak dapat mengubah bahasa bot?

  Ubah dengan mudah menggunakan modul ini!


  Ketik saja /lang dan gunakan keyboard inline untuk memilih bahasa untuk diri Anda sendiri atau grup Anda.


  Anda dapat membantu kami membawa bot ke lebih banyak bahasa dengan membantu di [Crowdin](https://crowdin.com/project/alita_robot)"
locks_help_msg: "*Admin saja*:

  × /lock `<permission>`: Kunci Izin Obrolan..

  × /unlock `<permission>`: Buka Kunci Izin Obrolan.

  × /locks: Lihat Izin Obrolan.

  × /locktypes: Periksa tipe kunci yang tersedia!


  Kunci dapat digunakan untuk membatasi pengguna grup.

  Mengunci URL akan menghapus semua pesan dengan URL secara otomatis, mengunci stiker akan menghapus
  semua stiker, dll.

  Mengunci bot akan menghentikan non-admin menambahkan bot ke obrolan.


  **Contoh:**

  `/lock media`: ini mengunci semua pesan media di obrolan."
misc_help_msg: |
  "× /info: Dapatkan info pengguna Anda, yang dapat digunakan sebagai balasan atau dengan melewatkan
  ID Pengguna atau Nama Pengguna.

  × /id: Dapatkan id grup saat ini. Jika digunakan dengan membalas pesan, dapatkan id pengguna itu.

  × /ping: Ping Server Telegram!

  × /tr <kode bahasa> <msg/balas ke pesan>: Terjemahkan pesan.

  × /removebotkeyboard: Menghapus keyboard bot yang macet dari obrolan Anda.

  × /stat: Mendapatkan jumlah total pesan di obrolan."
mutes_help_msg: |
  "Terkadang pengguna bisa mengganggu dan Anda mungkin ingin membatasi mereka
  dari mengirim pesan ke obrolan, modul ini ada di sini untuk membantu, Anda dapat menggunakan modul ini
  untuk membisukan anggota di grup Anda.


  *Perintah Bisu:* (Admin saja)

  × /mute <userhandle>: membisukan pengguna, (melalui handle, atau balasan)

  × /smute <userhandle>: membisukan pengguna secara diam-diam, tidak mengirim pesan ke grup,
  dan juga menghapus perintah Anda. (melalui handle, atau balasan)

  × /dmute <userhandle>: membisukan pengguna dan menghapus pesan yang dibalas. (melalui handle,
  atau balasan)

  × /tmute <userhandle> x(m/h/d): membisukan pengguna untuk waktu `x`. (melalui handle, atau balasan).
  m = menit, h = jam, d = hari.

  × /unmute <userhandle>: membuka bisu pengguna. (melalui handle, atau balasan)"
notes_help_msg: 'Simpan data untuk pengguna masa depan dengan catatan!

  Catatan bagus untuk menyimpan potongan informasi acak; nomor telepon, gif bagus,
  gambar lucu - apa saja!

  *Perintah Pengguna:*

  - /get <namacatatan>: Dapatkan catatan.

  - #namacatatan: Sama seperti /get.

  Perintah Admin:

  - /save <namacatatan> <teks catatan>: Simpan catatan baru bernama "kata". Membalas pesan
  akan menyimpan pesan itu. Bahkan berfungsi pada media!

  - /clear <namacatatan>: Hapus catatan terkait.

  - /notes: Daftar semua catatan di obrolan saat ini.

  - /saved: Sama seperti /notes.

  - /clearall: Hapus SEMUA catatan di obrolan. Ini tidak dapat dibatalkan.

  - /privatenotes: Apakah akan mengirim catatan di PM atau tidak. Akan mengirim pesan dengan
  tombol yang dapat diklik pengguna untuk mendapatkan catatan di PM.'
pins_help_msg: |
  "Semua perintah terkait pin dapat ditemukan di sini; jaga obrolan Anda tetap
  up to date dengan pesan pin sederhana!


  *Perintah Pengguna:*

  × /pinned: Dapatkan pesan yang dipin saat ini.


  *Perintah Admin:*

  × /pin: Pin pesan yang Anda balas. Tambahkan ''loud'' atau ''notify'' untuk mengirim notifikasi
  ke anggota grup.

  × /pinned: Mendapatkan pesan yang dipin terbaru di Obrolan Saat Ini.

  × /permapin <teks>: Pin pesan khusus melalui bot. Pesan ini dapat berisi
  markdown, tombol, dan semua fitur keren lainnya.

  × /unpin: Lepas pin pesan yang dipin saat ini. Jika digunakan sebagai balasan, melepas pin pesan yang dibalas.

  × /unpinall: Melepas pin semua pesan yang dipin.

  × /antichannelpin <yes/no/on/off>: Jangan biarkan telegram memin kanal secara otomatis.
  Jika tidak ada argumen yang diberikan, tampilkan pengaturan saat ini.

  × /cleanlinked <yes/no/on/off>: Hapus pesan yang dikirim oleh kanal yang terhubung.

  Catatan: Ketika menggunakan anti channel pin, pastikan untuk menggunakan perintah /unpin, bukan
  melakukannya secara manual. Jika tidak, pesan lama akan dipin ulang ketika kanal
  mengirim pesan apa pun."
purges_help_msg: "*Admin saja:*

  - /purge: menghapus semua pesan antara ini dan pesan yang dibalas.

  - /del: menghapus pesan yang Anda balas.


  *Contoh*:

  - Hapus semua pesan dari pesan yang dibalas, sampai sekarang.

  -> `/purge`"
reports_help_msg: |
  "Kita semua orang sibuk yang tidak punya waktu untuk memantau grup kita
  24/7. Tapi bagaimana Anda bereaksi jika seseorang di grup Anda melakukan spam?


  × /report `<reason>`: balas ke pesan untuk melaporkannya ke admin.

  - @admin: sama seperti /report tetapi bukan perintah.


  *Admin Saja:*

  × /reports `<on/off/yes/no>`: ubah pengaturan laporan, atau lihat status saat ini.

  - Jika dilakukan di PM, mengalihkan status Anda.

  - Jika di grup, mengalihkan status grup itu.

  × /reports `block` (hanya melalui balasan): Blokir pengguna dari menggunakan /report atau @admin.

  × /reports `unblock` (hanya melalui balasan): Buka blokir pengguna dari menggunakan /report atau @admin.

  × /reports `showblocklist`: Periksa semua pengguna yang diblokir yang tidak dapat menggunakan /report atau
  @admin.


  Untuk melaporkan pengguna, cukup balas pesannya dengan @admin atau /report; Natalie
  akan kemudian membalas dengan pesan yang menyatakan bahwa admin telah diberitahu.

  Anda HARUS membalas pesan untuk melaporkan pengguna; Anda tidak bisa hanya menggunakan @admin untuk menandai
  admin tanpa alasan!


  *CATATAN:* Tidak satu pun dari ini akan dipicu jika digunakan oleh admin."
rules_help_msg: |
  "Setiap obrolan bekerja dengan aturan yang berbeda; modul ini akan membantu membuat
  aturan itu lebih jelas!

  *Perintah Pengguna*:

  × /rules: Periksa aturan obrolan saat ini.

  *Perintah Admin*:

  × /setrules `<teks>`: Atur aturan untuk obrolan ini.

  × /privaterules `<yes/no/on/off>`: Aktifkan/nonaktifkan apakah aturan harus dikirim
  secara pribadi.

  × /resetrules: Atur ulang aturan obrolan ke default

  × /rulesbtn `<teks khusus>`: Mengatur teks tombol aturan.

  × /resetrulesbutton: Atur ulang teks tombol aturan ke default.

  × /resetrulesbtn: Sama seperti di atas."
