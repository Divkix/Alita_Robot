bans_help_msg: |
  "Terkadang pengguna bisa mengganggu dan Anda mungkin ingin menghapus mereka
  dari obrolan Anda, modul ini tepat membantu Anda untuk menangani itu!.

  Blokir/tendang pengguna dari obrolan Anda, dan buka blokir mereka nanti jika mereka berperilaku baik.


  *Perintah Pengguna:*

  × /kickme: menendang pengguna yang mengirim perintah.


  *Perintah Blokir* (Admin saja):

  × /ban <userhandle>: melarang pengguna. (melalui handle, atau balasan)

  × /sban <userhandle>: melarang pengguna secara diam-diam, tidak mengirim pesan ke grup dan juga
  menghapus perintah Anda. (melalui handle, atau balasan)

  × /dban <userhandle>: melarang pengguna dan menghapus pesan yang dibalas. (melalui handle, atau
  balasan)

  × /tban <userhandle> x(m/h/d): melarang pengguna untuk waktu `x`. (melalui handle, atau balasan).
  m = menit, h = jam, d = hari.

  × /unban <userhandle>: membuka blokir pengguna. (melalui handle, atau balasan)


  *Perintah Pembatasan:* (Admin saja)

  × /restrict: Menampilkan InlineKeyboard untuk memilih opsi dari kick, ban dan mute

  × /unrestrict: Menampilkan InlineKeyboard untuk memilih opsi dari unmute dan unban."
