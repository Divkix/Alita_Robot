  <code>voice</code> - Блокировать голосовые сообщения
  <code>document</code> - Блокировать документы
  <code>video</code> - Блокировать видео
  <code>videonote</code> - Блокировать видеозаметки
  <code>contact</code> - Блокировать контакты
  <code>photo</code> - Блокировать фото
  <code>gif</code> - Блокировать GIF
  <code>url</code> - Блокировать URL
  <code>bots</code> - Предотвращать добавление ботов
  <code>forward</code> - Блокировать пересылки
  <code>game</code> - Блокировать игры
  <code>location</code> - Блокировать местоположения
  <code>rtl</code> - Блокировать RTL текст
  <code>anonchannel</code> - Блокировать сообщения канала

  <b>Блокировки ограничений</b> (6 типов)
