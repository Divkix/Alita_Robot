warns_help_msg: |
  "Держите ваших участников в порядке с помощью предупреждений; не давайте им выходить из под контроля!\n\n  Если вы ищете автоматические предупреждения, прочитайте о модуле чёрного списка!\n\n\n  *Команды администратора:*\n\n  - /warn <reason>: Предупредить пользователя.\n\n  - /dwarn <reason>: Предупредить пользователя через ответ и удалить его сообщение.\n\n  - /swarn <reason>: Тихо предупредить пользователя и удалить ваше сообщение.\n\n  - /warns: Посмотреть предупреждения пользователя.\n\n  - /rmwarn: Удалить последнее предупреждение пользователя.\n\n  - /resetwarn: Сбросить все предупреждения пользователя на 0.\n\n  - /resetallwarns: Удалить все предупреждения в чате. Все пользователи возвращаются к 0 предупреждений.\n\n  - /warnings: Получить настройки предупреждений чата.\n\n  - /setwarnmode <ban/kick/mute>: Установить режим предупреждений чата.\n\n  - /setwarnlimit <number>: Установить количество предупреждений до применения наказания.\n\n\n  *Примеры*\n\n  - Предупредить пользователя.\n\n  -> `/warn @user За нарушение правил`"

