admin_help_msg: "Облегчите продвижение и понижение пользователей с помощью модуля администратора!\n\n\n  *Пользовательские команды:*\n\n  × /adminlist: Список администраторов в текущем чате.\n\n\n  *Команды администратора:*\n\n  × /promote `<reply/username/mention/userid>`: Повысить пользователя.\n\n  × /demote `<reply/username/mention/userid>`: Понизить пользователя.\n\n  × /title `<reply/username/mention/userid>` `<custom title>`: Установить заголовок администратора для пользователя"
