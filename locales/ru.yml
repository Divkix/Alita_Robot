connections_help_msg: |
  "Этот модуль позволяет вам подключиться к базе данных чата и\n  добавлять вещи в неё, не сообщая чату об этом! По понятным причинам, вы должны быть администратором, чтобы добавлять вещи; но любой участник может просматривать ваши данные. (забаненные/выгнанные пользователи не могут!)\n\n\n  *Команды*:\n\n  × /connect `<chatid>`: Подключиться к указанному чату, позволяя просматривать/редактировать содержимое.\n\n  × /disconnect: Отключиться от текущего чата.\n\n  × /reconnect: Подключиться снова к ранее подключенному чату\n\n  × /connection: Посмотреть информацию о текущем подключенном чате.\n\n\n  *Команды администратора:*\n\n  × /allowconnect <yes/no>: Разрешить или запретить пользователям подключаться к чатам.\n\n\n  Вы можете получить ID чата, используя команду /id в вашем чате. Не удивляйтесь, если ID отрицательный; все супергруппы имеют отрицательные ID."
