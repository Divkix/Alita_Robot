disabling_help_msg: |
  "Этот модуль позволяет вам отключить некоторые часто используемые команды,\n  чтобы никто не мог их использовать. Это также позволит вам автоматически удалять их, не позволяя людям использовать синий текст.\n\n\n  *Команды администратора*:\n\n  × /disable `<commandname>`: Запретить пользователям использовать commandname в этой группе.\n\n  × /enable `<item name>`: Разрешить пользователям использовать commandname в этой группе.\n\n  × /disableable: Список всех отключаемых команд.\n\n  × /disabledel `<yes/no/on/off>`: Удалять отключенные команды, когда используются не-администраторами.\n\n  × /disabled: Список отключенных команд в этом чате.\n\n\n  Примечание:\n\n  При отключении команды, команда отключается только для не-администраторов. Все администраторы могут по-прежнему использовать эти команды.\n\n  Отключенные команды всё ещё доступны через функцию /connect. Если вам интересно, чтобы это также было отключено, дайте мне знать в чате поддержки."
filters_help_msg: |
  "Фильтры нечувствительны к регистру; каждый раз, когда кто-то говорит ваши триггерные слова, Alita будет отвечать чем-то другим! Это можно использовать для создания ваших команд, если desired.\n\n\n  Команды:\n\n  - /filter <trigger> <reply>: Каждый раз, когда кто-то говорит trigger, бот будет отвечать предложением. Для многословных фильтров заключите trigger в кавычки.\n\n  - /filters: Список всех фильтров чата.\n\n  - /stop <trigger>: Остановить бота от ответа на trigger.\n\n  - /stopall: Остановить ВСЕ фильтры в текущем чате. Это действие не может быть отменено.\n\n\n  Примеры:\n\n  - Установить фильтр:\n\n  -> /filter hello Hello there! How are you?\n\n  - Установить многословный фильтр:\n\n  -> /filter hello friend Hello back! Long time no see!\n\n  - Установить фильтр, который могут использовать только администраторы:\n\n  -> /filter example This filter won't  happen if a normal user says it {admin}\n\n  - Чтобы сохранить файл, изображение, gif или любое другое вложение, просто ответьте на файл с:\n\n  -> /filter trigger"
formatting_fillings: "<b>Заполнения</b>\n\n\n  Вы также можете настроить содержимое вашего сообщения с помощью контекстных данных. Например, вы могли бы упомянуть пользователя по имени в приветственном сообщении или упомянуть их в фильтре!\n\n  Вы можете использовать это, чтобы упоминать пользователя в заметках!\n\n\n  <b>Поддерживаемые заполнения:</b>\n\n  - <code>{first}</code>: Имя пользователя.\n\n  - <code>{last}</code>: Фамилия пользователя.\n\n  - <code>{fullname}</code>: Полное имя пользователя.\n\n  - <code>{username}</code>: Имя пользователя. Если у них его нет, упоминает пользователя вместо этого.\n\n  - <code>{mention}</code>: Упоминает пользователя с его именем.\n\n  - <code>{id}</code>: ID пользователя.\n\n  - <code>{chatname}</code>: Название чата.\n\n  - <code>{rules}</code>: Добавляет кнопку Правила в сообщение.\n\n  - <code>{protect}</code>: Защищает содержимое от пересылки.\n\n  - <code>{preview}</code>: Включает превью в сообщениях.\n\n  - <code>{nonotif}</code>: Отключает уведомление для этого сообщения."
formatting_help_msg: "Alita поддерживает большое количество опций форматирования, чтобы сделать ваши сообщения более выразительными. Посмотрите, нажав кнопки ниже!"
formatting_markdown: |
  <b>Форматирование Markdown</b>\n\n  Вы можете форматировать ваше сообщение, используя <b>жирный</b>, <i>курсив</i>, <u>подчёркнутый</u>,\n  и многое другое. Экспериментируйте!\n\n  <b>Поддерживаемый markdown</b>:\n\n  - <code>`code words`</code>: Обратные кавычки используются для моноширинных шрифтов. Показывается как: <code>code words</code>.\n\n  - <code>_italic words_</code>: Подчёркивания используются для курсивных шрифтов. Показывается как: <i>italic words</i>.\n\n  - <code>*bold words*</code>: Звёздочки используются для жирных шрифтов. Показывается как: <b>bold words</b>.\n\n  - <code>~strikethrough~</code>: Тильды используются для зачёркивания. Показывается как: <strike>strikethrough</strike>.\n\n  - <code>||spoiler||</code>: Двойные вертикальные черты используются для спойлеров. Показывается как: <tg-spoiler>Spoiler</tg-spoiler>.\n\n  - <code>```pre```</code>: Чтобы форматер игнорировал другие символы форматирования внутри текста, отформатированного с помощью '```', будет: <code>**bold** | *bold*</code>.\n\n  - <code>__underline__</code>: Двойные подчёркивания используются для подчёркивания. Показывается как: underline. ПРИМЕЧАНИЕ: Некоторые клиенты пытаются быть умными и интерпретируют это как курсив. В таком случае попробуйте использовать встроенное форматирование вашего приложения.\n\n  - <code>[hyperlink](example.com)</code>: Это форматирование, используемое для гиперссылок. Показывается как: <a href='https://example.com/'>hyperlink</a>.\n\n  - <code>[My Button](buttonurl://example.com)</code>: Это форматирование, используемое для создания кнопок. Этот пример создаст кнопку с названием "My button", которая открывает <code>example.com</code> при нажатии.\n\n  Если вы хотите отправить кнопки в одном ряду, используйте форматирование <code>:same</code>.\n\n  <b>Пример:</b>\n\n  <code>[button 1](buttonurl:example.com)</code>\n\n  <code>[button 2](buttonurl://example.com:same)</code>\n\n  <code>[button 3](buttonurl://example.com)</code>\n\n  Это покажет кнопки 1 и 2 в одной строке, а 3 под ними.
formatting_random: |
  <b>Случайное содержимое</b>\n\n  Ещё одна вещь, которая может быть интересной, — это рандомизировать содержимое сообщения. Сделайте вещи немного более персональными, изменяя приветственные сообщения или заметки!\n\n  Как использовать случайное содержимое:\n\n  - %%%: Этот разделитель можно использовать для добавления случайных ответов бота.\n\n  Например:\n\n  <code>hello\n\n  %%%\n\n  how are you</code>\n\n  Это случайно выберет между отправкой первого сообщения, "hello", или второго сообщения, "how are you".\n\n  Используйте это, чтобы сделать Alita немного более индивидуальной! (работает только в фильтрах/заметках)\n\n  Пример приветственного сообщения:\n\n  - Каждый раз, когда новый пользователь присоединяется, ему будет показано одно из трёх сообщений,\n  показанных здесь.\n\n  -> /filter "hey"\n\n  hello there <code>{first}</code>!\n\n  %%%\n\n  Ooooh, <code>{first}</code> how are you?\n\n  %%%\n\n  Sup? <code>{first}</code>
greetings_help_msg: |
  "Приветствуйте новых участников ваших групп или прощайтесь с ними после их ухода!\n\n\n  *Команды администратора:*\n\n  × /setwelcome `<reply/text>`: Устанавливает приветственный текст для группы.\n\n  × /welcome `<yes/no/on/off>`: Включает или отключает приветственные настройки для группы.\n\n  × /resetwelcome: Сбрасывает приветственное сообщение на стандартное.\n\n  × /setgoodbye `<reply/text>`: Устанавливает прощальное текст для группы.\n\n  × /goodbye `<yes/no/on/off>`: Включает или отключает прощальные настройки для группы.\n\n  × /resetgoodbye: Сбрасывает прощальное сообщение на стандартное.\n\n  × /cleanservice `<yes/no/on/off>`: Удаляет все служебные сообщения, такие как уведомления 'x присоединился к группе'.\n\n  × /cleanwelcome `<yes/no/on/off>`: Удаляет старое приветственное сообщение, всякий раз, когда новый участник присоединяется.\n\n  × /autoapprove `<yes/no/on/off>`: Автоматически одобрять всех новых участников."
help_about: "@%s  — один из самых быстрых и функциональных менеджеров групп.\n\n\n  Alita ✨ разработан и активно поддерживается @DivideProjects!\n\n\n  Alita работает с 2020 года и обслуживала тысячи групп с сотнями\n  тысяч пользователей!\n\n\n  <b>Почему Alita:</b>\n\n  - Простота: Лёгкое использование и совместимость с многими командами бота.\n\n  - Функциональность: Множество функций, которых нет у других ботов управления группами.\n\n  - Скорость: Угадайте? Это не сделано на Python, мы используем <a href='https://go.dev/'>Go</a>\n  в качестве основного языка программирования.\n\n\n  <b>Текущая версия:</b> %s"
help_configuration_step-1: |
  "Добро пожаловать в конфигурацию Alita\n\n\n  Первое, что нужно сделать, — добавить Alita ✨ в вашу группу! Для этого нажмите кнопку ниже и выберите вашу группу, затем нажмите Готово для продолжения обучения."
help_configuration_step-2: |
  "Хорошо, молодец!\n\n\n  Теперь, чтобы я работал правильно, вам нужно сделать меня администратором вашей группы!\n\n  Для этого выполните следующие простые шаги:\n\n  ▫️ Перейдите в вашу группу\n\n  ▫️ Нажмите на название группы\n\n  ▫️ Нажмите Изменить\n\n  ▫️ Нажмите на Администраторы\n\n  ▫️ Нажмите Добавить администратора\n\n  ▫️ Нажмите на Лупу\n\n  ▫️ Найдите @%s\n\n  ▫️ Подтвердите"
help_configuration_step-3: |
  "Отлично!\n\n\n  Теперь бот готов к использованию!\n\n  Все команды можно использовать с / или !\n\n\n  Если у вас возникают трудности с настройкой меня в вашей группе, не стесняйтесь зайти в @DivideSupport.\n\n  Мы будем рады помочь вам."
help_donatetext: |
  "Так вы хотите сделать пожертвование? Потрясающе!\n\n  Когда вы жертвуете, все средства идут на мою разработку, что делает меня быстрым и отзывчивым.\n\n  Ваше пожертвование также может помочь мне получить одну или две новые функции, которых я не смог получить из-за ограничений сервера.\n\n  Все средства будут направлены на мои сервисы, такие как база данных, хранилище и хостинг!\n\n  Вы можете пожертвовать, связавшись с моим владельцем здесь: @DivideProjectsBot"
help_info_about_header: "Информация и О нас\n\n\n\nВот некоторые часто задаваемые вопросы об Alita."
help_news_channel_text: "Присоединяйтесь к моему <a href='https://t.me/AlitaRobotUpdates'>Каналу новостей</a>, чтобы получать информацию обо всех последних обновлениях."
help_all_commands_usage: "Все команды можно использовать со следующим: / или !"
