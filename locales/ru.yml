locks_notes_docs: |
  <b>Технические примечания</b>
  • Принудительное применение блокировок происходит в реальном времени
  • Администраторы освобождены от всех блокировок
  • Блокировки сохраняются при перезапуске бота
  • Кэш инвалидируется при обновлениях

# Languages extended docs
languages_extended_docs: |
  <b>Как это работает</b>
  • <b>Личные чаты:</b> Любой пользователь может изменить свой личный язык
  • <b>Групповые чаты:</b> Только администраторы могут изменить язык группы

  Языковые предпочтения кэшируются для производительности и хранятся отдельно для пользователей и групп.

# Greetings extended docs
greetings_extended_docs: |
  <b>Интеграция с Captcha</b>
  Когда модуль Captcha включён:
  1. Новые участники заглушаются при присоединении
  2. Отправляется задание капчи вместо приветствия
  3. После верификации отправляется приветственное сообщение
  4. Неудачная верификация применяет действие капчи

# Extended documentation locale keys - Notes module
notes_extended_docs: |
  <b>Функции:</b>
  • <b>Поддержка текста и медиа</b>: Сохраняйте текстовые сообщения, фото, видео, документы и многое другое
  • <b>Пользовательские кнопки</b>: Добавляйте встроенные клавиатуры к заметкам
  • <b>Опции форматирования</b>: Контролируйте видимость и поведение заметок
  • <b>Заметки только для администраторов</b>: Ограничьте определённые заметки только для администраторов
  • <b>Приватные заметки</b>: Отправляйте заметки пользователям лично через ЛС
  • <b>Управление веб-превью</b>: Включайте или отключайте превью ссылок
  • <b>Защищённый контент</b>: Предотвращайте пересылку содержимого заметки

  <b>Опции форматирования заметок:</b>
  При сохранении заметки вы можете использовать специальные теги для управления её поведением:
  • <code>{private}</code> - Заметка будет отправлена только через ЛС, никогда в группу
  • <code>{noprivate}</code> - Заметка будет отправлена только в группу, никогда через ЛС
  • <code>{admin}</code> - Заметка доступна только администраторам
  • <code>{protect}</code> - Контент нельзя пересылать
  • <code>{nonotif}</code> - Отправить без звука уведомления
  • <code>{nopreview}</code> - Отключить превью ссылки

  <b>Режим приватных заметок:</b>
  Когда приватные заметки включены (<code>/privatenotes on</code>), все заметки отправляются пользователям через ЛС вместо группы. Это сохраняет групповой чат чистым.

  Отдельные заметки могут переопределять это поведение:
  • <code>{private}</code> - Всегда отправлять приватно
  • <code>{noprivate}</code> - Всегда отправлять в группу

  <b>Необработанная заметка (без форматирования):</b>
  Чтобы увидеть неформатированное содержимое заметки (включая коды форматирования):
  <code>/get notename noformat</code>

notes_permissions_docs: |
  <b>Требуемые разрешения:</b>
  • Сохранить/Удалить заметки: Изменить информацию о группе
  • Просмотреть админские заметки: Статус администратора
  • Очистить все заметки: Владелец чата
  • Получить обычные заметки: Любой пользователь

# Extended documentation locale keys - Pins module
pins_extended_docs: |
  <b>Функции:</b>

  <b>Анти-канальное закрепление:</b>
  Когда включено, бот будет автоматически откреплять любое сообщение, которое автоматически закрепляется связанным каналом. Это полезно, когда вы хотите контролировать, что закрепляется в вашей группе.

  <b>Важно:</b> При использовании анти-канальных закреплений всегда используйте команду <code>/unpin</code> вместо ручного открепления через Telegram. Ручное открепление приведёт к тому, что старое сообщение будет снова закреплено, когда канал отправит новые сообщения.

  <b>Чистить связанный:</b>
  Когда включено, бот будет автоматически удалять любые сообщения, отправленные в группу из связанного канала. Это сохраняет ваш групповой чат чистым от кросс-постов канала.

  <b>Пермапин:</b>
  Создавайте пользовательские закреплённые сообщения с:
  • Текстом с HTML/Markdown разметкой
  • Встроенными кнопками с URL
  • Медиа вложениями (фото, документы, стикеры, аудио, видео, голосовые сообщения, видеозаметки)
  • Всеми стандартными заполнениями ({first}, {chatname}, и т.д.)

  <b>Поддерживается через подключение:</b>
  Следующие команды работают при подключении к чату через <code>/connect</code>:
  • <code>/antichannelpin</code>
  • <code>/cleanlinked</code>

pins_notes_docs: |
  <b>Примечания:</b>
  • Команда <code>/unpinall</code> показывает диалог подтверждения перед откреплением всех сообщений
  • Пермапин поддерживает все типы медиа, которые поддерживает Telegram для закрепления
  • Настройки анти-канального закрепления и чистки связанного сохраняются на чат и сохраняются при перезапуске бота

  <b>Требуемые разрешения:</b>
  <b>Бот:</b> Должен быть администратором с разрешением "Закрепление сообщений"
  <b>Пользователь:</b> Большинство команд требуют администратора с разрешением "Закрепление сообщений"

# Extended documentation locale keys - Purges module
purges_extended_docs: |
  <b>Удаление диапазона с purgefrom/purgeto:</b>
  Когда вам нужен больше контроль над диапазоном удаления:

  1. Ответьте на <b>первое</b> сообщение в диапазоне:
  <code>/purgefrom</code>
  Бот подтвердит, что сообщение отмечено (истекает через 30 секунд).

  2. Ответьте на <b>последнее</b> сообщение в диапазоне:
  <code>/purgeto</code>
  Все сообщения между двумя маркерами (включительно) будут удалены.

  Это полезно, когда вы не можете легко прокрутить до начальной точки или нужно проверить диапазон перед удалением.

  <b>Лимиты и ограничения:</b>
  • <b>Максимум сообщений за очистку:</b> 1000 сообщений
  • <b>Ограничение возраста сообщений:</b> Сообщения старше 48 часов могут быть неудаляемы (ограничение API Telegram)
  • <b>Требуемые разрешения:</b> И пользователь, и бот должны иметь разрешение "Удаление сообщений"

purges_notes_docs: |
  <b>Примечания:</b>
  • Маркер <code>/purgefrom</code> истекает через 30 секунд, если не последует <code>/purgeto</code>
  • Удаление больших диапазонов использует параллельную обработку для лучшей производительности
  • Статусные сообщения (показывающие, сколько сообщений было удалено) автоудаляются через 3 секунды
  • Бот корректно обрабатывает уже удалённые сообщения без ошибок

# Extended documentation locale keys - Reports module
reports_extended_docs: |
  <b>Как это работает:</b>

  <b>Сообщение о сообщении:</b>
  1. <b>Ответьте на нарушающее сообщение</b> с помощью <code>/report</code> или упомяните <code>@admin</code>
  2. Бот отправляет уведомление, упоминая всех администраторов, у которых включены отчёты
  3. Уведомление включает кнопки действий для быстрой модерации

  <b>Кнопки действий администратора:</b>
  • <b>📩 Сообщение</b> - Ссылка на сообщённое сообщение
  • <b>👢 Выгнать</b> - Выгнать сообщённого пользователя (они могут переприсоединиться)
  • <b>🚫 Забанить</b> - Навсегда забанить сообщённого пользователя
  • <b>🗑 Удалить</b> - Удалить сообщённое сообщение
  • <b>✅ Решено</b> - Отметить отчёт как решённый без действия

  <b>Личные настройки против групповых:</b>
  • <b>В ЛС:</b> <code>/reports on/off</code> переключает, будете ЛИ ВЫ получать уведомления об отчётах
  • <b>В группе:</b> <code>/reports on/off</code> переключает, включены ли отчёты для этой группы

reports_permissions_docs: |
  <b>Кто может сообщать?</b>
  ✅ Обычные пользователи
  ❌ Администраторы (не нужно сообщать самим себе)
  ❌ Заблокированные пользователи
  ❌ Анонимные каналы / Системные аккаунты Telegram

  <b>Кто может быть сообщён?</b>
  ✅ Обычные пользователи
  ❌ Сам бот
  ❌ Администраторы (защищены от отчётов)
  ❌ Анонимные каналы / Системные аккаунты Telegram

# Extended documentation locale keys - Rules module
rules_extended_docs: |
  <b>Функции:</b>

  <b>Приватные правила:</b>
  Включите приватные правила (<code>/privaterules on</code>), чтобы отправлять правила через ЛС вместо группы. Это сохраняет групповой чат чистым.

  <b>Пользовательская кнопка правил:</b>
  Установите пользовательский текст кнопки (макс. 30 символов):
  <code>/rulesbtn Просмотреть правила</code>

  Сбросить на стандарт:
  <code>/resetrulesbtn</code>

  <b>Установка правил:</b>
  Вы можете установить правила, предоставив текст напрямую или ответив на сообщение:
  <code>/setrules Пожалуйста, будьте взаимно вежливы со всеми участниками.</code>

  Или ответьте на сообщение:
  <code>/setrules</code>

  <b>Требуемые разрешения:</b>
  • Пользовательские команды: Доступны всем пользователям
  • Команды администратора: Требуют прав администратора в чате

# Extended documentation locale keys - Warns module
warns_extended_docs: |
  <b>Настройки по умолчанию:</b>
  • <b>Лимит предупреждений по умолчанию:</b> 3 предупреждения
  • <b>Режим предупреждений по умолчанию:</b> mute

  <b>Доступные режимы предупреждений:</b>
  • <code>ban</code> - Навсегда забанить пользователя из чата
  • <code>kick</code> - Выгнать пользователя (они могут переприсоединиться)
  • <code>mute</code> - Заглушить пользователя (не может отправлять сообщения)

  <b>Бесшумные и удаляющие предупреждения:</b>
  • <code>/swarn</code> - Удалить вашу команду и предупредить бесшумно
  • <code>/dwarn</code> - Удалить сообщение пользователя и предупредить его

warns_permissions_docs: |
  <b>Требования к разрешениям:</b>
  • <code>/warn</code>, <code>/dwarn</code>, <code>/swarn</code>: Бот админ + Пользователь админ с правом ограничения
  • <code>/rmwarn</code>, <code>/unwarn</code>: Бот админ + Пользователь админ
  • <code>/resetwarn</code>, <code>/resetwarns</code>: Бот админ + Пользователь админ
  • <code>/resetallwarns</code>: Только владелец чата
  • <code>/setwarnmode</code>, <code>/setwarnlimit</code>: Бот админ + Пользователь админ
  • <code>/warnings</code>: Бот админ + Пользователь админ
  • <code>/warns</code>: Любой пользователь (отключаемый)

warns_notes_docs: |
  <b>Примечания:</b>
  • Когда пользователь достигает лимита предупреждений, настроенное действие (ban/kick/mute) применяется автоматически
  • Причины предупреждений сохраняются и отображаются при проверке предупреждений пользователя
  • Команда <code>/warns</code> — единственная команда в этом модуле, которую могут отключить администраторы
  • Сообщения анонимных каналов нельзя предупредить
  • Администраторов нельзя предупредить

# Extended documentation locale keys - Mutes module
mutes_extended_docs: |
  <b>Формат времени для временных мутов:</b>
  • <code>m</code> = минуты (например, <code>30m</code>)
  • <code>h</code> = часы (например, <code>2h</code>)
  • <code>d</code> = дни (например, <code>1d</code>)

  <b>Варианты мута:</b>
  • <code>/mute</code> - Стандартный мьют с опциональной причиной
  • <code>/smute</code> - Бесшумный мьют (удаляет ваше командное сообщение)
  • <code>/dmute</code> - Удаляющий-мьют (заглушает пользователя и удаляет его сообщение)
  • <code>/tmute</code> - Временный мьют с указанной продолжительностью

  <b>Требуемые разрешения:</b>
  <b>Только для администраторов.</b> Пользователи, выполняющие эти команды, должны иметь:
  • Статус администратора в чате
  • Разрешение на ограничение участников

  Бот также должен иметь привилегии администратора с разрешением на ограничение участников.

# Extended documentation locale keys - Filters module
filters_extended_docs: |
  <b>Продвинутые функции:</b>

  <b>Случайные ответы:</b>
  Используйте <code>%%%</code> для разделения нескольких ответов. Один будет выбран случайно:
  <code>/filter hello Привет!%%%Привет!%%%Привет, как дела?</code>

  <b>Медиа фильтры:</b>
  Ответьте на любое медиа (фото, видео, документ, стикер и т.д.) с помощью <code>/filter trigger</code>, чтобы создать фильтр, который отправляет это медиа.

  <b>Режим без форматирования:</b>
  Администраторы могут видеть неформатированное содержимое фильтра (включая коды форматирования), добавив <code>noformat</code> после триггера:
  <code>hello noformat</code>
  Это полезно для отладки фильтров или просмотра конфигураций кнопок.

  <b>Кнопки фильтров:</b>
  Вы можете добавлять встроенные кнопки к вашим фильтрам:
  <code>/filter hello Привет! Посмотрите эти ссылки:
  [Кнопка 1](buttonurl:https://example.com)
  [Кнопка 2](buttonurl:https://example2.com)</code>

filters_technical_docs: |
  <b>Как работают фильтры:</b>
  1. Когда получено сообщение, бот выбирает все фильтры для чата с помощью оптимизированного кэшированного запроса
  2. Алгоритм Ахо-Корасик эффективно сопоставляет все ключевые слова фильтров с текстом сообщения
  3. Первый подходящий фильтр запускает ответ
  4. Фильтры поддерживают текстовые, медиа и кнопочные ответы

  <b>Подтверждение перезаписи:</b>
  Когда вы пытаетесь добавить фильтр, который уже существует, бот запросит подтверждение перед перезаписью. Подтверждение истекает через 5 минут.

  <b>Поведение кэша:</b>
  • Списки фильтров кэшируются на 15 минут на чат
  • Кэш автоматически инвалидируется, когда фильтры добавляются или удаляются

filters_limits_docs: |
  <b>Лимиты:</b>
  • Максимум 150 фильтров на чат
  • Максимум 100 символов на ключевое слово фильтра
  • Ключевые слова фильтров хранятся в нижнем регистре

  <b>Требуемые разрешения:</b>
  • <code>/filter</code>, <code>/addfilter</code>: Админ с правом Изменить информацию
  • <code>/stop</code>, <code>/rmfilter</code>, <code>/removefilter</code>: Админ с правом Изменить информацию
  • <code>/stopall</code>: Только владелец чата
  • <code>/filters</code>: Доступно всем пользователям

# Extended documentation locale keys - Captcha module
captcha_extended_docs: |
  <b>Как это работает:</b>
  1. Когда капча включена, новые участники автоматически заглушаются при присоединении
  2. Задание капчи отправляется новому участнику
  3. Пользователь должен выбрать правильный ответ из предоставленных опций
  4. При успехе пользователь размучается и может участвовать в группе
  5. При неудаче или таймауте применяется настроенное действие (kick, ban или mute)

  <b>Типы капчи:</b>
  • <b>Math</b>: Решение простых математических задач (сложение, вычитание, умножение)
  • <b>Text</b>: Распознавание текста, показанного на искажённом изображении

  <b>Функция ожидающих сообщений:</b>
  Когда пользователь проходит капчу, любые сообщения, которые он пытается отправить, сохраняются и удаляются. Администраторы могут:
  • Просмотреть, какие сообщения пытался отправить пользователь, используя <code>/captchapending</code>
  • Очистить сохранённые сообщения, используя <code>/captchaclear</code>

  Это помогает идентифицировать потенциальные попытки спама до того, как пользователи завершат верификацию.

captcha_permissions_docs: |
  <b>Требования к боту:</b>
  • Бан пользователей (для действий kick/ban)
  • Ограничение участников (для заглушения во время верификации)
  • Удаление сообщений (для очистки сообщений капчи)

  <b>Действия при неудаче:</b>
  • <code>kick</code> - Забанить, затем немедленно разбанить (позволяет пользователю переприсоединиться)
  • <code>ban</code> - Навсегда забанить пользователя
  • <code>mute</code> - Оставить пользователя заглушенным на 24 часа

# Extended documentation locale keys - Blacklists module
blacklists_extended_docs: |
  <b>Доступные действия:</b>
  Следующие действия можно установить с помощью <code>/blaction</code>:
  • <code>none</code> - Просто удаляет сообщение без каких-либо дополнительных действий
  • <code>warn</code> - Удаляет сообщение и выдаёт предупреждение пользователю (по умолчанию)
  • <code>mute</code> - Удаляет сообщение и заглушает пользователя
  • <code>kick</code> - Удаляет сообщение и выгоняет пользователя (они могут переприсоединиться)
  • <code>ban</code> - Удаляет сообщение и навсегда банит пользователя

  <b>Примечание:</b>
  Режим по умолчанию для Чёрного списка <b>warn</b>, который удалит сообщение и выдаст предупреждение пользователю.

  <b>Команды:</b>
  • <code>/addblacklist &lt;trigger&gt;</code> - Добавляет слово в чёрный список в текущем чате
  • <code>/rmblacklist &lt;trigger&gt;</code> - Удаляет слово из чёрного списка в текущем чате
  • <code>/blaction &lt;mute/kick/ban/warn/none&gt;</code> - Устанавливает действие, выполняемое ботом при обнаружении слова из чёрного списка
  • <code>/remallbl</code> - Удаляет все слова из чёрного списка чата (Только для владельца)

# Extended documentation locale keys - Disabling module
disabling_extended_docs: |
  <b>Ключевые функции:</b>
  • Отключить определённые команды бота для не-админов пользователей
  • Администраторы всегда могут обходить отключённые команды
  • Опциональное автоматическое удаление сообщений отключённых команд
  • Поддержка отключения нескольких команд одновременно

  <b>Отключить несколько команд:</b>
  <code>/disable adminlist rules info</code>
  Отключает команды <code>/adminlist</code>, <code>/rules</code> и <code>/info</code> одновременно.

  <b>Переключить удаление команд:</b>
  <code>/disabledel on</code> - Отключённые сообщения теперь будут удаляться.
  <code>/disabledel off</code> - Отключённые сообщения больше не будут удаляться.
  <code>/disabledel</code> - Проверить текущую настройку удаления.

disabling_notes_docs: |
  <b>Важные примечания:</b>
  • <b>Обход администратором:</b> Отключённые команды влияют только на не-админов пользователей. Все администраторы могут по-прежнему использовать любую команду.
  • <b>Поддержка подключения:</b> Отключённые команды всё ещё доступны через функцию <code>/connect</code> для подключённых чатов.
  • <b>Несколько команд:</b> И <code>/disable</code>, и <code>/enable</code> поддерживают несколько имён команд в одном сообщении.
  • <b>Обработка ошибок:</b> Если некоторые команды не удалось отключить/включить, вы будете уведомлены, какие из них успешны, а какие нет.

  <b>Требуемые разрешения:</b>
  • <code>/disable</code>, <code>/enable</code>, <code>/disabledel</code>: Только администратор
  • <code>/disableable</code>, <code>/disabled</code>: Все пользователи (но <code>/disabled</code> можно отключить)

