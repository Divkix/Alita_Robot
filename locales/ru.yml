connections_stale_connection: "Ваше подключение устарело — я больше не имею доступа к этому чату. Пожалуйста, используйте /connect для повторного подключения к действующему чату."
connections_reconnect_need_pm: Вам нужно быть в ЛС со мной, чтобы подключиться к чату!
