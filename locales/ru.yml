help_config_private_only: Конфигурация работает только в личном чате
help_bot_intro: "Привет! Меня зовут Alita ✨.\nЯ здесь, чтобы помочь вам управлять вашими группами!\nНажмите /help, чтобы узнать больше о том, как использовать меня на полную.\n"
help_pm_intro: |
  Привет %s!
  Меня зовут Alita ✨.

  Я бот для управления группами, здесь, чтобы помочь вам разобраться и поддерживать порядок в ваших группах!
  У меня много удобных функций, таких как контроль флуда, система предупреждений, система хранения заметок и даже заранее заданные ответы на определённые ключевые слова.

  Полезные команды:
  - /start: Запускает меня! Вы, вероятно, уже использовали это.
  - /help: Отправляет это сообщение; Я расскажу вам больше о себе!
  - /donate: Даёт вам информацию о том, как поддержать меня и моего создателя.

  Если у вас есть какие-либо баги или вопросы о том, как использовать меня, посмотрите на мой сайт или зайдите в @DivideSupport.
  Все команды можно использовать с / или !.

languages_help_msg: |
  "Не можете изменить язык бота?\n\n  Легко изменить, используя этот модуль!\n\n\n  Просто введите /lang и используйте встроенную клавиатуру, чтобы выбрать язык для себя или вашей группы.\n\n\n  Вы можете помочь нам принести бота на больше языков, помогая на [Crowdin](https://crowdin.com/project/alita_robot)"
locks_help_msg: "*Только для администратора*:\n\n  × /lock `<permission>`: Заблокировать разрешение чата..\n\n  × /unlock `<permission>`: Разблокировать разрешение чата.\n\n  × /locks: Просмотреть разрешения чата.\n\n  × /locktypes: Проверить доступные типы блокировок!\n\n\n  Блокировки могут использоваться для ограничения пользователей группы.\n\n  Блокировка URL-адресов будет автоматически удалять все сообщения с URL-адресами, блокировка стикеров будет удалять все стикеры и т.д.\n\n  Блокировка ботов остановит не-администраторов от добавления ботов в чат.\n\n\n  **Пример:**\n\n  `/lock media`: это блокирует все медиа-сообщения в чате."
misc_help_msg: |
  "× /info: Получить вашу информацию о пользователе, которую можно использовать как ответ или передав ID пользователя или Имя пользователя.\n\n  × /id: Получить текущий ID группы. Если используется с ответом на сообщение, получить ID этого пользователя.\n\n  × /ping: Проверить связь с сервером Telegram!\n\n  × /tr <lang code> <msg/reply to message>: Перевести сообщение.\n\n  × /removebotkeyboard: Удаляет зависшую клавиатуру бота из вашего чата.\n\n  × /stat: Получает количество общего числа сообщений в чате."
mutes_help_msg: |
  "Иногда пользователи могут раздражать, и вы можете захотеть ограничить их\n  от отправки сообщения в чат, этот модуль здесь, чтобы помочь, вы можете использовать этот модуль, чтобы заглушать участников в вашей группе.\n\n\n  *Команды мута:* (только для администратора)\n\n  × /mute <userhandle>: заглушает пользователя, (через ник или ответ)\n\n  × /smute <userhandle>: заглушает пользователя без звука, не отправляет сообщение в группу,\n  а также удаляет вашу команду. (через ник или ответ)\n\n  × /dmute <userhandle>: заглушает пользователя и удаляет ответное сообщение. (через ник или ответ)\n\n  × /tmute <userhandle> x(m/h/d): заглушает пользователя на `x` время. (через ник или ответ).\n  m = минуты, h = часы, d = дни.\n\n  × /unmute <userhandle>: снимает заглушку с пользователя. (через ник или ответ)"
notes_help_msg: 'Сохраняйте данные для будущих пользователей с помощью заметок!\n\n  Заметки отлично подходят для сохранения случайных кусочков информации; номер телефона, приятный gif,\n  забавная картинка — что угодно!\n\n  *Пользовательские команды:*\n\n  - /get <notename>: Получить заметку.\n\n  - #notename: То же, что и /get.\n\n  Команды администратора:\n\n  - /save <notename> <note text>: Сохранить новую заметку с названием "word". Ответ на сообщение сохранит это сообщение. Работает даже с медиа!\n\n  - /clear <notename>: Удалить связанную заметку.\n\n  - /notes: Список всех заметок в текущем чате.\n\n  - /saved: То же, что и /notes.\n\n  - /clearall: Удалить ВСЕ заметки в чате. Это нельзя отменить.\n\n  - /privatenotes: Отправлять ли заметки в ЛС. Будет отправлено сообщение с кнопкой, которую пользователи могут нажать, чтобы получить заметку в ЛС.'
pins_help_msg: |
  "Все команды, связанные с закреплением, можно найти здесь; держите ваш чат в курсе\n  последних новостей с помощью простого закреплённого сообщения!\n\n\n  *Пользовательские команды:*\n\n  × /pinned: Получить текущее закреплённое сообщение.\n\n\n  *Команды администратора:*\n\n  × /pin: Закрепить сообщение, на которое вы ответили. Добавьте 'loud' или 'notify', чтобы отправить уведомление участникам группы.\n\n  × /pinned: Получает последнее закреплённое сообщение в текущем чате.\n\n  × /permapin <text>: Закрепить пользовательское сообщение через бота. Это сообщение может содержать разметку, кнопки и все остальные крутые функции.\n\n  × /unpin: Открепить текущее закреплённое сообщение. Если используется как ответ, открепляет сообщение, на которое ответили.\n\n  × /unpinall: Открепляет все закреплённые сообщения.\n\n  × /antichannelpin <yes/no/on/off>: Не позволять Telegram автоматически закреплять связанные каналы.\n  Если аргументы не указаны, показывает текущую настройку.\n\n  × /cleanlinked <yes/no/on/off>: Удалять сообщения, отправленные связанным каналом.\n\n  Примечание: При использовании анти-канальных закреплений, убедитесь, что используете команду /unpin вместо ручного открепления. Иначе старое сообщение будет снова закреплено, когда канал отправит любые сообщения."
purges_help_msg: "*Только для администратора:*\n\n  - /purge: удаляет все сообщения между этим и ответным сообщением.\n\n  - /del: удаляет сообщение, на которое вы ответили.\n\n\n  *Примеры*:\n\n  - Удалить все сообщения с ответного сообщения до сих пор.\n\n  -> `/purge`"
reports_help_msg: |
  "Мы все занятые люди, у которых нет времени следить за нашими группами\n  24/7. Но как вы реагируете, если кто-то в вашей группе спамит?\n\n\n  × /report `<reason>`: ответить на сообщение, чтобы сообщить об этом администраторам.\n\n  - @admin: то же, что и /report, но не команда.\n\n\n  *Только для администраторов:*\n\n  × /reports `<on/off/yes/no>`: изменить настройки отчётов или просмотреть текущий статус.\n\n  - Если сделано в ЛС, переключает ваш статус.\n\n  - Если в группе, переключает статус этой группы.\n\n  × /reports `block` (только через ответ): Заблокировать пользователя от использования /report или @admin.\n\n  × /reports `unblock` (только через ответ): Разблокировать пользователя от использования /report или @admin.\n\n  × /reports `showblocklist`: Проверить всех заблокированных пользователей, которые не могут использовать /report или @admin.\n\n\n  Чтобы сообщить о пользователе, просто ответьте на его сообщение с @admin или /report; Natalie\n  ответит сообщением, уведомляющим, что администраторы были уведомлены.\n\n  Вы ДОЛЖНЫ ответить на сообщение, чтобы сообщить о пользователе; вы не можете просто использовать @admin, чтобы отмечать администраторов без причины!\n\n\n  *ПРИМЕЧАНИЕ:* Ни одно из этих не будет активировано, если используется администраторами."
rules_help_msg: |
  "Каждый чат работает с разными правилами; этот модуль поможет сделать\n  эти правила понятнее!\n\n  *Пользовательские команды*:\n\n  × /rules: Проверить текущие правила чата.\n\n  *Команды администратора*:\n\n  × /setrules `<text>`: Установить правила для этого чата.\n\n  × /privaterules `<yes/no/on/off>`: Включить/отключить отправку правил в приват.\n\n  × /resetrules: Сбросить правила чата на стандартные\n\n  × /rulesbtn `<custom text>`: Устанавливает текст кнопки правил.\n\n  × /resetrulesbutton: Сбросить текст кнопки правил на стандартный.\n\n  × /resetrulesbtn: То же, что и выше."
