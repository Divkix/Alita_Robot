bans_help_msg: |
  "Иногда пользователи могут раздражать, и вы можете захотеть удалить их\n  из чата, этот модуль как раз помогает вам справиться с этим!.\n\n  Баньте/выгоняйте пользователей из чата, и разбаньте их позже, если они ведут себя хорошо.\n\n\n  *Пользовательские команды:*\n\n  × /kickme: Выгоняет пользователя, который использовал команду.\n\n\n  *Команды бана* (только для администратора):\n\n  × /ban <userhandle>: банит пользователя. (через ник, или ответ)\n\n  × /sban <userhandle>: банит пользователя без звука, не отправляет сообщение в группу, а также удаляет вашу команду. (через ник, или ответ)\n\n  × /dban <userhandle>: банит пользователя и удаляет ответное сообщение. (через ник, или ответ)\n\n  × /tban <userhandle> x(m/h/d): банит пользователя на `x` время. (через ник, или ответ).\n  m = минуты, h = часы, d = дни.\n\n  × /unban <userhandle>: разбанивает пользователя. (через ник, или ответ)\n\n\n  *Команды ограничения:* (только для администратора)\n\n  × /restrict: Показывает InlineKeyboard для выбора вариантов: kick, ban и mute\n\n  × /unrestrict: Показывает InlineKeyboard для выбора вариантов: unmute и unban."
