# Disabling module strings
disabling_help_msg: |
  Ce module vous permet de désactiver certaines commandes couramment utilisées,
  afin que personne ne puisse les utiliser. Il vous permettra également de les supprimer automatiquement, empêchant les gens
  de faire du texte bleu.


  *Commandes Admin* :

  × /disable `<nom_commande>` : Empêcher les utilisateurs d'utiliser nom_commande dans ce groupe.

  × /enable `<nom element>` : Autoriser les utilisateurs à utiliser nom_commande dans ce groupe.

  × /disableable : Lister toutes les commandes désactivables.

  × /disabledel `<yes/no/on/off>` : Supprimer les commandes désactivées lorsqu'utilisées par des non-admins.

  × /disabled : Lister les commandes désactivées dans ce chat.


  Note :

  Lors de la désactivation d'une commande, elle n'est désactivée que pour les non-admins. Tous les admins
  peuvent toujours utiliser ces commandes.

  Les commandes désactivées sont toujours accessibles via la fonction /connect. Si vous souhaitez
  voir cela également désactivé, faites-le moi savoir dans le chat de support.
devs_help_msg:
  "Bot management and diagnostic commands restricted to the bot owner and
  trusted developers. These commands are not surfaced to regular users.

  *Team Commands:*

  × /stats: Display bot statistics and system info.

  × /teamusers: List all team members.

  *Owner Commands:*

  × /addsudo: Grant sudo permissions to a user.

  × /adddev: Grant developer permissions to a user.

  × /remsudo: Revoke sudo permissions from a user.

  × /remdev: Revoke developer permissions from a user.

  *Diagnostic Commands:*

  × /chatinfo: Display detailed information about a chat.

  × /chatlist: Generate and send a list of all active chats.

  × /leavechat: Force the bot to leave a specified chat."
