bans_help_msg:
  "Parfois les utilisateurs peuvent être agaçants et vous pourriez vouloir
  les supprimer de votre chat, ce module vous aide exactement à gérer cela !

  Bannir/expulser des utilisateurs de votre chat, et les débannir plus tard s'ils se comportent bien.


  *Commandes Utilisateur :*

  × /kickme : expulse l'utilisateur qui a émis la commande.


  *Commandes de Bannissement* (Admin uniquement) :

  × /ban <pseudo> : bannit un utilisateur. (via le pseudo, ou en réponse)

  × /sban <pseudo> : bannit un utilisateur silencieusement, n'envoie pas de message au groupe et
  supprime également votre commande. (via le pseudo, ou en réponse)

  × /dban <pseudo> : bannit un utilisateur et supprime le message auquel vous avez répondu. (via le pseudo, ou
  en réponse)

  × /tban <pseudo> x(m/h/d) : bannit un utilisateur pour une durée `x`. (via le pseudo, ou en réponse).
  m = minutes, h = heures, d = jours.

  × /unban <pseudo> : débannit un utilisateur. (via le pseudo, ou en réponse)


  *Commandes de Restriction :* (Admin uniquement)

  × /restrict : Affiche un clavier en ligne pour choisir parmi expulser, bannir et rendre muet

  × /unrestrict : Affiche un clavier en ligne pour choisir parmi réactiver la voix et débannir."
