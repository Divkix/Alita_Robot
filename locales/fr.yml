admin_extended_docs: |
  <b>Support des Administrateurs Anonymes</b>

  La commande <code>/anonadmin</code> permet aux propriétaires de groupe de basculer la reconnaissance des administrateurs anonymes :
  <code>/anonadmin on</code> - Activer les vérifications d'administrateurs anonymes
  <code>/anonadmin off</code> - Désactiver les vérifications d'administrateurs anonymes

  Lorsque c'est activé, le bot demandera une vérification pour les actions d'administration des comptes anonymes.

  <b>Comment fonctionne la vérification des administrateurs anonymes :</b>
  1. Le bot détecte que l'expéditeur est GroupAnonymousBot
  2. Le message original est mis en cache avec un TTL de 20 secondes
  3. Un bouton "Vérifier Admin" est envoyé dans le chat
  4. L'utilisateur qui clique est vérifié comme admin, la commande est exécutée
  5. Le bouton expire après 20 secondes s'il n'est pas vérifié

  <b>Commandes supportées :</b>
  Admin : /promote, /demote, /title
  Bannissements : /ban, /dban, /sban, /tban, /unban
  Mutes : /mute, /smute, /dmute, /tmute, /unmute
  Épingles : /pin, /unpin, /permapin, /unpinall
  Purges : /purge, /del
  Avertissements : /warn, /swarn, /dwarn

admin_notes_docs: |
  <b>Notes de sécurité</b>
  • Toutes les entrées contrôlées par l'utilisateur sont échappées en HTML pour prévenir les attaques par injection
  • Les changements de permissions d'administration s'exécutent avec une gestion d'erreurs appropriée et une récupération en cas de panique

