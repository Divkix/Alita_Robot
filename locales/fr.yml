  'x a rejoint le groupe'.

  × /cleanwelcome `<yes/no/on/off>` : Supprime l'ancien message de bienvenue à chaque fois qu'un nouveau
  membre rejoint.

  × /autoapprove `<yes/no/on/off>` : Approuve automatiquement tous les nouveaux membres.
