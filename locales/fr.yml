# Captcha module strings
captcha_help_msg: |
  Protégez votre groupe des bots et spammeurs avec la vérification CAPTCHA !


  Obligez les nouveaux membres à prouver qu'ils sont humains en résolvant un simple défi avant de
  pouvoir envoyer des messages.


  *Types de Captcha :*

  × Math : Résoudre des problèmes arithmétiques simples

  × Text : Identifier du texte affiché dans une image


  *Commandes Admin :*

  × /captcha `<on/off>` : Activer ou désactiver la vérification captcha

  × /captchamode `<math/text>` : Définir le type de captcha (problèmes mathématiques ou reconnaissance de texte)

  × /captchatime `<1-10>` : Définir le délai en minutes (défaut : 2)

  × /captchaaction `<kick/ban/mute>` : Définir l'action en cas d'échec de vérification (défaut :
  kick)

  × /captchaattempts `<1-10>` : Définir le nombre maximum de tentatives de vérification (défaut : 3)


  Lorsque c'est activé, les nouveaux membres sont automatiquement rendus muets jusqu'à ce qu'ils complètent le captcha.

  S'ils échouent ou dépassent le délai, l'action configurée est appliquée.
