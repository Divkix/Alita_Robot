# Mutes module strings
mutes_help_msg:
  "Parfois les utilisateurs peuvent être agaçants et vous pourriez vouloir les empêcher
  d'envoyer des messages dans le chat, ce module est là pour vous aider, vous pouvez utiliser ce module
  pour rendre muets les membres de votre groupe.


  *Commandes de Mute :* (Admin uniquement)

  × /mute <pseudo> : rend muet un utilisateur, (via le pseudo, ou en réponse)

  × /smute <pseudo> : rend muet un utilisateur silencieusement, n'envoie pas de message au groupe,
  et supprime également votre commande. (via le pseudo, ou en réponse)

  × /dmute <pseudo> : rend muet un utilisateur et supprime le message auquel vous avez répondu. (via le pseudo,
  ou en réponse)

  × /tmute <pseudo> x(m/h/d) : rend muet un utilisateur pour une durée `x`. (via le pseudo, ou en réponse).
  m = minutes, h = heures, d = jours.

  × /unmute <pseudo> : réactive la voix d'un utilisateur. (via le pseudo, ou en réponse)"
mutes_tmute_message: "Chut...\n%s rendu muet pour %s"
mutes_mute_message: "Chut...\n%s rendu muet."
mutes_reason_suffix: "\n<b>Raison : </b>%s"
mutes_unmute_button: Réactiver la voix (Admin uniquement)
mutes_mute_admin_error: Pourquoi rendrais-je un admin muet ? Ça semble être une idée plutôt stupide.
mutes_mute_admin_polite_error: Je ne pense pas que vous voudriez que je rende un admin muet.
mutes_restrict_self_error: Pourquoi me restreindrais-je moi-même ?
mutes_unmute_message: "D'accord !\nJe vais permettre à %s de parler à nouveau."
mutes_extended_docs: |
  <b>Format de temps pour les mutes temporaires :</b>
  • <code>m</code> = minutes (ex., <code>30m</code>)
  • <code>h</code> = heures (ex., <code>2h</code>)
  • <code>d</code> = jours (ex., <code>1d</code>)

  <b>Variantes de Mute :</b>
  • <code>/mute</code> - Mute standard avec raison optionnelle
  • <code>/smute</code> - Mute silencieux (supprime votre message de commande)
  • <code>/dmute</code> - Mute avec suppression (rend muet l'utilisateur et supprime son message)
  • <code>/tmute</code> - Mute temporaire avec durée spécifiée

  <b>Permissions requises :</b>
  <b>Commandes réservées aux admins.</b> Les utilisateurs exécutant ces commandes doivent avoir :
  • Le statut d'admin dans le chat
  • La permission de restreindre les membres

  Le bot doit également avoir les privilèges d'admin avec la permission de restreindre les membres.

# Warns module strings
warns_help_msg:
  "Gardez vos membres sous contrôle avec les avertissements ; empêchons-les de
  déraper !

  Si vous cherchez des avertissements automatisés, consultez le module liste noire !


  *Commandes Admin :*

  - /warn <raison> : Avertir un utilisateur.

  - /dwarn <raison> : Avertir un utilisateur en réponse, et supprimer son message.

  - /swarn <raison> : Avertir silencieusement un utilisateur, et supprimer votre message.

  - /warns : Voir les avertissements d'un utilisateur.

  - /rmwarn : Supprimer le dernier avertissement d'un utilisateur.

  - /resetwarn : Remettre à zéro tous les avertissements d'un utilisateur.

  - /resetallwarns : Supprimer tous les avertissements du chat. Tous les utilisateurs reviennent à 0 avertissement.

  - /warnings : Obtenir les paramètres d'avertissement du chat.

  - /setwarnmode <ban/kick/mute> : Définir le mode d'avertissement du chat.

  - /setwarnlimit <nombre> : Définir le nombre d'avertissements avant sanction.


  *Exemples*

  - Avertir un utilisateur.

  -> `/warn @user Pour avoir désobéi aux règles`"
users_help_msg:
  "Automatic background user and chat tracker. This module has no user-facing
  commands — it silently records every message sender and chat the bot is active in.

  *What It Tracks:*

  × User IDs, usernames, and display names for every message sender.

  × Chat IDs and names for every group the bot is in.

  × Channel IDs, names, and usernames for linked channels.

  *Rate Limiting:*

  × User updates are throttled to one per UserUpdateInterval.

  × Chat updates are throttled to one per ChatUpdateInterval.

  Other modules, such as /info, depend on data collected by this module."
