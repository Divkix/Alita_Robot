warns_extended_docs: |
  <b>Paramètres par défaut :</b>
  • <b>Limite d'avertissements par défaut :</b> 3 avertissements
  • <b>Mode d'avertissement par défaut :</b> mute

  <b>Modes d'avertissement disponibles :</b>
  • <code>ban</code> - Bannir définitivement l'utilisateur du chat
  • <code>kick</code> - Expulser l'utilisateur (il peut revenir)
  • <code>mute</code> - Rendre muet l'utilisateur (ne peut plus envoyer de messages)

  <b>Avertissements silencieux et avec suppression :</b>
  • <code>/swarn</code> - Supprimer votre commande et avertir silencieusement
  • <code>/dwarn</code> - Supprimer le message de l'utilisateur et l'avertir

warns_permissions_docs: |
  <b>Permissions requises :</b>
  • <code>/warn</code>, <code>/dwarn</code>, <code>/swarn</code> : Bot admin + Utilisateur admin avec restriction
  • <code>/rmwarn</code>, <code>/unwarn</code> : Bot admin + Utilisateur admin
  • <code>/resetwarn</code>, <code>/resetwarns</code> : Bot admin + Utilisateur admin
  • <code>/resetallwarns</code> : Propriétaire du chat uniquement
  • <code>/setwarnmode</code>, <code>/setwarnlimit</code> : Bot admin + Utilisateur admin
  • <code>/warnings</code> : Bot admin + Utilisateur admin
  • <code>/warns</code> : Tout utilisateur (désactivable)

warns_notes_docs: |
  <b>Notes :</b>
  • Quand un utilisateur atteint la limite d'avertissements, l'action configurée (ban/kick/mute) est appliquée automatiquement
  • Les raisons d'avertissement sont stockées et affichées lors de la vérification des avertissements d'un utilisateur
  • La commande <code>/warns</code> est la seule commande de ce module qui peut être désactivée par les admins
  • Les publications de chaînes anonymes ne peuvent pas être averties
  • Les admins ne peuvent pas être avertis

