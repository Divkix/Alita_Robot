# Help module strings
help_about: "@%s est l'un des gestionnaires de groupe les plus rapides et les plus complets.


  Alita ✨ est développé et activement maintenu par @DivideProjects !


  Alita est en ligne depuis 2020 et a servi des milliers de groupes avec des centaines
  de milliers d'utilisateurs !


  <b>Pourquoi Alita :</b>

  - Simple : Utilisation facile et compatible avec de nombreuses commandes de bot.

  - Complet : De nombreuses fonctionnalités que d'autres bots de gestion de groupe n'ont pas.

  - Rapide : Devinez quoi ? Il n'est pas fait en Python, nous utilisons <a href='https://go.dev/'>Go</a>
  comme langage de programmation principal.


  <b>Version actuelle :</b> %s"
help_configuration_step-1: "Bienvenue dans la configuration d'Alita


  La première chose à faire est d'ajouter Alita ✨ à votre groupe ! Pour ce faire, appuyez sur le
  bouton ci-dessous et sélectionnez votre groupe, puis appuyez sur Terminé pour continuer le tutoriel."
help_configuration_step-2: "Ok, bien joué !


  Maintenant, pour que je fonctionne correctement, vous devez me faire Admin de votre Groupe !

  Pour ce faire, suivez ces étapes simples :

  ▫️ Allez dans votre groupe

  ▫️ Appuyez sur le nom du groupe

  ▫️ Appuyez sur Modifier

  ▫️ Appuyez sur Administrateur

  ▫️ Appuyez sur Ajouter un administrateur

  ▫️ Appuyez sur la loupe

  ▫️ Recherchez @%s

  ▫️ Confirmez"
help_configuration_step-3: "Excellent !


  Maintenant le Bot est prêt à l'emploi !

  Toutes les commandes peuvent être utilisées avec / ou !


  Si vous rencontrez des difficultés pour me configurer dans votre groupe, n'hésitez pas
  à venir sur @DivideSupport.

  Nous serons ravis de vous aider."
help_donatetext: "Vous voulez faire un don ? Incroyable !

  Quand vous faites un don, tous les fonds vont vers mon développement, ce qui me rend rapide et
  réactif.

  Votre don pourrait aussi me permettre d'obtenir une ou deux nouvelles fonctionnalités, que je n'étais pas en mesure d'avoir
  en raison des limitations du serveur.

  Tous les fonds seront utilisés pour mes services tels que la base de données, le stockage et l'hébergement !

  Vous pouvez faire un don en contactant mon propriétaire ici : @DivideProjectsBot"
help_pm_questions: "Salut :) Envoyez-moi un MP si vous avez des questions sur mon utilisation !"
help_config_private_only: La configuration ne fonctionne qu'en privé
