# Filters module strings
filters_help_msg: |
  Les filtres ne sont pas sensibles à la casse ; chaque fois que quelqu'un dit vos mots
  déclencheurs, Alita répondra autre chose ! Cela peut être utilisé pour créer vos propres commandes,
  si désiré.


  Commandes :

  - /filter <déclencheur> <réponse> : Chaque fois que quelqu'un dit le déclencheur, le bot répondra
  avec la phrase. Pour les filtres à plusieurs mots, mettez le déclencheur entre guillemets.

  - /filters : Lister tous les filtres du chat.

  - /stop <déclencheur> : Arrêter le bot de répondre au déclencheur.

  - /stopall : Arrêter TOUS les filtres du chat actuel. Cette action ne peut pas être annulée.


  Exemples :

  - Définir un filtre :

  -> /filter bonjour Bonjour ! Comment allez-vous ?

  - Définir un filtre à plusieurs mots :

  -> /filter bonjour ami Salut ! Ça faisait longtemps !

  - Définir un filtre qui ne peut être utilisé que par les admins :

  -> /filter exemple Ce filtre ne fonctionnera pas si un utilisateur normal le dit {admin}

  - Pour sauvegarder un fichier, image, gif ou tout autre pièce jointe, répondez simplement au fichier
  avec :

  -> /filter déclencheur
filters_invalid: Filtre invalide !
filters_limit_exceeded: |
  Limite de filtres dépassée, un groupe ne peut avoir que 150 filtres maximum !
  Cette limitation est due au fait que le bot fonctionne gratuitement sans aucun don des utilisateurs.
