# Reports module strings
reports_help_msg: |
  Si vous souhaitez signaler un message dans votre groupe pour qu'un admin vienne s'en occuper,
  c'est votre module ! Lorsque le signalement est activé, les utilisateurs peuvent être alertés
  par d'autres utilisateurs via /report ou @admin.

  *Commandes Utilisateur :*
  × /report : Répondez à un message pour le signaler aux admins.

  *Commandes Admin :*
  × /reports <on/off/yes/no> : Active/désactive le signalement
  × /reports block : Bloquer l'utilisateur (réponse) du signalement
  × /reports unblock : Débloquer l'utilisateur (réponse) du signalement
  × /reports showblocklist : Afficher la liste des utilisateurs bloqués du signalement

  Note : L'utilisateur peut choisir s'il veut être notifié lorsque quelqu'un signale quelque chose.
  Pour ce faire, tapez /reports dans mes MP.
