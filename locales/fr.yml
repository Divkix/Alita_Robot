help_bot_intro: "Salut ! Je m'appelle Alita ✨.\nJe suis là pour vous aider à gérer vos groupes !\nTapez /help pour en savoir plus sur comment m'utiliser au maximum.\n"
help_pm_intro: |
  Salut %s !
  Je m'appelle Alita ✨.

  Je suis un bot de gestion de groupe, là pour vous aider à naviguer et maintenir l'ordre dans vos groupes !
  J'ai plein de fonctionnalités pratiques, comme le contrôle du flood, un système d'avertissements, un système de notes, et même des réponses prédéfinies sur certains mots-clés.

  Commandes utiles :
  - /start : Me démarre ! Vous avez probablement déjà utilisé cette commande.
  - /help : Envoie ce message ; je vous en dirai plus sur moi-même !
  - /donate : Vous donne des infos sur comment me soutenir ainsi que mon créateur.

  Si vous avez des bugs ou des questions sur comment m'utiliser, consultez mon site web, ou rendez-vous sur @DivideSupport.
  Toutes les commandes peuvent être utilisées avec / ou !.

