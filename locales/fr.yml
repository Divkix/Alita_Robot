# Antiflood module help message
antiflood_help_msg: |
  Vous savez comment parfois, des gens rejoignent, envoient 100 messages, et ruinent
  votre chat ? Avec antiflood, ça n'arrive plus !

  Antiflood vous permet d'agir sur les utilisateurs qui envoient plus de x messages
  d'affilée. Actions : ban/kick/mute

  *Commandes Admin* :

  × /flood : Obtenir les paramètres antiflood actuels.

  × /setflood `<nombre/off/no>` : Définir le nombre de messages après lequel agir
  sur un utilisateur. Mettez '0', 'off', ou 'no' pour désactiver.

  × /setfloodmode `<type d'action>` : Choisir l'action à prendre sur un utilisateur qui a
  floodé. Options : ban/kick/mute

  × /delflood `<yes/no/on/off>` : Si vous voulez que le bot supprime les messages floodés par l'utilisateur.

antiflood_notes_docs: |
  <b>Comportement par défaut</b>
  Antiflood est <b>désactivé par défaut</b>. Vous devez l'activer explicitement en utilisant <code>/setflood &lt;nombre&gt;</code>.

# Antispam module documentation
antispam_help_msg: |
  Le module antispam fournit une protection automatique contre le spam en arrière-plan pour vos groupes.

  Contrairement aux autres modules, il fonctionne automatiquement sans nécessiter de commandes utilisateur.

  <b>Comment ça fonctionne :</b>
  Limitation de débit par utilisateur par chat pour prévenir le spam automatiquement.
  • <b>Limite de débit :</b> 18 messages par seconde par utilisateur par chat
  • <b>Automatique :</b> Aucune configuration requise - fonctionne immédiatement
  • <b>Transparent :</b> Supprime silencieusement les messages excessifs sans déranger les utilisateurs normaux
  • <b>Suivi par utilisateur :</b> Les groupes occupés avec beaucoup d'utilisateurs légitimes ne déclenchent pas de faux positifs

antispam_extended_docs: |
  <b>Détails Techniques</b>

  <b>Algorithme de limitation de débit :</b>
  Le module utilise une approche de fenêtre glissante :
  1. <b>Premier message :</b> Commence le suivi avec compteur = 1
  2. <b>Messages suivants :</b> Incrémente le compteur dans la fenêtre de temps
  3. <b>Expiration de fenêtre :</b> Le compteur se réinitialise quand la fenêtre de temps (1 seconde) expire
  4. <b>Seuil dépassé :</b> Les messages au-delà de 18/seconde sont silencieusement ignorés

  <b>Gestion de la mémoire :</b>
  • Nettoyage automatique : Les entrées de suivi expirées sont supprimées toutes les 5 minutes
  • Pas de fuites mémoire : Un goroutine en arrière-plan empêche la croissance mémoire illimitée
  • Stockage efficace : Seuls les utilisateurs actifs sont suivis

antispam_notes_docs: |
  <b>Limitations</b>
  • <b>Pas de commandes utilisateur :</b> Ne peut pas être activé/désactivé par chat
  • <b>Seuil fixe :</b> 18 messages/seconde est codé en dur
  • <b>Pas de journalisation dans le chat :</b> Les événements de spam sont uniquement journalisés côté serveur

  Utilisez <b>Antispam</b> pour une protection automatique en arrière-plan et <b>Antiflood</b> pour un contrôle de flood configurable.

# Locks module extended documentation
locks_types_docs: |
  <b>Verrous de permission</b> (16 types)
  <code>sticker</code> - Bloquer les stickers
  <code>audio</code> - Bloquer les fichiers audio
  <code>voice</code> - Bloquer les messages vocaux
  <code>document</code> - Bloquer les documents
  <code>video</code> - Bloquer les vidéos
  <code>videonote</code> - Bloquer les notes vidéo
  <code>contact</code> - Bloquer les contacts
  <code>photo</code> - Bloquer les photos
  <code>gif</code> - Bloquer les GIFs
  <code>url</code> - Bloquer les URLs
  <code>bots</code> - Empêcher l'ajout de bots
  <code>forward</code> - Bloquer les transferts
  <code>game</code> - Bloquer les jeux
  <code>location</code> - Bloquer les localisations
  <code>rtl</code> - Bloquer le texte RTL
  <code>anonchannel</code> - Bloquer les messages de chaînes

  <b>Verrous de restriction</b> (6 types)
  <code>messages</code> - Bloquer tous les messages
  <code>comments</code> - Bloquer les commentaires des non-membres
  <code>media</code> - Bloquer tous les médias
  <code>other</code> - Bloquer jeux/stickers/GIFs
  <code>previews</code> - Bloquer les aperçus URL
  <code>all</code> - Tout bloquer

locks_notes_docs: |
  <b>Notes techniques</b>
  • L'application des verrous est en temps réel
  • Les admins sont exemptés de tous les verrous
  • Les verrous persistent après les redémarrages du bot
  • Le cache est invalidé lors des mises à jour

# Languages extended docs
languages_extended_docs: |
  <b>Comment ça fonctionne</b>
  • <b>Chats privés :</b> N'importe quel utilisateur peut changer sa langue personnelle
  • <b>Chats de groupe :</b> Seuls les admins peuvent changer la langue du groupe

  Les préférences de langue sont mises en cache pour la performance et stockées séparément pour les utilisateurs et les groupes.

# Greetings extended docs
greetings_extended_docs: |
  <b>Intégration Captcha</b>
  Quand le module Captcha est activé :
  1. Les nouveaux membres sont rendus muets à l'arrivée
  2. Un défi captcha est envoyé au lieu du message de bienvenue
  3. Après vérification, le message de bienvenue est envoyé
  4. L'échec de vérification applique l'action captcha

# Notes module extended documentation
notes_extended_docs: |
  <b>Fonctionnalités :</b>
  • <b>Support Texte &amp; Médias</b> : Sauvegardez des messages texte, photos, vidéos, documents, et plus
  • <b>Boutons Personnalisés</b> : Ajoutez des boutons clavier en ligne aux notes
  • <b>Options de Formatage</b> : Contrôlez la visibilité et le comportement des notes
  • <b>Notes Admin Uniquement</b> : Restreignez certaines notes aux administrateurs seulement
  • <b>Notes Privées</b> : Envoyez des notes en privé aux utilisateurs via DM
  • <b>Contrôle Aperçu Web</b> : Activez ou désactivez les aperçus de liens
  • <b>Contenu Protégé</b> : Empêchez le transfert du contenu des notes

  <b>Options de Formatage des Notes :</b>
  Lors de la sauvegarde d'une note, vous pouvez utiliser des tags spéciaux pour contrôler son comportement :
  • <code>{private}</code> - La note sera uniquement envoyée via DM, jamais dans le groupe
  • <code>{noprivate}</code> - La note sera uniquement envoyée dans le groupe, jamais via DM
  • <code>{admin}</code> - La note ne peut être accédée que par les admins
  • <code>{protect}</code> - Le contenu ne peut pas être transféré
  • <code>{nonotif}</code> - Envoyer sans son de notification
  • <code>{nopreview}</code> - Désactiver l'aperçu des liens

  <b>Mode Notes Privées :</b>
  Quand les notes privées sont activées (<code>/privatenotes on</code>), toutes les notes sont envoyées aux utilisateurs via DM au lieu du groupe. Cela garde le chat de groupe propre.

  Les notes individuelles peuvent outrepasser ce comportement :
  • <code>{private}</code> - Toujours envoyer en privé
  • <code>{noprivate}</code> - Toujours envoyer dans le groupe

  <b>Note Brute (Sans Formatage) :</b>
  Pour voir le contenu brut d'une note sans formatage (pour édition) :
  <code>/get nomdelanote noformat</code>

notes_permissions_docs: |
  <b>Permissions Requises :</b>
  • Sauvegarder/Effacer notes : Changer les Infos du Groupe
  • Voir les notes admin : Statut Admin
  • Effacer toutes les notes : Propriétaire du Chat
  • Obtenir les notes régulières : N'importe quel utilisateur

# Pins module extended documentation
pins_extended_docs: |
  <b>Fonctionnalités :</b>

  <b>Anti-Épingle de Chaîne :</b>
  Quand activé, le bot désépinglera automatiquement tout message qui est auto-épinglé par une chaîne liée. C'est utile quand vous voulez garder le contrôle sur ce qui est épinglé dans votre groupe.

  <b>Important :</b> Lors de l'utilisation des anti-épingles de chaîne, utilisez toujours la commande <code>/unpin</code> au lieu de désépingler manuellement via Telegram. Le désépinglage manuel causera le ré-épinglage de l'ancien message quand la chaîne envoie de nouveaux messages.

  <b>Nettoyer Lié :</b>
  Quand activé, le bot supprimera automatiquement tous les messages envoyés au groupe depuis la chaîne liée. Cela garde votre chat de groupe propre du contenu cross-posté de la chaîne.

  <b>Permapin :</b>
  Créez des messages épinglés personnalisés avec :
  • Texte avec formatage HTML/Markdown
  • Boutons en ligne avec URLs
  • Pièces jointes médias (photos, documents, stickers, audio, vidéo, notes vocales, notes vidéo)
  • Tous les remplissages de message standard ({first}, {chatname}, etc.)

  <b>Supporté via Connexion :</b>
  Les commandes suivantes fonctionnent quand connecté à un chat via <code>/connect</code> :
  • <code>/antichannelpin</code>
  • <code>/cleanlinked</code>

pins_notes_docs: |
  <b>Notes :</b>
  • La commande <code>/unpinall</code> affiche un dialogue de confirmation avant de désépingler tous les messages
  • Permapin supporte tous les types de médias que Telegram supporte pour l'épinglage
  • Les paramètres anti-épingle de chaîne et nettoyer lié sont stockés par chat et persistent après les redémarrages du bot

  <b>Permissions Requises :</b>
  <b>Bot :</b> Doit être admin avec permission "Épingler des Messages"
  <b>Utilisateur :</b> La plupart des commandes requièrent admin avec permission "Épingler des Messages"

# Purges module extended documentation
purges_extended_docs: |
  <b>Suppression de Plage avec purgefrom/purgeto :</b>
  Quand vous avez besoin de plus de contrôle sur la plage de suppression :

  1. Répondez au <b>premier</b> message de la plage :
  <code>/purgefrom</code>
  Le bot confirmera que le message est marqué (expire après 30 secondes).

  2. Répondez au <b>dernier</b> message de la plage :
  <code>/purgeto</code>
  Tous les messages entre les deux marqueurs (inclus) seront supprimés.

  C'est utile quand vous ne pouvez pas facilement défiler jusqu'au point de départ ou avez besoin de vérifier la plage avant suppression.

  <b>Limites et Restrictions :</b>
  • <b>Maximum de messages par purge :</b> 1000 messages
  • <b>Limite d'âge des messages :</b> Les messages de plus de 48 heures peuvent ne pas être supprimables (restriction API Telegram)
  • <b>Permissions requises :</b> L'utilisateur et le bot doivent avoir la permission "Supprimer des Messages"

purges_notes_docs: |
  <b>Notes :</b>
  • Le marqueur <code>/purgefrom</code> expire après 30 secondes s'il n'est pas suivi par <code>/purgeto</code>
  • La suppression de grandes plages utilise un traitement concurrent pour de meilleures performances
  • Les messages de statut (montrant combien de messages ont été supprimés) s'auto-suppriment après 3 secondes
  • Le bot gère gracieusement les messages déjà supprimés sans erreurs

# Reports module extended documentation
reports_extended_docs: |
  <b>Comment ça fonctionne :</b>

  <b>Signaler un Message :</b>
  1. <b>Répondez au message offensant</b> avec <code>/report</code> ou mentionnez <code>@admin</code>
  2. Le bot envoie une notification mentionnant tous les admins qui ont les rapports activés
  3. La notification inclut des boutons d'action pour une modération rapide

  <b>Boutons d'Action Admin :</b>
  • <b>📩 Message</b> - Lien vers le message signalé
  • <b>👢 Expulser</b> - Expulser l'utilisateur signalé (il peut rejoindre)
  • <b>🚫 Bannir</b> - Bannir permanemment l'utilisateur signalé
  • <b>🗑 Supprimer</b> - Supprimer le message signalé
  • <b>✅ Résolu</b> - Marquer le rapport comme résolu sans action

  <b>Paramètres Personnels vs Groupe :</b>
  • <b>En MP :</b> <code>/reports on/off</code> bascule si VOUS recevez les notifications de rapport
  • <b>En Groupe :</b> <code>/reports on/off</code> bascule si le signalement est activé pour ce groupe

reports_permissions_docs: |
  <b>Qui peut signaler ?</b>
  ✅ Utilisateurs réguliers
  ❌ Admins (pas besoin de se signaler eux-mêmes)
  ❌ Utilisateurs bloqués
  ❌ Chaînes anonymes / Comptes système Telegram

  <b>Qui peut être signalé ?</b>
  ✅ Utilisateurs réguliers
  ❌ Le bot lui-même
  ❌ Admins (protégés des signalements)
  ❌ Chaînes anonymes / Comptes système Telegram

# Rules module extended documentation
rules_extended_docs: |
  <b>Fonctionnalités :</b>

  <b>Règles Privées :</b>
  Activez les règles privées (<code>/privaterules on</code>) pour envoyer les règles via MP au lieu du groupe. Cela garde le chat de groupe propre.

  <b>Bouton Règles Personnalisé :</b>
  Définissez un texte de bouton personnalisé (max 30 caractères) :
  <code>/rulesbtn Voir les Règles</code>

  Réinitialiser par défaut :
  <code>/resetrulesbtn</code>

  <b>Définir les Règles :</b>
  Vous pouvez définir les règles en fournissant du texte directement ou en répondant à un message :
  <code>/setrules Veuillez respecter tous les membres.</code>

  Ou répondez à un message :
  <code>/setrules</code>

  <b>Permissions Requises :</b>
  • Commandes utilisateur : Disponibles pour tous les utilisateurs
  • Commandes admin : Requièrent des permissions admin dans le chat

# Filters module extended documentation
filters_extended_docs: |
  <b>Fonctionnalités Avancées :</b>

  <b>Réponses Aléatoires :</b>
  Utilisez <code>%%%</code> pour séparer plusieurs réponses. Une sera choisie aléatoirement :
  <code>/filter bonjour Salut !%%%Bonjour !%%%Hey, comment ça va ?</code>

  <b>Filtres Média :</b>
  Répondez à n'importe quel média (photo, vidéo, document, sticker, etc.) avec <code>/filter déclencheur</code> pour créer un filtre qui envoie ce média.

  <b>Mode Noformat :</b>
  Les admins peuvent voir le contenu brut du filtre (incluant les codes de formatage) en ajoutant <code>noformat</code> après le déclencheur :
  <code>bonjour noformat</code>
  C'est utile pour déboguer les filtres ou voir les configurations de boutons.

  <b>Boutons de Filtre :</b>
  Vous pouvez ajouter des boutons en ligne à vos filtres :
  <code>/filter bonjour Bonjour ! Consultez ces liens :
  [Bouton 1](buttonurl:https://example.com)
  [Bouton 2](buttonurl://example.com:same)</code>

filters_technical_docs: |
  <b>Comment fonctionnent les Filtres :</b>
  1. Quand un message est reçu, le bot récupère tous les filtres pour le chat en utilisant une requête optimisée en cache
  2. L'algorithme Aho-Corasick fait correspondre efficacement tous les mots-clés de filtre avec le texte du message
  3. Le premier filtre correspondant déclenche une réponse
  4. Les filtres supportent les réponses texte, média et boutons

  <b>Confirmation d'Écrasement :</b>
  Quand vous essayez d'ajouter un filtre qui existe déjà, le bot demandera confirmation avant d'écraser. La confirmation expire après 5 minutes.

  <b>Comportement du Cache :</b>
  • Les listes de filtres sont mises en cache pendant 15 minutes par chat
  • Le cache est automatiquement invalidé quand des filtres sont ajoutés ou supprimés

filters_limits_docs: |
  <b>Limites :</b>
  • Maximum 150 filtres par chat
  • Maximum 100 caractères par mot-clé de filtre
  • Les mots-clés de filtre sont stockés en minuscules

  <b>Permissions Requises :</b>
  • <code>/filter</code>, <code>/addfilter</code> : Admin avec permission Changer les Infos
  • <code>/stop</code>, <code>/rmfilter</code>, <code>/removefilter</code> : Admin avec permission Changer les Infos
  • <code>/stopall</code> : Propriétaire du Chat uniquement
  • <code>/filters</code> : Disponible pour tous les utilisateurs

# Captcha module extended documentation
captcha_extended_docs: |
  <b>Comment ça fonctionne :</b>
  1. Quand le captcha est activé, les nouveaux membres sont automatiquement rendus muets à l'arrivée
  2. Un défi captcha est envoyé au nouveau membre
  3. L'utilisateur doit sélectionner la bonne réponse parmi les options fournies
  4. Si réussi, l'utilisateur est démuet et peut participer au groupe
  5. S'ils échouent ou timeout, l'action configurée est prise (kick, ban, ou mute)

  <b>Types de Captcha :</b>
  • <b>Math</b> : Résoudre des problèmes arithmétiques simples (addition, soustraction, multiplication)
  • <b>Text</b> : Identifier le texte montré dans une image déformée

  <b>Fonctionnalité Messages en Attente :</b>
  Quand un utilisateur complète le captcha, tous les messages qu'il essaie d'envoyer sont stockés et supprimés. Les admins peuvent :
  • Voir quels messages un utilisateur a essayé d'envoyer en utilisant <code>/captchapending</code>
  • Effacer les messages stockés en utilisant <code>/captchaclear</code>

  Cela aide à identifier les tentatives de spam potentielles avant que les utilisateurs ne complètent la vérification.

captcha_permissions_docs: |
  <b>Exigences du Bot :</b>
  • Bannir des utilisateurs (pour les actions kick/ban)
  • Restreindre des membres (pour rendre muet pendant la vérification)
  • Supprimer des messages (pour nettoyer les messages captcha)

  <b>Actions d'Échec :</b>
  • <code>kick</code> - Bannir puis débannir immédiatement (permet à l'utilisateur de rejoindre)
  • <code>ban</code> - Bannir permanemment l'utilisateur
  • <code>mute</code> - Garder l'utilisateur muet pendant 24 heures

# Blacklists module extended documentation
blacklists_extended_docs: |
  <b>Actions Disponibles :</b>
  Les actions suivantes peuvent être définies en utilisant <code>/blaction</code> :
  • <code>none</code> - Supprime juste le message sans autre action
  • <code>warn</code> - Supprime le message et émet un avertissement à l'utilisateur (par défaut)
  • <code>mute</code> - Supprime le message et rend l'utilisateur muet
  • <code>kick</code> - Supprime le message et expulse l'utilisateur (il peut rejoindre)
  • <code>ban</code> - Supprime le message et bannit permanemment l'utilisateur

  <b>Note :</b>
  Le mode par défaut pour la Liste Noire est <b>warn</b>, qui supprimera le message et émettra un avertissement à l'utilisateur.

  <b>Commandes :</b>
  • <code>/addblacklist &lt;déclencheur&gt;</code> - Ajoute le mot à la liste noire dans le chat actuel
  • <code>/rmblacklist &lt;déclencheur&gt;</code> - Supprime le mot des Mots sur Liste Noire actuels dans le Chat
  • <code>/blaction &lt;mute/kick/ban/warn/none&gt;</code> - Définit l'action à effectuer par le bot quand un mot sur liste noire est détecté
  • <code>/remallbl</code> - Supprime tous les mots sur liste noire du chat (Propriétaire Uniquement)

# Disabling module extended documentation
disabling_extended_docs: |
  <b>Fonctionnalités Clés :</b>
  • Désactiver des commandes bot spécifiques pour les utilisateurs non-admin
  • Les admins peuvent toujours contourner les commandes désactivées
  • Suppression automatique optionnelle des messages de commandes désactivées
  • Support pour désactiver plusieurs commandes à la fois

  <b>Désactiver Plusieurs Commandes :</b>
  <code>/disable adminlist rules info</code>
  Désactive les commandes <code>/adminlist</code>, <code>/rules</code>, et <code>/info</code> en une fois.

  <b>Basculer Suppression de Commande :</b>
  <code>/disabledel on</code> - Les messages désactivés seront maintenant supprimés.
  <code>/disabledel off</code> - Les messages désactivés ne seront plus supprimés.
  <code>/disabledel</code> - Vérifier le paramètre de suppression actuel.

disabling_notes_docs: |
  <b>Notes Importantes :</b>
  • <b>Contournement Admin :</b> Les commandes désactivées n'affectent que les utilisateurs non-admin. Tous les admins peuvent toujours utiliser n'importe quelle commande.
  • <b>Support Connexion :</b> Les commandes désactivées sont toujours accessibles via la fonctionnalité <code>/connect</code> pour les chats connectés.
  • <b>Commandes Multiples :</b> <code>/disable</code> et <code>/enable</code> supportent tous deux plusieurs noms de commandes dans un seul message.
  • <b>Gestion d'Erreurs :</b> Si certaines commandes échouent à être désactivées/activées, vous serez notifié de celles qui ont réussi et celles qui ont échoué.

  <b>Permissions Requises :</b>
  • <code>/disable</code>, <code>/enable</code>, <code>/disabledel</code> : Admin uniquement
  • <code>/disableable</code>, <code>/disabled</code> : Tous les utilisateurs (mais <code>/disabled</code> peut être désactivé)

# Extended documentation locale keys - Help module
help_extended_docs: |
  <b>Navigation System:</b>
  The Help module provides the bot's main entry points and navigation. When a user sends <code>/start</code> in a private chat, the bot displays a welcome message with an inline keyboard for navigating to different modules.

  The <code>/help</code> command shows a module list. Clicking a module button displays that module's commands and usage information. When <code>/help</code> is used in a group chat, the bot redirects the user to a private message for detailed help to avoid cluttering the group.

  <code>/about</code> shows bot information, version, and links, while <code>/donate</code> shows donation information for supporting the project.

# Extended documentation locale keys - Devs module
devs_extended_docs: |
  <b>Team Hierarchy:</b>
  The Devs module provides bot management and diagnostic commands restricted to the bot's internal team. The team has three tiers with descending privilege levels.

  <b>Tier 1 — Owner:</b> Set via <code>OWNER_ID</code> environment variable at deployment. Full control: manage team roster, all diagnostic commands, all team commands.

  <b>Tier 2 — Sudo / Dev:</b> Assigned by owner via <code>/addsudo</code> or <code>/adddev</code>. Diagnostic commands: bot stats, chat info, chat management.

  <b>Tier 3 — Team Member:</b> Automatically includes owner + all sudo + all dev users. View team roster only via <code>/teamusers</code>.

  <b>Note:</b> Sudo and Dev have identical command access. The distinction exists for organizational purposes.

  <b>Important:</b> These commands are not visible in the public help menu and silently ignore unauthorized users.

# Extended documentation locale keys - Users module
users_extended_docs: |
  <b>Background Tracker:</b>
  The Users module is a passive background module with no user-facing commands. It runs silently on every message the bot processes, automatically tracking all message senders and all chats the bot is active in.

  <b>What It Tracks:</b>
  • User IDs, usernames, and display names for every message sender
  • Chat IDs and names for every group the bot is in
  • Channel IDs, names, and usernames for linked channels

  <b>Rate Limiting:</b>
  • User updates: throttled to one per <code>UserUpdateInterval</code>
  • Chat updates: throttled to one per <code>ChatUpdateInterval</code>
  • This prevents excessive database writes while keeping data reasonably current

  <b>Passive Operation:</b>
  • Runs as a message watcher at handler group -1 (fires before all command handlers)
  • No user interaction required — fully automatic
  • Other modules, such as <code>/info</code>, depend on data collected by this module

# Formatting module help message
formatting_help_msg: "Alita supporte un grand nombre d'options de formatage pour rendre vos messages plus expressifs. Jetez un œil en cliquant sur les boutons ci-dessous !"

# Formatting module - Markdown documentation
formatting_markdown: |
  <b>Formatage Markdown</b>

  Vous pouvez formater votre message en utilisant <b>gras</b>, <i>italique</i>, <u>souligné</u>,
  et bien plus. Allez-y et expérimentez !

  <b>Markdown supporté</b> :

  - <code>`mots de code`</code> : Les accents graves sont utilisés pour les polices monospace. S'affiche comme : <code>mots de code</code>.

  - <code>_mots italiques_</code> : Les underscores sont utilisés pour les polices italiques. S'affiche comme : <i>mots italiques</i>.

  - <code>*mots gras*</code> : Les astérisques sont utilisés pour les polices gras. S'affiche comme : <b>mots gras</b>.

  - <code>~barré~</code> : Les tildes sont utilisés pour le texte barré. S'affiche comme : <strike>barré</strike>.

  - <code>||spoiler||</code> : Les doubles barres verticales sont utilisées pour les spoilers. S'affiche comme : <tg-spoiler>Spoiler</tg-spoiler>.

  - <code>```pre```</code> : Pour que le formateur ignore les autres caractères de formatage à l'intérieur du texte formaté avec '```', sera comme : <code>**gras** | *gras*</code>.

  - <code>__souligné__</code> : Les doubles underscores sont utilisés pour le soulignement. S'affiche comme : souligné. NOTE : Certains clients essaient d'être intelligents et l'interprètent comme italique. Dans ce cas, essayez d'utiliser le formatage intégré de votre application.

  - <code>[hyperlien](example.com)</code> : C'est le formatage utilisé pour les hyperliens. S'affiche comme : <a href='https://example.com/'>hyperlien</a>.

  - <code>[Mon Bouton](buttonurl://example.com)</code> : C'est le formatage utilisé pour créer des boutons. Cet exemple créera un bouton nommé "Mon bouton" qui ouvre <code>example.com</code> quand on clique.

  Si vous souhaitez envoyer des boutons sur la même ligne, utilisez le formatage <code>:same</code>.

  <b>Exemple :</b>

  <code>[bouton 1](buttonurl:example.com)</code>

  <code>[bouton 2](buttonurl://example.com:same)</code>

  <code>[bouton 3](buttonurl://example.com)</code>

  Cela affichera les boutons 1 et 2 sur la même ligne, avec le 3 en dessous.

formatting_random: |
  <b>Contenu Aléatoire</b>

  Une autre chose qui peut être amusante, c'est de randomiser le contenu d'un message. Rendez les choses
  un peu plus personnelles en changeant les messages de bienvenue, ou en changeant les notes !

  Comment utiliser le contenu aléatoire :

  - %%% : Ce séparateur peut être utilisé pour ajouter des réponses aléatoires au bot.

  Par exemple :

  <code>bonjour

  %%%

  comment ça va</code>

  Cela choisira aléatoirement entre envoyer le premier message, "bonjour", ou le second
  message, "comment ça va".

  Utilisez ceci pour rendre Alita un peu plus personnalisé ! (fonctionne uniquement dans les filtres/notes)

  Exemple de message de bienvenue :

  - Chaque fois qu'un nouvel utilisateur rejoint, il verra un des trois messages
  montrés ici.

  -> /filter "hey"

  bonjour <code>{first}</code> !

  %%%

  Ooooh, <code>{first}</code> comment ça va ?

  %%%

  Salut ! <code>{first}</code>

# Antiflood module runtime strings
antiflood_checkflood_perform_action: |
  Ouais, je n'aime pas vos inondations. %s a été
  %s !
antiflood_errors_expected_args: |
  J'attendais des arguments ! Soit off, soit un entier.
  ex: `/setflood 5`, ou `/setflood off`
antiflood_errors_invalid_int: |
  Ce n'est pas un entier valide. Veuillez me donner un entier valide,
  ou `off`.
antiflood_errors_set_in_limit: La limite antiflood doit être définie entre 3 et 100.
antiflood_flood_deleter_already_disabled: |
  La suppression des messages antiflood est actuellement
  *désactivée* dans ce chat, les messages causant l'antiflood seront ignorés !
antiflood_flood_deleter_already_enabled: |
  La suppression des messages antiflood est actuellement *activée*
  dans ce chat, les messages causant l'antiflood seront supprimés !
antiflood_flood_deleter_disabled: |
  Désactivation de la suppression des messages antiflood. Les messages
  causant l'antiflood seront ignorés !
antiflood_flood_deleter_enabled: |
  Activation de la suppression des messages antiflood. Les messages causant
  l'antiflood seront supprimés !
antiflood_flood_deleter_invalid_option: "Je ne comprends qu'une option parmi : `yes`/`no`/`on`/`off`"
antiflood_flood_disabled: Ce chat n'applique actuellement pas le contrôle d'inondation.
antiflood_flood_show_settings: |
  Ce chat applique actuellement le contrôle d'inondation après
  %d messages. Tout utilisateur envoyant plus que cette quantité de messages sera %s.
antiflood_setflood_disabled: |
  D'accord.
  Je n'avertirai pas les utilisateurs pour inondation.
