# Pins module strings
pins_help_msg: |
  Toutes les commandes liées aux épingles peuvent être trouvées ici ; gardez votre chat à
  jour sur les dernières actualités avec un simple message épinglé !


  *Commandes Utilisateur :*

  × /pinned : Obtenez le message épinglé actuel.


  *Commandes Admin :*

  × /pin : Épinglez le message auquel vous avez répondu. Ajoutez 'loud' ou 'notify' pour envoyer une notification
  aux membres du groupe.

  × /pinned : Obtenez le dernier message épinglé dans le chat actuel.

  × /permapin <texte> : Épinglez un message personnalisé via le bot. Ce message peut contenir
  du markdown, des boutons et toutes les autres fonctionnalités cool.

  × /unpin : Désépinglez le message épinglé actuel. Si utilisé en réponse, désépinglez le message
  auquel vous avez répondu.

  × /unpinall : Désépinglez tous les messages épinglés.

  × /antichannelpin <yes/no/on/off> : Ne laissez pas Telegram épingler automatiquement les chaînes liées.
  Si aucun argument n'est donné, affiche le paramètre actuel.

  × /cleanlinked <yes/no/on/off> : Supprimez les messages envoyés par la chaîne liée.

  Note : Lors de l'utilisation des anti-épingles de chaîne, assurez-vous d'utiliser la commande /unpin, au lieu
  de le faire manuellement. Sinon, l'ancien message sera ré-épinglé quand la chaîne
  enverra des messages.
