# Locks module strings
locks_help_msg: "*Admin uniquement* :

  × /lock `<permission>` : Verrouiller la permission du chat.

  × /unlock `<permission>` : Déverrouiller la permission du chat.

  × /locks : Voir les permissions du chat.

  × /locktypes : Vérifier les types de verrous disponibles !


  Les verrous peuvent être utilisés pour restreindre les utilisateurs d'un groupe.

  Verrouiller les URLs supprimera automatiquement tous les messages avec des URLs, verrouiller les stickers supprimera
  tous les stickers, etc.

  Verrouiller les bots empêchera les non-admins d'ajouter des bots au chat.


  **Exemple :**

  `/lock media` : cela verrouille tous les messages média dans le chat."
