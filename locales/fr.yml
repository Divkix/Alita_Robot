# Formatting fillings
formatting_fillings: "<b>Remplissages</b>


  Vous pouvez également personnaliser le contenu de vos messages avec des données contextuelles. Par exemple,
  vous pouvez mentionner un utilisateur par son nom dans le message de bienvenue, ou le mentionner dans un filtre !

  Vous pouvez utiliser ces remplissages pour mentionner un utilisateur dans les notes aussi !


  <b>Remplissages supportés :</b>

  - <code>{first}</code> : Le prénom de l'utilisateur.

  - <code>{last}</code> : Le nom de famille de l'utilisateur.

  - <code>{fullname}</code> : Le nom complet de l'utilisateur.

  - <code>{username}</code> : Le nom d'utilisateur. S'il n'en a pas, mentionne
  l'utilisateur à la place.

  - <code>{mention}</code> : Mentionne l'utilisateur avec son prénom.

  - <code>{id}</code> : L'ID de l'utilisateur.

  - <code>{chatname}</code> : Le nom du chat.

  - <code>{rules}</code> : Ajoute un bouton Règles au message.

  - <code>{protect}</code> : Protège le contenu contre le partage.

  - <code>{preview}</code> : Active les aperçus dans les messages.

  - <code>{nonotif}</code> : Désactive la notification pour ce message."

