# Antispam module strings (no commands - automatic background protection)
antispam_help_msg: |
  O módulo antispam fornece proteção automática contra spam nos bastidores para seus grupos.

  Diferente de outros módulos, ele opera automaticamente sem requerer comandos de usuário.

  <b>Como Funciona:</b>
  Limitação de taxa por-usuário-por-chat previne spam automaticamente.
  • <b>Limite de Taxa:</b> 18 mensagens por segundo por usuário por chat
  • <b>Automático:</b> Nenhuma configuração necessária - funciona imediatamente
  • <b>Transparente:</b> Silenciosamente descarta mensagens excessivas sem interromper usuários normais
  • <b>Rastreamento Por-Usuário:</b> Grupos movimentados com muitos usuários legítimos não dispararão falsos positivos

antispam_extended_docs: |
  <b>Detalhes Técnicos</b>

  <b>Algoritmo de Limitação de Taxa:</b>
  O módulo usa uma abordagem de janela deslizante:
  1. <b>Primeira Mensagem:</b> Inicia rastreamento com contador = 1
  2. <b>Mensagens Subsequentes:</b> Incrementa contador dentro da janela de tempo
  3. <b>Expiração da Janela:</b> Contador reseta quando a janela de tempo (1 segundo) expira
  4. <b>Limite Excedido:</b> Mensagens além de 18/segundo são silenciosamente descartadas

  <b>Gerenciamento de Memória:</b>
  • Limpeza automática: Entradas de rastreamento expiradas são removidas a cada 5 minutos
  • Sem vazamentos de memória: Goroutine de fundo previne crescimento de memória ilimitado
  • Armazenamento eficiente: Apenas usuários ativos são rastreados

antispam_notes_docs: |
  <b>Limitações</b>
  • <b>Sem Comandos de Usuário:</b> Não pode ser ativado/desativado por chat
  • <b>Limite Fixo:</b> 18 mensagens/segundo está codificado
  • <b>Sem Log no Chat:</b> Eventos de spam são logados apenas no servidor

  Use <b>Antispam</b> para proteção automática nos bastidores e <b>Antiflood</b> para controle de flood configurável.

# Admin module extended documentation
admin_extended_docs: |
  <b>Suporte a Admin Anônimo</b>

  O comando <code>/anonadmin</code> permite que donos de grupos alternem o reconhecimento de admin anônimo:
  <code>/anonadmin on</code> - Ativa verificações de admin anônimo
  <code>/anonadmin off</code> - Desativa verificações de admin anônimo

  Quando ativado, o bot solicitará verificação para ações de admin de contas anônimas.

  <b>Como Funciona a Verificação de Admin Anônimo:</b>
  1. Bot detecta que remetente é GroupAnonymousBot
  2. Mensagem original em cache com TTL de 20 segundos
  3. Botão "Verificar Admin" enviado ao chat
  4. Usuário que clicar verificado como admin, comando executado
  5. Botão expira após 20 segundos se não verificado

  <b>Comandos Suportados:</b>
  Admin: /promote, /demote, /title
  Bans: /ban, /dban, /sban, /tban, /unban
  Mutes: /mute, /smute, /dmute, /tmute, /unmute
  Pins: /pin, /unpin, /permapin, /unpinall
  Purges: /purge, /del
  Warns: /warn, /swarn, /dwarn

admin_notes_docs: |
  <b>Notas de Segurança</b>
  • Toda entrada controlada por usuário é escapada em HTML para prevenir ataques de injeção
  • Mudanças de permissão de admin executam com tratamento de erro adequado e recuperação de pânico

# Antiflood extended docs
antiflood_notes_docs: |
  <b>Comportamento Padrão</b>
  Antiflood está <b>desativado por padrão</b>. Você deve ativá-lo explicitamente usando <code>/setflood &lt;número&gt;</code>.

# Locks module extended documentation
locks_types_docs: |
  <b>Bloqueios de Permissão</b> (16 tipos)
  <code>sticker</code> - Bloquear figurinhas
  <code>audio</code> - Bloquear arquivos de áudio
  <code>voice</code> - Bloquear mensagens de voz
  <code>document</code> - Bloquear documentos
  <code>video</code> - Bloquear vídeos
  <code>videonote</code> - Bloquear notas de vídeo
  <code>contact</code> - Bloquear contatos
  <code>photo</code> - Bloquear fotos
  <code>gif</code> - Bloquear GIFs
  <code>url</code> - Bloquear URLs
  <code>bots</code> - Impedir adição de bots
  <code>forward</code> - Bloquear encaminhamentos
  <code>game</code> - Bloquear jogos
  <code>location</code> - Bloquear localizações
  <code>rtl</code> - Bloquear texto RTL
  <code>anonchannel</code> - Bloquear mensagens de canal

  <b>Bloqueios de Restrição</b> (6 tipos)
  <code>messages</code> - Bloquear todas as mensagens
  <code>comments</code> - Bloquear comentários de não-membros
  <code>media</code> - Bloquear toda mídia
  <code>other</code> - Bloquear jogos/figurinhas/GIFs
  <code>previews</code> - Bloquear prévias de URL
  <code>all</code> - Bloquear tudo

locks_notes_docs: |
  <b>Notas Técnicas</b>
  • Aplicação de bloqueio é em tempo real
  • Admins estão isentos de todos os bloqueios
  • Bloqueios persistem entre reinícios do bot
  • Cache invalidado em atualizações

# Languages extended docs
languages_extended_docs: |
  <b>Como Funciona</b>
  • <b>Chats Privados:</b> Qualquer usuário pode mudar seu idioma pessoal
  • <b>Chats de Grupo:</b> Apenas admins podem mudar o idioma do grupo

  Preferências de idioma são cacheadas para performance e armazenadas separadamente para usuários e grupos.

# Greetings extended docs
greetings_extended_docs: |
  <b>Integração com Captcha</b>
  Quando o módulo Captcha está ativado:
  1. Novos membros são mutados ao entrar
  2. Desafio de captcha enviado em vez de boas-vindas
  3. Após verificação, mensagem de boas-vindas é enviada
  4. Falha na verificação aplica ação de captcha

# Extended documentation locale keys - Notes module
notes_extended_docs: |
  <b>Funcionalidades:</b>
  • <b>Suporte a Texto & Mídia</b>: Salve mensagens de texto, fotos, vídeos, documentos, e mais
  • <b>Botões Personalizados</b>: Adicione botões de teclado inline às notas
  • <b>Opções de Formatação</b>: Controle visibilidade e comportamento
  • <b>Notas Apenas para Admins</b>: Restrinja certas notas a administradores apenas
  • <b>Notas Privadas</b>: Envie notas privadamente para usuários via DM
  • <b>Controle de Prévia Web</b>: Ative ou desative prévias de links
  • <b>Conteúdo Protegido</b>: Previna que conteúdo de nota seja encaminhado

  <b>Opções de Formatação de Notas:</b>
  Ao salvar uma nota, você pode usar tags especiais para controlar seu comportamento:
  • <code>{private}</code> - Nota só será enviada via DM, nunca no grupo
  • <code>{noprivate}</code> - Nota só será enviada no grupo, nunca via DM
  • <code>{admin}</code> - Nota só pode ser acessada por admins
  • <code>{protect}</code> - Conteúdo não pode ser encaminhado
  • <code>{nonotif}</code> - Enviar sem som de notificação
  • <code>{nopreview}</code> - Desativar prévia de link

  <b>Modo de Notas Privadas:</b>
  Quando notas privadas estão ativadas (<code>/privatenotes on</code>), todas as notas são enviadas aos usuários via DM em vez de no grupo. Isso mantém o chat do grupo limpo.

  Notas individuais podem substituir este comportamento:
  • <code>{private}</code> - Sempre enviar privadamente
  • <code>{noprivate}</code> - Sempre enviar no grupo

  <b>Nota Bruta (Sem Formatação):</b>
  Para ver o conteúdo bruto de uma nota sem formatação (para edição):
  <code>/get notename noformat</code>

notes_permissions_docs: |
  <b>Permissões Necessárias:</b>
  • Salvar/Limpar notas: Alterar Info do Grupo
  • Ver notas de admin: Status de admin
  • Limpar todas as notas: Dono do Chat
  • Obter notas regulares: Qualquer usuário

# Extended documentation locale keys - Pins module
pins_extended_docs: |
  <b>Funcionalidades:</b>

  <b>Anti-Channel Pin:</b>
  Quando ativado, o bot automaticamente desfixará qualquer mensagem que for auto-fixada por um canal vinculado. Isso é útil quando você quer manter controle sobre o que é fixado em seu grupo.

  <b>Importante:</b> Ao usar anti channel pins, sempre use o comando <code>/unpin</code> em vez de desfixar manualmente pelo Telegram. Desfixar manualmente fará com que a mensagem antiga seja fixada novamente quando o canal enviar novas mensagens.

  <b>Clean Linked:</b>
  Quando ativado, o bot automaticamente deletará qualquer mensagem enviada ao grupo do canal vinculado. Isso mantém seu chat do grupo limpo de conteúdo cross-postado do canal.

  <b>Permapin:</b>
  Crie mensagens fixadas personalizadas com:
  • Texto com formatação HTML/Markdown
  • Botões inline com URLs
  • Anexos de mídia (fotos, documentos, figurinhas, áudio, vídeo, notas de voz, notas de vídeo)
  • Todos os preenchedores de mensagens padrão ({first}, {chatname}, etc.)

  <b>Suportado via Conexão:</b>
  Os seguintes comandos funcionam quando conectado a um chat via <code>/connect</code>:
  • <code>/antichannelpin</code>
  • <code>/cleanlinked</code>

pins_notes_docs: |
  <b>Notas:</b>
  • O comando <code>/unpinall</code> mostra um diálogo de confirmação antes de desfixar todas as mensagens
  • Permapin suporta todos os tipos de mídia que Telegram suporta para fixar
  • Configurações de anti-channel pin e clean linked são armazenadas por-chat e persistem entre reinícios do bot

  <b>Permissões Necessárias:</b>
  <b>Bot:</b> Deve ser admin com permissão "Fixar Mensagens"
  <b>Usuário:</b> A maioria dos comandos requer admin com permissão "Fixar Mensagens"

# Extended documentation locale keys - Purges module
purges_extended_docs: |
  <b>Exclusão de Intervalo com purgefrom/purgeto:</b>
  Quando você precisa de mais controle sobre o intervalo de exclusão:

  1. Responda à <b>primeira</b> mensagem no intervalo:
  <code>/purgefrom</code>
  O bot confirmará que a mensagem está marcada (expira após 30 segundos).

  2. Responda à <b>última</b> mensagem no intervalo:
  <code>/purgeto</code>
  Todas as mensagens entre os dois marcadores (inclusivo) serão deletadas.

  Isso é útil quando você não pode rolar facilmente até o ponto inicial ou precisa verificar o intervalo antes da exclusão.

  <b>Limites e Restrições:</b>
  • <b>Máximo de mensagens por purga:</b> 1000 mensagens
  • <b>Limite de idade de mensagem:</b> Mensagens com mais de 48 horas podem não ser deletáveis (restrição da API Telegram)
  • <b>Permissões necessárias:</b> Tanto o usuário quanto o bot devem ter permissão "Deletar Mensagens"

purges_notes_docs: |
  <b>Notas:</b>
  • O marcador <code>/purgefrom</code> expira após 30 segundos se não seguido por <code>/purgeto</code>
  • Deletar intervalos grandes usa processamento concorrente para melhor performance
  • Mensagens de status (mostrando quantas mensagens foram deletadas) auto-deletam após 3 segundos
  • O bot lida com mensagens já deletadas graciosamente sem erros

# Extended documentation locale keys - Reports module
reports_extended_docs: |
  <b>Como Funciona:</b>

  <b>Reportando uma Mensagem:</b>
  1. <b>Responda à mensagem ofensiva</b> com <code>/report</code> ou mencione <code>@admin</code>
  2. O bot envia uma notificação mencionando todos os admins que têm relatórios ativados
  3. A notificação inclui botões de ação para moderação rápida

  <b>Botões de Ação de Admin:</b>
  • <b>📩 Mensagem</b> - Link para a mensagem reportada
  • <b>👢 Expulsar</b> - Expulsar o usuário reportado (eles podem reentrar)
  • <b>🚫 Banir</b> - Banir permanentemente o usuário reportado
  • <b>🗑 Deletar</b> - Deletar a mensagem reportada
  • <b>✅ Resolvido</b> - Marcar o report como resolvido sem ação

  <b>Configurações Pessoais vs Grupo:</b>
  • <b>Em PM:</b> <code>/reports on/off</code> alterna se VOCÊ recebe notificações de report
  • <b>Em Grupo:</b> <code>/reports on/off</code> alterna se relatórios estão ativados para aquele grupo

reports_permissions_docs: |
  <b>Quem Pode Reportar?</b>
  ✅ Usuários regulares
  ❌ Admins (não precisam reportar para si mesmos)
  ❌ Usuários bloqueados
  ❌ Canais anônimos / Contas de sistema Telegram

  <b>Quem Pode Ser Reportado?</b>
  ✅ Usuários regulares
  ❌ O próprio bot
  ❌ Admins (protegidos de reports)
  ❌ Canais anônimos / Contas de sistema Telegram

# Extended documentation locale keys - Rules module
rules_extended_docs: |
  <b>Funcionalidades:</b>

  <b>Regras Privadas:</b>
  Ative regras privadas (<code>/privaterules on</code>) para enviar regras via PM em vez de no grupo. Isso mantém o chat do grupo limpo.

  <b>Botão de Regras Personalizado:</b>
  Defina um texto de botão personalizado (máx 30 caracteres):
  <code>/rulesbtn Ver Regras</code>

  Resetar para padrão:
  <code>/resetrulesbtn</code>

  <b>Definindo Regras:</b>
  Você pode definir regras fornecendo texto diretamente ou respondendo a uma mensagem:
  <code>/setrules Por favor seja respeitoso com todos os membros.</code>

  Ou responda a uma mensagem:
  <code>/setrules</code>

  <b>Permissões Necessárias:</b>
  • Comandos de usuário: Disponíveis para todos os usuários
  • Comandos de admin: Requerem permissões de admin no chat

# Extended documentation locale keys - Warns module
warns_extended_docs: |
  <b>Configurações Padrão:</b>
  • <b>Limite de aviso padrão:</b> 3 avisos
  • <b>Modo de aviso padrão:</b> mute

  <b>Modos de Aviso Disponíveis:</b>
  • <code>ban</code> - Banir permanentemente o usuário do chat
  • <code>kick</code> - Expulsar o usuário (eles podem reentrar)
  • <code>mute</code> - Mutar o usuário (não pode enviar mensagens)

  <b>Avisos Silenciosos e com Deleção:</b>
  • <code>/swarn</code> - Delete seu comando e avise silenciosamente
  • <code>/dwarn</code> - Delete a mensagem do usuário e avise

warns_permissions_docs: |
  <b>Requisitos de Permissão:</b>
  • <code>/warn</code>, <code>/dwarn</code>, <code>/swarn</code>: Bot admin + Usuário admin com restringir
  • <code>/rmwarn</code>, <code>/unwarn</code>: Bot admin + Usuário admin
  • <code>/resetwarn</code>, <code>/resetwarns</code>: Bot admin + Usuário admin
  • <code>/resetallwarns</code>: Dono do chat apenas
  • <code>/setwarnmode</code>, <code>/setwarnlimit</code>: Bot admin + Usuário admin
  • <code>/warnings</code>: Bot admin + Usuário admin
  • <code>/warns</code>: Qualquer usuário (desativável)

warns_notes_docs: |
  <b>Notas:</b>
  • Quando um usuário atinge o limite de aviso, a ação configurada (ban/kick/mute) é aplicada automaticamente
  • Motivos de aviso são armazenados e exibidos ao checar os avisos de um usuário
  • O comando <code>/warns</code> é o único comando neste módulo que pode ser desativado por admins
  • Posts de canal anônimo não podem ser avisados
  • Admins não podem ser avisados

# Extended documentation locale keys - Mutes module
mutes_extended_docs: |
  <b>Formato de Tempo para Mutes Temporários:</b>
  • <code>m</code> = minutos (ex., <code>30m</code>)
  • <code>h</code> = horas (ex., <code>2h</code>)
  • <code>d</code> = dias (ex., <code>1d</code>)

  <b>Variantes de Mute:</b>
  • <code>/mute</code> - Mute padrão com motivo opcional
  • <code>/smute</code> - Mute silencioso (deleta sua mensagem de comando)
  • <code>/dmute</code> - Delete-mute (muta usuário e deleta mensagem dele)
  • <code>/tmute</code> - Mute temporário com duração especificada

  <b>Permissões Necessárias:</b>
  <b>Comandos apenas para admin.</b> Usuários executando estes comandos devem ter:
  • Status de admin no chat
  • Permissão para restringir membros

  O bot também deve ter privilégios de admin com permissão para restringir membros.

# Extended documentation locale keys - Filters module
filters_extended_docs: |
  <b>Funcionalidades Avançadas:</b>

  <b>Respostas Aleatórias:</b>
  Use <code>%%%</code> para separar múltiplas respostas. Uma será escolhida aleatoriamente:
  <code>/filter oi Oi!%%%Olá!%%%Ei, como vai?</code>

  <b>Filtros de Mídia:</b>
  Responda a qualquer mídia (foto, vídeo, documento, figurinha, etc.) com <code>/filter gatilho</code> para criar um filtro que envia aquela mídia.

  <b>Modo Noformat:</b>
  Admins podem ver o conteúdo bruto do filtro (incluindo códigos de formatação) adicionando <code>noformat</code> após o gatilho:
  <code>oi noformat</code>
  Isso é útil para debugar filtros ou ver configurações de botões.

  <b>Botões de Filtro:</b>
  Você pode adicionar botões inline aos seus filtros:
  <code>/filter oi Oi! Confira estes links:
  [Botão 1](buttonurl:https://exemplo.com)
  [Botão 2](buttonurl:https://exemplo2.com)</code>

filters_technical_docs: |
  <b>Como Filtros Funcionam:</b>
  1. Quando uma mensagem é recebida, o busca todos os filtros para o chat usando uma consulta cacheada otimizada
  2. O algoritmo Aho-Corasick eficientemente combina todas as palavras-chave de filtro contra o texto da mensagem
  3. O primeiro filtro correspondente dispara uma resposta
  4. Filtros suportam respostas de texto, mídia, e botões

  <b>Confirmação de Sobrescrita:</b>
  Quando você tenta adicionar um filtro que já existe, o bot pedirá confirmação antes de sobrescrever. A confirmação expira após 5 minutos.

  <b>Comportamento de Cache:</b>
  • Listas de filtros são cacheadas por 15 minutos por chat
  • Cache é automaticamente invalidado quando filtros são adicionados ou removidos

filters_limits_docs: |
  <b>Limites:</b>
  • Máximo 150 filtros por chat
  • Máximo 100 caracteres por palavra-chave de filtro
  • Palavras-chave de filtro são armazenadas em minúsculas

  <b>Permissões Necessárias:</b>
  • <code>/filter</code>, <code>/addfilter</code>: Admin com permissão Alterar Info
  • <code>/stop</code>, <code>/rmfilter</code>, <code>/removefilter</code>: Admin com permissão Alterar Info
  • <code>/stopall</code>: Dono do Chat apenas
  • <code>/filters</code>: Disponível para todos os usuários

# Extended documentation locale keys - Captcha module
captcha_extended_docs: |
  <b>Como Funciona:</b>
  1. Quando captcha está ativado, novos membros são automaticamente mutados ao entrar
  2. Um desafio de captcha é enviado ao novo membro
  3. O usuário deve selecionar a resposta correta das opções fornecidas
  4. Se bem-sucedido, o usuário é desmutado e pode participar do grupo
  5. Se falhar ou expirar, a ação configurada é tomada (kick, ban, ou mute)

  <b>Tipos de Captcha:</b>
  • <b>Matemática</b>: Resolva problemas aritméticos simples (adição, subtração, multiplicação)
  • <b>Texto</b>: Identifique texto mostrado em uma imagem distorcida

  <b>Funcionalidade de Mensagens Pendentes:</b>
  Quando um usuário está completando o captcha, quaisquer mensagens que tentarem enviar são armazenadas e deletadas. Admins podem:
  • Ver quais mensagens um usuário tentou enviar usando <code>/captchapending</code>
  • Limpar mensagens armazenadas usando <code>/captchaclear</code>

  Isso ajuda a identificar tentativas de spam potenciais antes de usuários completarem a verificação.

captcha_permissions_docs: |
  <b>Requisitos do Bot:</b>
  • Banir usuários (para ações kick/ban)
  • Restringir membros (para mutar durante verificação)
  • Deletar mensagens (para limpar mensagens de captcha)

  <b>Ações de Falha:</b>
  • <code>kick</code> - Banir então imediatamente desbanir (permite que usuário reentre)
  • <code>ban</code> - Banir permanentemente o usuário
  • <code>mute</code> - Manter o usuário mutado por 24 horas

# Extended documentation locale keys - Blacklists module
blacklists_extended_docs: |
  <b>Ações Disponíveis:</b>
  As seguintes ações podem ser definidas usando <code>/blaction</code>:
  • <code>none</code> - Apenas deleta a mensagem sem nenhuma ação adicional
  • <code>warn</code> - Deleta mensagem e emite um aviso ao usuário (padrão)
  • <code>mute</code> - Deleta mensagem e muta o usuário
  • <code>kick</code> - Deleta mensagem e expulsa o usuário (eles podem reentrar)
  • <code>ban</code> - Deleta mensagem e bane permanentemente o usuário

  <b>Nota:</b>
  O modo Padrão para Lista Negra é <b>warn</b>, que deletará a mensagem e emitirá um aviso ao usuário.

  <b>Comandos:</b>
  • <code>/addblacklist &lt;gatilho&gt;</code> - Adiciona a palavra na lista negra do chat atual
  • <code>/rmblacklist &lt;gatilho&gt;</code> - Remove a palavra da Lista de Palavras Proibidas no Chat
  • <code>/blaction &lt;mute/kick/ban/warn/none&gt;</code> - Define a ação a ser executada pelo bot quando uma palavra da lista negra for detectada
  • <code>/remallbl</code> - Remove todas as palavras da lista negra do chat (Apenas Dono)

# Extended documentation locale keys - Disabling module
disabling_extended_docs: |
  <b>Funcionalidades Principais:</b>
  • Desative comandos específicos do bot para usuários não-admin
  • Admins sempre podem contornar comandos desativados
  • Exclusão automática opcional de mensagens de comando desativadas
  • Suporte para desativar múltiplos comandos de uma vez

  <b>Desativar Múltiplos Comandos:</b>
  <code>/disable adminlist rules info</code>
  Desativa comandos <code>/adminlist</code>, <code>/rules</code>, e <code>/info</code> de uma vez.

  <b>Alternar Exclusão de Comando:</b>
  <code>/disabledel on</code> - Mensagens desativadas serão agora deletadas.
  <code>/disabledel off</code> - Mensagens desativadas não serão mais deletadas.
  <code>/disabledel</code> - Verifica a configuração atual de exclusão.

disabling_notes_docs: |
  <b>Notas Importantes:</b>
  • <b>Contorno de Admin:</b> Comandos desativados afetam apenas usuários não-admin. Todos os admins ainda podem usar qualquer comando.
  • <b>Suporte a Conexão:</b> Comandos desativados ainda são acessíveis através do recurso <code>/connect</code> para chats conectados.
  • <b>Múltiplos Comandos:</b> Tanto <code>/disable</code> quanto <code>/enable</code> suportam múltiplos nomes de comando em uma única mensagem.
  • <b>Tratamento de Erros:</b> Se alguns comandos falharem ao desativar/ativar, você será notificado sobre quais tiveram sucesso e quais falharam.

  <b>Permissões Necessárias:</b>
  • <code>/disable</code>, <code>/enable</code>, <code>/disabledel</code>: Apenas admin
  • <code>/disableable</code>, <code>/disabled</code>: Todos os usuários (mas <code>/disabled</code> pode ser desativado)

