bans_help_msg:
  "Às vezes usuários podem ser irritantes e você pode querer removê-los
  do seu chat, este módulo ajuda exatamente com isso!.

  Expulse/bana usuários do seu chat, e desbani-os depois se estiverem se comportando.


  *Comandos de Usuário:*

  × /kickme: expulsa o usuário que usou o comando.


  *Comandos de Ban* (Apenas Admin):

  × /ban <userhandle>: bane um usuário. (via handle, ou reply)

  × /sban <userhandle>: bane um usuário silenciosamente, não envia mensagem para o grupo e também
  deleta seu comando. (via handle, ou reply)

  × /dban <userhandle>: bane um usuário e deleta a mensagem respondida. (via handle, ou
  reply)

  × /tban <userhandle> x(m/h/d): bane um usuário por `x` tempo. (via handle, ou reply).
  m = minutos, h = horas, d = dias.

  × /unban <userhandle>: desbane um usuário. (via handle, ou reply)


  *Comandos de Restrição:* (Apenas Admin)

  × /restrict: Mostra um InlineKeyboard para escolher opções de kick, ban e mute

  × /unrestrict: Mostra um InlineKeyboard para escolher opções de unmute e unban."
