  × /connect `<chatid>`: Conecta ao chat especificado, permitindo que você visualize/edite
  conteúdos.

  × /disconnect: Desconecta do chat atual.

  × /reconnect: Reconecta ao chat previamente conectado

  × /connection: Veja informações sobre o chat atualmente conectado.


