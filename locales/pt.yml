disabling_help_msg:
  "Este módulo permite desativar alguns comandos comumente usados,
  Então, ninguém pode usá-los. Também permitirá auto-deletá-los, impedindo pessoas
  de usarem texto azul.


  *Comandos de admin*:

  × /disable `<commandname>`: Impede usuários de usar commandname neste grupo.

  × /enable `<item name>`: Permite usuários de usar commandname neste grupo.

  × /disableable: Lista todos os comandos desativáveis.

  × /disabledel `<yes/no/on/off>`: Deleta comandos desativados quando usados por não-admins.

  × /disabled: Lista os comandos desativados neste chat.


  Nota:

  Ao desativar um comando, o comando fica desativado apenas para não-admins. Todos os admins
  ainda podem usar esses comandos.

  Comandos desativados ainda são acessíveis através do recurso /connect. Se você
  estiver interessado em ver isso desativado também, me avise no chat de suporte."
filters_help_msg:
  "Filtros não diferenciam maiúsculas de minúsculas; toda vez que alguém disser suas palavras
  de gatilho, Alita responderá com algo diferente! Isso pode ser usado para criar seus comandos,
  se desejado.


  Comandos:

  - /filter <gatilho> <resposta>: Toda vez que alguém disser o gatilho, o bot responderá
  com a frase. Para filtros de múltiplas palavras, coloque o gatilho entre aspas.

  - /filters: Lista todos os filtros do chat.

  - /stop <gatilho>: Para o bot de responder ao gatilho.

  - /stopall: Para TODOS os filtros no chat atual. Esta ação não pode ser desfeita.


  Exemplos:

  - Definir um filtro:

  -> /filter olá Olá! Como você está?

  - Definir um filtro de múltiplas palavras:

  -> /filter olá amigo Olá de volta! Quanto tempo!

  - Definir um filtro que só pode ser usado por admins:

  -> /filter exemplo Este filtro não acontecerá se um usuário normal disser {admin}

  - Para salvar um arquivo, imagem, gif, ou qualquer outro anexo, simplesmente responda ao arquivo
  com:

  -> /filter gatilho"
formatting_fillings: "<b>Preenchedores</b>


  Você também pode personalizar o conteúdo de suas mensagens com dados contextuais. Por exemplo,
  você poderia mencionar um usuário pelo nome na mensagem de boas-vindas, ou mencioná-los em um filtro!

  Você pode usar estes para mencionar um usuário em notas também!


  <b>Preenchedores suportados:</b>

  - <code>{first}</code>: Primeiro nome do usuário.

  - <code>{last}</code>: Sobrenome do usuário.

  - <code>{fullname}</code>: Nome completo do usuário.

  - <code>{username}</code>: Nome de usuário do usuário. Se não tiver, menciona
  o usuário em vez disso.

  - <code>{mention}</code>: Menciona o usuário com seu primeiro nome.

  - <code>{id}</code>: ID do usuário.

  - <code>{chatname}</code>: Nome do chat.

  - <code>{rules}</code>: Adiciona Botão de Regras à Mensagem.

  - <code>{protect}</code>: Protege o conteúdo de ser compartilhado.

  - <code>{preview}</code>: Ativa prévias nas mensagens.

  - <code>{nonotif}</code>: Desativa a notificação para aquela mensagem."
formatting_help_msg: "Alita suporta um grande número de opções de formatação para tornar suas mensagens mais expressivas. Dê uma olhada clicando nos botões abaixo!"
formatting_markdown: |
  <b>Formatação Markdown</b>

  Você pode formatar sua mensagem usando <b>negrito</b>, <i>itálico</i>, <u>sublinhado</u>,
  e muito mais. Vá em frente e experimente!

  <b>Markdown suportado</b>:

  - <code>`palavras de código`</code>: Crases são usadas para fontes monoespaçadas. Aparece como: <code>palavras de código</code>.

  - <code>_palavras em itálico_</code>: Underlines são usados para fontes em itálico. Aparece como: <i>palavras em itálico</i>.

  - <code>*palavras em negrito*</code>: Asteriscos são usados para fontes em negrito. Aparece como: <b>palavras em negrito</b>.

  - <code>~tachado~</code>: Tils são usados para tachado. Aparece como: <strike>tachado</strike>.

  - <code>||spoiler||</code>: Barras verticais duplas são usadas para spoilers. Aparece como: <tg-spoiler>Spoiler</tg-spoiler>.

  - <code>```pre```</code>: Para fazer o formatador ignorar outros caracteres de formatação dentro do texto formatado com '```', ficará como: <code>**negrito** | *negrito*</code>.

  - <code>__sublinhado__</code>: Underlines duplos são usados para sublinhados. Aparece como: sublinhado. NOTA: Alguns clientes tentam ser espertos e interpretam como itálico. Nesse caso, tente usar a formatação embutida do seu aplicativo.

  - <code>[hyperlink](exemplo.com)</code>: Esta é a formatação usada para hyperlinks. Aparece como: <a href='https://example.com/'>hyperlink</a>.

  - <code>[Meu Botão](buttonurl://exemplo.com)</code>: Esta é a formatação usada para criar botões. Este exemplo criará um botão chamado "Meu botão" que abre <code>exemplo.com</code> quando clicado.

  Se você quiser enviar botões na mesma linha, use a formatação <code>:same</code>.

  <b>Exemplo:</b>

  <code>[botão 1](buttonurl:exemplo.com)</code>

  <code>[botão 2](buttonurl://exemplo.com:same)</code>

  <code>[botão 3](buttonurl://exemplo.com)</code>

  Isso mostrará botão 1 e 2 na mesma linha, com o 3 embaixo.
formatting_random: |
  <b>Conteúdo Aleatório</b>

  Outra coisa que pode ser divertida é randomizar o conteúdo de uma mensagem. Deixe as coisas
  um pouco mais pessoais mudando mensagens de boas-vindas, ou mudando notas!

  Como usar conteúdos aleatórios:

  - %%%: Este separador pode ser usado para adicionar respostas aleatórias ao bot.

  Por exemplo:

  <code>olá

  %%%

  como vai</code>

  Isso escolherá aleatoriamente entre enviar a primeira mensagem, "olá", ou a segunda
  mensagem, "como vai".

  Use isso para deixar Alita um pouco mais personalizada! (só funciona em filtros/notas)

  Exemplo de mensagem de boas-vindas:

  - Toda vez que um novo usuário entrar, ele será apresentado com uma das três mensagens
  mostradas aqui.

  -> /filter "oi"

  olá <code>{first}</code>!

  %%%

  Ooooh, <code>{first}</code> como você está?

  %%%

  E aí? <code>{first}</code>
greetings_help_msg:
  "Dê boas-vindas a novos membros em seus grupos ou diga Adeus depois que eles
  saírem!


  *Comandos de Admin:*

  × /setwelcome `<reply/text>`: Define texto de boas-vindas para o grupo.

  × /welcome `<yes/no/on/off>`: Ativa ou Desativa configuração de boas-vindas para o grupo.

  × /resetwelcome: Reseta a mensagem de boas-vindas para o padrão.

  × /setgoodbye `<reply/text>`: Define texto de despedida para o grupo.

  × /goodbye `<yes/no/on/off>`: Ativa ou Desativa configuração de despedida para o grupo.

  × /resetgoodbye: Reseta a mensagem de despedida para o padrão.

  × /cleanservice `<yes/no/on/off>`: Deleta todas as mensagens de serviço como notificação de 'x entrou
  no grupo'.

  × /cleanwelcome `<yes/no/on/off>`: Deleta a mensagem de boas-vindas antiga, sempre que um novo
  membro entrar.

  × /autoapprove `<yes/no/on/off>`: Aprova automaticamente todos os novos membros."
help_about: "@%s  é um dos gerenciadores de grupo mais rápidos e cheios de recursos.   Alita ✨ é desenvolvido e ativamente mantido por @DivideProjects!   Alita está online desde 2020 e serviu milhares de grupos com centenas de milhares de usuários!   <b>Por que Alita:</b>  - Simples: Uso fácil e compatível com muitos comandos de bot.  - Completo: Muitos recursos que outros bots de gerenciamento de grupo não têm.  - Rápido: Adivinhe? Não é feito usando Python, usamos <a href='https://go.dev/'>Go</a> como nossa linguagem de programação principal.   <b>Versão Atual:</b> %s"
help_configuration_step-1: "Bem-vindo à Configuração do Alita


  A primeira coisa a fazer é adicionar Alita ✨ ao seu grupo! Para fazer isso, pressione o
  botão abaixo e selecione seu grupo, depois pressione Concluído para continuar o tutorial."
help_configuration_step-2: "Ok, muito bem!


  Agora para me deixar funcionar corretamente, você precisa me tornar Administrador do seu Grupo!

  Para fazer isso, siga estes passos fáceis:

  ▫️ Vá para seu grupo

  ▫️ Pressione o Nome do Grupo

  ▫️ Pressione Modificar

  ▫️ Pressione em Administrador

  ▫️ Pressione Adicionar Administrador

  ▫️ Pressione a Lupa

  ▫️ Pesquise @%s

  ▫️ Confirmar"
help_configuration_step-3: "Excelente!


  Agora o Bot está pronto para usar!

  Todos os comandos podem ser usados com / ou !


  Se você estiver enfrentando dificuldades para configurar-me em seu grupo, não hesite
  em entrar em @DivideSupport.

  Teremos prazer em ajudá-lo."
help_donatetext: "Então você quer doar? Incrível!

  Quando você doa, todo o fundo vai para meu desenvolvimento que me torna rápida e
  responsiva.

  Sua doação pode também me trazer um novo recurso ou dois, que não consegui
  obter devido a limitações de servidor.

  Todos os fundos serão colocados em meus serviços como banco de dados, armazenamento e hospedagem!

  Você pode doar contatando meu dono aqui: @DivideProjectsBot"
languages_help_msg: "Não consegue mudar o idioma do bot?

  Mude facilmente usando este módulo!


  Basta digitar /lang e usar o teclado inline para escolher um idioma para você ou seu
  grupo.


  Você pode nos ajudar a trazer o bot para mais idiomas ajudando no [Crowdin](https://crowdin.com/project/alita_robot)"
locks_help_msg: "*Apenas Admin*:

  × /lock `<permissão>`: Bloqueia Permissão de Chat..

  × /unlock `<permissão>`: Desbloqueia Permissão de Chat.

  × /locks: Visualiza Permissão de Chat.

  × /locktypes: Verifica tipos de bloqueio disponíveis!


  Locks podem ser usados para restringir usuários de um grupo.

  Bloquear URLs vai auto-deletar todas as mensagens com URLs, bloquear figurinhas vai deletar
  todas as figurinhas, etc.

  Bloquear bots vai impedir não-admins de adicionar bots ao chat.


  **Exemplo:**

  `/lock media`: isso bloqueia todas as mensagens de mídia no chat."
misc_help_msg:
  "× /info: Obtenha suas informações de usuário, que podem ser usadas como resposta ou passando
  um ID de Usuário ou Nome de Usuário.

  × /id: Obtenha o id do grupo atual. Se usado respondendo a uma mensagem, obtém o id
  daquele usuário.

  × /ping: Ping no Servidor Telegram!

  × /tr <código lang> <msg/responder a mensagem>: Traduz a mensagem.

  × /removebotkeyboard: Remove o teclado de bot preso do seu chat.

  × /stat: Obtém a contagem do número total de mensagens no chat."
mutes_help_msg:
  "Às vezes usuários podem ser irritantes e você pode querer restringi-los
  de enviar uma mensagem para o chat, este módulo está aqui para ajudar, você pode usar este módulo
  para silenciar membros em seu grupo.


  *Comandos de Mute:* (Apenas Admin)

  × /mute <userhandle>: silencia um usuário, (via handle, ou reply)

  × /smute <userhandle>: silencia um usuário silenciosamente, não envia mensagem para o grupo,
  e também deleta seu comando. (via handle, ou reply)

  × /dmute <userhandle>: silencia um usuário e deleta a mensagem respondida. (via handle,
  ou reply)

  × /tmute <userhandle> x(m/h/d): silencia um usuário por `x` tempo. (via handle, ou reply).
  m = minutos, h = horas, d = dias.

  × /unmute <userhandle>: desmuta um usuário. (via handle, ou reply)"
notes_help_msg: 'Guarde dados para usuários futuros com notas!

  Notas são ótimas para salvar pedacinhos de informação; um número de telefone, um gif legal,
  uma foto engraçada - qualquer coisa!

  *Comandos de Usuário:*

  - /get <notename>: Obtém uma nota.

  - #notename: Mesmo que /get.

  Comandos de Admin:

  - /save <notename> <texto da nota>: Salva uma nova nota chamada "word". Respondendo a uma mensagem
  vai salvar aquela mensagem. Funciona até em mídia!

  - /clear <notename>: Deleta a nota associada.

  - /notes: Lista todas as notas no chat atual.

  - /saved: Mesmo que /notes.

  - /clearall: Deleta TODAS as notas em um chat. Isso não pode ser desfeito.

  - /privatenotes: Enviar ou não notas no PM. Enviará uma mensagem com um
  botão que usuários podem clicar para obter a nota no PM.'
pins_help_msg:
  "Todos os comandos relacionados a fixar mensagens podem ser encontrados aqui; mantenha seu chat atualizado
  com as últimas notícias com uma simples mensagem fixada!


  *Comandos de Usuário:*

  × /pinned: Obtém a mensagem fixada atual.


  *Comandos de Admin:*

  × /pin: Fixa a mensagem que você respondeu. Adicione 'loud' ou 'notify' para enviar uma notificação
  aos membros do grupo.

  × /pinned: Obtém a última mensagem fixada no Chat Atual.

  × /permapin <texto>: Fixa uma mensagem personalizada através do bot. Esta mensagem pode conter
  markdown, botões, e todas as outras funcionalidades legais.

  × /unpin: Desfixa a mensagem fixada atual. Se usado como resposta, desfixa a mensagem respondida.

  × /unpinall: Desfixa todas as mensagens fixadas.

  × /antichannelpin <yes/no/on/off>: Não deixe o telegram fixar automaticamente canais vinculados.
  Se nenhum argumento for dado, mostra a configuração atual.

  × /cleanlinked <yes/no/on/off>: Deleta mensagens enviadas pelo canal vinculado.

  Nota: Ao usar anti channel pins, certifique-se de usar o comando /unpin, em vez
  de fazer manualmente. Caso contrário, a mensagem antiga será fixada novamente quando o canal
  enviar mensagens."
purges_help_msg: "*Apenas Admin:*

  - /purge: deleta todas as mensagens entre esta e a mensagem respondida.

  - /del: deleta a mensagem que você respondeu.


  *Exemplos*:

  - Delete todas as mensagens da mensagem respondida até agora.

  -> `/purge`"
reports_help_msg:
  "Somos todos pessoas ocupadas que não têm tempo para monitorar nossos grupos
  24/7. Mas como você reage se alguém em seu grupo estiver fazendo spam?


  × /report `<motivo>`: responda a uma mensagem para reportá-la aos admins.

  - @admin: mesmo que /report mas não é um comando.


  *Apenas Admins:*

  × /reports `<on/off/yes/no>`: muda configuração de report, ou vê status atual.

  - Se feito no PM, alterna seu status.

  - Se em um grupo, alterna o status daquele grupo.

  × /reports `block` (apenas via reply): Bloqueia um usuário de usar /report ou @admin.

  × /reports `unblock` (apenas via reply): Desbloqueia um usuário de usar /report ou @admin.

  × /reports `showblocklist`: Verifica todos os usuários bloqueados que não podem usar /report ou
  @admin.


  Para reportar um usuário, simplesmente responda à mensagem dele com @admin ou /report; Natalie
  responderá com uma mensagem afirmando que os admins foram notificados.

  Você DEVE responder a uma mensagem para reportar um usuário; não pode simplesmente usar @admin para marcar
  admins sem motivo!


  *NOTA:* Nenhum destes será acionado se usado por admins."
rules_help_msg:
  "Todo chat funciona com regras diferentes; este módulo ajudará a tornar
  essas regras mais claras!

  *Comandos de Usuário*:

  × /rules: Verifica as regras atuais do chat.

  *Comandos de Admin*:

  × /setrules `<texto>`: Define as regras para este chat.

  × /privaterules `<yes/no/on/off>`: Ativa/desativa se as regras devem ser enviadas
  em privado.

  × /resetrules: Reseta as regras do chat para o padrão

  × /rulesbtn `<texto personalizado>`: Define o texto do botão de regras.

  × /resetrulesbutton: Reseta o texto do botão de regras para o padrão.

  × /resetrulesbtn: Mesmo que acima."
