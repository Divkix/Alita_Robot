warns_help_msg:
  "Mantenha seus membros em cheque com avisos; pare que saiam de
  controle!

  Se você está procurando por avisos automáticos, leia sobre o módulo de lista negra!


  *Comandos de Admin:*

  - /warn <motivo>: Adverte um usuário.

  - /dwarn <motivo>: Adverte um usuário por reply, e deleta a mensagem dele.

  - /swarn <motivo>: Adverte um usuário silenciosamente, e deleta sua mensagem.

  - /warns: Veja os avisos de um usuário.

  - /rmwarn: Remove o aviso mais recente de um usuário.

  - /resetwarn: Reseta todos os avisos de um usuário para 0.

  - /resetallwarns: Deleta todos os avisos em um chat. Todos os usuários retornam a 0 avisos.

  - /warnings: Obtém as configurações de aviso do chat.

  - /setwarnmode <ban/kick/mute>: Define o modo de aviso do chat.

  - /setwarnlimit <número>: Define o número de avisos antes de usuários serem punidos.


  *Exemplos*

  - Adverte um usuário.

  -> `/warn @user Por desobedecer as regras`"

