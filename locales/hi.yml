pins_extended_docs: |
  <b>विशेषताएं:</b>

  <b>एंटी-चैनल पिन:</b>
  सक्षम होने पर, बॉट स्वचालित रूप से किसी भी संदेश को अनपिन कर देगा जो लिंक किए गए चैनल द्वारा स्वचालित रूप से पिन किया जाता है। यह तब उपयोगी है जब आप अपने ग्रुप में क्या पिन होता है उस पर नियंत्रण बनाए रखना चाहते हैं।

  <b>महत्वपूर्ण:</b> एंटी चैनल पिन का उपयोग करते समय, हमेशा टेलीग्राम के माध्यम से मैन्युअल रूप से अनपिन करने के बजाय <code>/unpin</code> कमांड का उपयोग करें। मैन्युअल अनपिन करने से जब चैनल नए संदेश भेजता है तो पुराना संदेश फिर से पिन हो जाएगा।

  <b>क्लीन लिंक्ड:</b>
  सक्षम होने पर, बॉट स्वचालित रूप से लिंक किए गए चैनल से ग्रुप में भेजे गए किसी भी संदेश को हटा देगा। यह आपकी ग्रुप चैट को क्रॉस-पोस्ट किए गए चैनल सामग्री से साफ रखता है।

  <b>Permapin:</b>
  इसके साथ कस्टम पिन किए गए संदेश बनाएं:
  • HTML/मार्कडाउन फॉर्मेटिंग के साथ टेक्स्ट
  • URL के साथ इनलाइन बटन
  • मीडिया अटैचमेंट (फोटो, दस्तावेज़, स्टिकर, ऑडियो, वीडियो, वॉयस नोट्स, वीडियो नोट्स)
  • सभी मानक संदेश फिलिंग ({first}, {chatname}, आदि)
pins_notes_docs: |
  <b>नोट्स:</b>
  • <code>/unpinall</code> कमांड सभी संदेशों को अनपिन करने से पहले एक पुष्टि संवाद दिखाता है
  • Permapin सभी मीडिया प्रकारों का समर्थन करता है जो टेलीग्राम पिनिंग के लिए समर्थन करता है
  • एंटी-चैनल पिन और क्लीन लिंक्ड सेटिंग्स प्रति-चैट संग्रहीत होती हैं और बॉट पुनरारंभ के बाद भी बनी रहती हैं

  <b>आवश्यक अनुमतियां:</b>
  <b>बॉट:</b> "संदेश पिन करें" अनुमति के साथ एडमिन होना चाहिए
  <b>उपयोगकर्ता:</b> अधिकांश कमांड के लिए "संदेश पिन करें" अनुमति के साथ एडमिन होना चाहिए

