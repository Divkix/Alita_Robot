notes_extended_docs: |
  <b>विशेषताएं:</b>
  • <b>टेक्स्ट और मीडिया सपोर्ट</b>: टेक्स्ट संदेश, फोटो, वीडियो, दस्तावेज़ और बहुत कुछ सेव करें
  • <b>कस्टम बटन</b>: नोट्स में इनलाइन कीबोर्ड बटन जोड़ें
  • <b>फॉर्मेटिंग विकल्प</b>: नोट दृश्यता और व्यवहार नियंत्रित करें
  • <b>केवल एडमिन नोट्स</b>: कुछ नोट्स को केवल एडमिन तक सीमित करें
  • <b>प्राइवेट नोट्स</b>: DM के माध्यम से उपयोगकर्ताओं को निजी तौर पर नोट्स भेजें
  • <b>वेब पूर्वावलोकन नियंत्रण</b>: लिंक पूर्वावलोकन सक्षम या अक्षम करें
  • <b>संरक्षित सामग्री</b>: नोट सामग्री को फॉरवर्ड होने से रोकें

  <b>नोट फॉर्मेटिंग विकल्प:</b>
  नोट सेव करते समय, आप इसके व्यवहार को नियंत्रित करने के लिए विशेष टैग का उपयोग कर सकते हैं:
  • <code>{private}</code> - नोट केवल DM के माध्यम से भेजा जाएगा, कभी ग्रुप में नहीं
  • <code>{noprivate}</code> - नोट केवल ग्रुप में भेजा जाएगा, कभी DM के माध्यम से नहीं
  • <code>{admin}</code> - नोट केवल एडमिन द्वारा एक्सेस किया जा सकता है
  • <code>{protect}</code> - सामग्री फॉरवर्ड नहीं की जा सकती
  • <code>{nonotif}</code> - बिना नोटिफिकेशन ध्वनि के भेजें
  • <code>{nopreview}</code> - लिंक पूर्वावलोकन अक्षम करें
notes_permissions_docs: |
