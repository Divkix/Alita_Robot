purges_extended_docs: |
  <b>purgefrom/purgeto के साथ रेंज विलोपन:</b>
  जब आपको विलोपन रेंज पर अधिक नियंत्रण चाहिए:

  1. रेंज में <b>पहले</b> संदेश का जवाब दें:
  <code>/purgefrom</code>
  बॉट पुष्टि करेगा कि संदेश चिह्नित है (30 सेकंड बाद समाप्त)।

  2. रेंज में <b>आखिरी</b> संदेश का जवाब दें:
  <code>/purgeto</code>
  दोनों मार्करों के बीच के सभी संदेश (समावेशी) हटा दिए जाएंगे।

  यह तब उपयोगी है जब आप आसानी से शुरुआती बिंदु तक स्क्रॉल नहीं कर सकते या विलोपन से पहले रेंज सत्यापित करना चाहते हैं।

  <b>सीमाएं और प्रतिबंध:</b>
  • <b>प्रति पर्ज अधिकतम संदेश:</b> 1000 संदेश
  • <b>संदेश आयु सीमा:</b> 48 घंटे से अधिक पुराने संदेश हटाने योग्य नहीं हो सकते (टेलीग्राम API प्रतिबंध)
  • <b>आवश्यक अनुमतियां:</b> उपयोगकर्ता और बॉट दोनों के पास "संदेश हटाएं" अनुमति होनी चाहिए
purges_notes_docs: |
  <b>नोट्स:</b>
  • <code>/purgefrom</code> मार्कर 30 सेकंड बाद समाप्त हो जाता है यदि <code>/purgeto</code> का पालन नहीं किया जाता
  • बड़ी रेंज हटाना बेहतर प्रदर्शन के लिए समवर्ती प्रसंस्करण का उपयोग करता है
  • स्टेटस संदेश (दिखाते हुए कि कितने संदेश हटाए गए) 3 सेकंड बाद ऑटो-डिलीट हो जाते हैं
  • बॉट पहले से हटाए गए संदेशों को बिना त्रुटियों के शानदार ढंग से संभालता है

