reports_extended_docs: |
  <b>यह कैसे काम करता है:</b>

  <b>संदेश रिपोर्ट करना:</b>
  1. <b>आपत्तिजनक संदेश का जवाब</b> <code>/report</code> या <code>@admin</code> का उल्लेख करके
  2. बॉट उन सभी एडमिन को एक सूचना भेजता है जिन्होंने रिपोर्ट सक्षम की हैं
  3. सूचना में त्वरित मॉडरेशन के लिए कार्रवाई बटन शामिल हैं

  <b>एडमिन कार्रवाई बटन:</b>
  • <b>📩 संदेश</b> - रिपोर्ट किए गए संदेश का लिंक
  • <b>👢 किक</b> - रिपोर्ट किए गए उपयोगकर्ता को किक करें (वे फिर से शामिल हो सकते हैं)
  • <b>🚫 बैन</b> - रिपोर्ट किए गए उपयोगकर्ता को स्थायी रूप से बैन करें
  • <b>🗑 हटाएं</b> - रिपोर्ट किए गए संदेश को हटाएं
  • <b>✅ समाधान</b> - रिपोर्ट को बिना कार्रवाई के समाधान के रूप में चिह्नित करें

  <b>व्यक्तिगत बनाम ग्रुप सेटिंग्स:</b>
  • <b>PM में:</b> <code>/reports on/off</code> टॉगल करता है कि आपको रिपोर्ट सूचनाएं प्राप्त होती हैं या नहीं
  • <b>ग्रुप में:</b> <code>/reports on/off</code> टॉगल करता है कि उस ग्रुप के लिए रिपोर्टिंग सक्षम है या नहीं
reports_permissions_docs: |
  <b>कौन रिपोर्ट कर सकता है?</b>
  ✅ नियमित उपयोगकर्ता
  ❌ एडमिन (खुद को रिपोर्ट करने की जरूरत नहीं)
  ❌ ब्लॉक किए गए उपयोगकर्ता
  ❌ गुमनाम चैनल / टेलीग्राम सिस्टम खाते

  <b>किसकी रिपोर्ट की जा सकती है?</b>
  ✅ नियमित उपयोगकर्ता
  ❌ बॉट स्वयं
  ❌ एडमिन (रिपोर्ट से सुरक्षित)
  ❌ गुमनाम चैनल / टेलीग्राम सिस्टम खाते

