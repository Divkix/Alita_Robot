# Warns extended documentation
warns_extended_docs: |
  <b>डिफ़ॉल्ट सेटिंग्स:</b>
  • <b>डिफ़ॉल्ट चेतावनी सीमा:</b> 3 चेतावनियां
  • <b>डिफ़ॉल्ट चेतावनी मोड:</b> mute

  <b>उपलब्ध चेतावनी मोड:</b>
  • <code>ban</code> - उपयोगकर्ता को चैट से स्थायी रूप से बैन करें
  • <code>kick</code> - उपयोगकर्ता को किक करें (वे फिर से जुड़ सकते हैं)
  • <code>mute</code> - उपयोगकर्ता को म्यूट करें (संदेश नहीं भेज सकते)

  <b>साइलेंट और डिलीट चेतावनियां:</b>
  • <code>/swarn</code> - अपना कमांड हटाएं और चुपचाप चेतावनी दें
  • <code>/dwarn</code> - उपयोगकर्ता का संदेश हटाएं और उन्हें चेतावनी दें

warns_permissions_docs: |
  <b>अनुमति आवश्यकताएं:</b>
  • <code>/warn</code>, <code>/dwarn</code>, <code>/swarn</code>: बॉट एडमिन + उपयोगकर्ता एडमिन प्रतिबंधित के साथ
  • <code>/rmwarn</code>, <code>/unwarn</code>: बॉट एडमिन + उपयोगकर्ता एडमिन
  • <code>/resetwarn</code>, <code>/resetwarns</code>: बॉट एडमिन + उपयोगकर्ता एडमिन
  • <code>/resetallwarns</code>: केवल चैट मालिक
  • <code>/setwarnmode</code>, <code>/setwarnlimit</code>: बॉट एडमिन + उपयोगकर्ता एडमिन
  • <code>/warnings</code>: बॉट एडमिन + उपयोगकर्ता एडमिन
  • <code>/warns</code>: कोई भी उपयोगकर्ता (अक्षम किया जा सकता है)

warns_notes_docs: |
  <b>नोट्स:</b>
  • जब कोई उपयोगकर्ता चेतावनी सीमा तक पहुंचता है, तो कॉन्फ़िगर की गई कार्रवाई (ban/kick/mute) स्वचालित रूप से लागू होती है
  • चेतावनी कारण संग्रहीत किए जाते हैं और उपयोगकर्ता की चेतावनियां जांचते समय प्रदर्शित होते हैं
  • <code>/warns</code> कमांड इस मॉड्यूल में एकमात्र कमांड है जिसे एडमिन द्वारा अक्षम किया जा सकता है
  • अनाम चैनल पोस्ट को चेतावनी नहीं दी जा सकती
  • एडमिन को चेतावनी नहीं दी जा सकती

