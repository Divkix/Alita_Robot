  3. उपयोगकर्ता को दिए गए विकल्पों में से सही उत्तर चुनना होगा
  4. सफल होने पर, उपयोगकर्ता अनम्यूट हो जाता है और ग्रुप में भाग ले सकता है
  5. यदि वे विफल होते हैं या टाइमआउट होता है, कॉन्फ़िगर की गई कार्रवाई की जाती है (kick, ban, या mute)

  <b>कैप्चा प्रकार:</b>
  • <b>Math</b>: सरल अंकगणितीय समस्याएं हल करें (जोड़, घटाव, गुणा)
  • <b>Text</b>: विकृत छवि में दिखाए गए टेक्स्ट की पहचान करें

  <b>लंबित संदेश सुविधा:</b>
  जब कोई उपयोगकर्ता कैप्चा पूरा कर रहा होता है, तो वे जो भी संदेश भेजने का प्रयास करते हैं, वे संग्रहीत और हटा दिए जाते हैं। एडमिन:
  • <code>/captchapending</code> का उपयोग करके देख सकते हैं कि उपयोगकर्ता ने कौन से संदेश भेजने का प्रयास किया
  • <code>/captchaclear</code> का उपयोग करके संग्रहीत संदेश साफ़ कर सकते हैं

  यह उपयोगकर्ताओं के सत्यापन पूरा करने से पहले संभावित स्पैम प्रयासों की पहचान करने में मदद करता है।
captcha_permissions_docs: |
  <b>बॉट आवश्यकताएं:</b>
  • उपयोगकर्ताओं को बैन करें (kick/ban कार्रवाइयों के लिए)
  • सदस्यों को प्रतिबंधित करें (सत्यापन के दौरान म्यूट करने के लिए)
  • संदेश हटाएं (कैप्चा संदेशों को साफ़ करने के लिए)

  <b>विफलता कार्रवाइयां:</b>
  • <code>kick</code> - बैन करें फिर तुरंत अनबैन करें (उपयोगकर्ता फिर से शामिल हो सकता है)
  • <code>ban</code> - उपयोगकर्ता को स्थायी रूप से बैन करें
  • <code>mute</code> - उपयोगकर्ता को 24 घंटे के लिए म्यूट रखें

