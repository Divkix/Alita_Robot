filters_extended_docs: |
  <b>उन्नत विशेषताएं:</b>

  <b>यादृच्छिक प्रतिक्रियाएं:</b>
  कई प्रतिक्रियाओं को अलग करने के लिए <code>%%%</code> का उपयोग करें। एक यादृच्छिक रूप से चुना जाएगा:
  <code>/filter hello नमस्ते!%%%हैलो!%%%कैसे हैं आप?</code>

  <b>मीडिया फ़िल्टर:</b>
  किसी भी मीडिया (फोटो, वीडियो, दस्तावेज़, स्टिकर, आदि) का जवाब <code>/filter trigger</code> के साथ दें जो उस मीडिया को भेजने वाला फ़िल्टर बनाने के लिए।

  <b>Noformat मोड:</b>
  एडमिन कच्ची फ़िल्टर सामग्री (फॉर्मेटिंग कोड सहित) देखने के लिए trigger के बाद <code>noformat</code> जोड़ सकते हैं:
  <code>hello noformat</code>
  यह फ़िल्टर डीबग करने या बटन कॉन्फ़िगरेशन देखने के लिए उपयोगी है।

  <b>फ़िल्टर बटन:</b>
  आप अपने फ़िल्टर में इनलाइन बटन जोड़ सकते हैं:
  <code>/filter hello नमस्ते! ये लिंक देखें:
  [बटन 1](buttonurl:https://example.com)
  [बटन 2](buttonurl:https://example2.com)</code>
filters_technical_docs: |
  <b>फ़िल्टर कैसे काम करते हैं:</b>
  1. जब कोई संदेश प्राप्त होता है, बॉट एक अनुकूलित कैश्ड क्वेरी का उपयोग करके चैट के सभी फ़िल्टर प्राप्त करता है
  2. Aho-Corasick एल्गोरिथ्म कुशलता से संदेश टेक्स्ट के खिलाफ सभी फ़िल्टर कीवर्ड का मिलान करता है
  3. पहला मिलान फ़िल्टर एक प्रतिक्रिया ट्रिगर करता है
  4. फ़िल्टर टेक्स्ट, मीडिया और बटन प्रतिक्रियाओं का समर्थन करते हैं

  <b>ओवरराइट पुष्टि:</b>
  जब आप पहले से मौजूद फ़िल्टर जोड़ने का प्रयास करते हैं, बॉट ओवरराइट करने से पहले पुष्टि मांगेगा। पुष्टि 5 मिनट बाद समाप्त हो जाती है।

  <b>कैश व्यवहार:</b>
  • फ़िल्टर सूचियां प्रति चैट 15 मिनट के लिए कैश की जाती हैं
  • फ़िल्टर जोड़ने या हटाने पर कैश स्वचालित रूप से अमान्य हो जाता है
filters_limits_docs: |
  <b>सीमाएं:</b>
  • प्रति चैट अधिकतम 150 फ़िल्टर
  • प्रति फ़िल्टर कीवर्ड अधिकतम 100 अक्षर
  • फ़िल्टर कीवर्ड लोअरकेस में संग्रहीत होते हैं

  <b>आवश्यक अनुमतियां:</b>
  • <code>/filter</code>, <code>/addfilter</code>: जानकारी बदलने की अनुमति वाले एडमिन
  • <code>/stop</code>, <code>/rmfilter</code>, <code>/removefilter</code>: जानकारी बदलने की अनुमति वाले एडमिन
  • <code>/stopall</code>: केवल चैट मालिक
  • <code>/filters</code>: सभी उपयोगकर्ताओं के लिए उपलब्ध

# Formatting module strings
formatting_fillings: "<b>फिलिंग्स</b>\n\n\n  आप प्रासंगिक डेटा के साथ अपने संदेश की सामग्री को अनुकूलित भी कर सकते हैं। उदाहरण के लिए, आप स्वागत संदेश में किसी उपयोगकर्ता का नाम से उल्लेख कर सकते हैं, या फ़िल्टर में उनका उल्लेख कर सकते हैं!\n\n  आप इनका उपयोग नोट्स में भी उपयोगकर्ता का उल्लेख करने के लिए कर सकते हैं!\n\n\n  <b>समर्थित फिलिंग्स:</b>\n\n  - <code>{first}</code>: उपयोगकर्ता का पहला नाम।\n\n  - <code>{last}</code>: उपयोगकर्ता का अंतिम नाम।\n\n  - <code>{fullname}</code>: उपयोगकर्ता का पूरा नाम।\n\n  - <code>{username}</code>: उपयोगकर्ता का उपयोगकर्ता नाम। यदि उनके पास नहीं है, तो इसके बजाय उपयोगकर्ता का उल्लेख करता है।\n\n  - <code>{mention}</code>: उपयोगकर्ता के पहले नाम के साथ उनका उल्लेख करता है।\n\n  - <code>{id}</code>: उपयोगकर्ता की ID।\n\n  - <code>{chatname}</code>: चैट का नाम।\n\n  - <code>{rules}</code>: संदेश में नियम बटन जोड़ता है।\n\n  - <code>{protect}</code>: सामग्री को साझा होने से बचाता है।\n\n  - <code>{preview}</code>: संदेशों में पूर्वावलोकन सक्षम करता है।\n\n  - <code>{nonotif}</code>: उस संदेश के लिए नोटिफिकेशन अक्षम करता है।"
formatting_markdown: |
  <b>मार्कडाउन फॉर्मेटिंग</b>

  आप अपने संदेश को <b>बोल्ड</b>, <i>इटैलिक्स</i>, <u>अंडरलाइन</u> और बहुत कुछ का उपयोग करके फॉर्मेट कर सकते हैं। आगे बढ़ें और प्रयोग करें!

  <b>समर्थित मार्कडाउन</b>:

  - <code>`code words`</code>: बैकटिक्स मोनोस्पेस फॉन्ट के लिए उपयोग किए जाते हैं। दिखाता है: <code>code words</code>।

  - <code>_italic words_</code>: अंडरस्कोर इटैलिक फॉन्ट के लिए उपयोग किए जाते हैं। दिखाता है: <i>italic words</i>।

  - <code>*bold words*</code>: तारक बोल्ड फॉन्ट के लिए उपयोग किए जाते हैं। दिखाता है: <b>bold words</b>।

  - <code>~strikethrough~</code>: टिल्ड स्ट्राइकथ्रू के लिए उपयोग किए जाते हैं। दिखाता है: <strike>strikethrough</strike>।

  - <code>||spoiler||</code>: डबल वर्टिकल बार स्पॉइलर के लिए उपयोग किए जाते हैं। दिखाता है: <tg-spoiler>Spoiler</tg-spoiler>।

  - <code>```pre```</code>: '```' के साथ फॉर्मेट किए गए टेक्स्ट के अंदर अन्य फॉर्मेटिंग अक्षरों को अनदेखा करने के लिए।

  - <code>__underline__</code>: डबल अंडरस्कोर अंडरलाइन के लिए उपयोग किए जाते हैं।

  - <code>[hyperlink](example.com)</code>: यह हाइपरलिंक के लिए फॉर्मेटिंग है।

  - <code>[My Button](buttonurl://example.com)</code>: यह बटन बनाने के लिए फॉर्मेटिंग है।
formatting_random: |
  <b>यादृच्छिक सामग्री</b>

  एक और मजेदार चीज संदेश की सामग्री को यादृच्छिक बनाना है। स्वागत संदेशों या नोट्स को बदलकर चीजों को थोड़ा अधिक व्यक्तिगत बनाएं!

  यादृच्छिक सामग्री का उपयोग कैसे करें:

  - %%%: इस विभाजक का उपयोग बॉट में यादृच्छिक जवाब जोड़ने के लिए किया जा सकता है।

  उदाहरण के लिए:

  <code>नमस्ते

  %%%

  कैसे हैं आप</code>

  यह यादृच्छिक रूप से पहला संदेश "नमस्ते" या दूसरा संदेश "कैसे हैं आप" भेजने के बीच चुनेगा।

  इसका उपयोग Alita को थोड़ा अधिक अनुकूलित महसूस कराने के लिए करें! (केवल फ़िल्टर/नोट्स में काम करता है)
formatting_press_button: "मार्कडाउन सहायता प्राप्त करने के लिए नीचे बटन दबाएं!"
formatting_large_options: "Alita आपके संदेशों को अधिक अभिव्यंजक बनाने के लिए बड़ी संख्या में फॉर्मेटिंग विकल्पों का समर्थन करता है। एक नज़र डालें!"

