blacklists_extended_docs: |
  <b>उपलब्ध कार्रवाइयां:</b>
  निम्नलिखित कार्रवाइयां <code>/blaction</code> का उपयोग करके सेट की जा सकती हैं:
  • <code>none</code> - बिना किसी अतिरिक्त कार्रवाई के संदेश को हटाता है
  • <code>warn</code> - संदेश को हटाता है और उपयोगकर्ता को चेतावनी देता है (डिफ़ॉल्ट)
  • <code>mute</code> - संदेश को हटाता है और उपयोगकर्ता को म्यूट करता है
  • <code>kick</code> - संदेश को हटाता है और उपयोगकर्ता को किक करता है (वे फिर से शामिल हो सकते हैं)
  • <code>ban</code> - संदेश को हटाता है और उपयोगकर्ता को स्थायी रूप से बैन करता है

  <b>नोट:</b>
  ब्लैकलिस्ट के लिए डिफ़ॉल्ट मोड <b>warn</b> है, जो संदेश को हटाएगा और उपयोगकर्ता को चेतावनी देगा।

  <b>कमांड:</b>
  • <code>/addblacklist &lt;trigger&gt;</code> - वर्तमान चैट में शब्द को ब्लैकलिस्ट करें
  • <code>/rmblacklist &lt;trigger&gt;</code> - चैट में ब्लैकलिस्ट किए गए शब्दों से शब्द हटाएं
  • <code>/blaction &lt;mute/kick/ban/warn/none&gt;</code> - ब्लैकलिस्ट शब्द का पता चलने पर बॉट द्वारा की जाने वाली कार्रवाई सेट करें
  • <code>/remallbl</code> - चैट से सभी ब्लैकलिस्ट किए गए शब्दों को हटाएं (केवल मालिक)

