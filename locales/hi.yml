  <b>प्राइवेट नियम:</b>
  प्राइवेट नियम सक्षम करें (<code>/privaterules on</code>) ताकि ग्रुप के बजाय PM के माध्यम से नियम भेजे जाएं। यह ग्रुप चैट को साफ रखता है।

  <b>कस्टम नियम बटन:</b>
  एक कस्टम बटन टेक्स्ट सेट करें (अधिकतम 30 अक्षर):
  <code>/rulesbtn नियम देखें</code>

  डिफ़ॉल्ट पर रीसेट करें:
  <code>/resetrulesbtn</code>

  <b>नियम सेट करना:</b>
  आप सीधे टेक्स्ट प्रदान करके या किसी संदेश का जवाब देकर नियम सेट कर सकते हैं:
  <code>/setrules कृपया सभी सदस्यों के प्रति सम्मानजनक रहें।</code>

  या किसी संदेश का जवाब दें:
  <code>/setrules</code>

  <b>आवश्यक अनुमतियां:</b>
  • उपयोगकर्ता कमांड: सभी उपयोगकर्ताओं के लिए उपलब्ध
  • एडमिन कमांड: चैट में एडमिन अनुमतियां आवश्यक

