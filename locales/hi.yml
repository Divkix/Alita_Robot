mutes_extended_docs: |
  <b>अस्थायी म्यूट के लिए समय प्रारूप:</b>
  • <code>m</code> = मिनट (उदा., <code>30m</code>)
  • <code>h</code> = घंटे (उदा., <code>2h</code>)
  • <code>d</code> = दिन (उदा., <code>1d</code>)

  <b>म्यूट वैरिएंट:</b>
  • <code>/mute</code> - वैकल्पिक कारण के साथ मानक म्यूट
  • <code>/smute</code> - साइलेंट म्यूट (आपके कमांड संदेश को हटाता है)
  • <code>/dmute</code> - डिलीट-म्यूट (उपयोगकर्ता को म्यूट करता है और उनका संदेश हटाता है)
  • <code>/tmute</code> - निर्दिष्ट अवधि के साथ अस्थायी म्यूट

  <b>आवश्यक अनुमतियां:</b>
  <b>केवल एडमिन कमांड।</b> इन कमांड को निष्पादित करने वाले उपयोगकर्ताओं के पास होना चाहिए:
  • चैट में एडमिन स्थिति
  • सदस्यों को प्रतिबंधित करने की अनुमति

  बॉट के पास भी सदस्यों को प्रतिबंधित करने की अनुमति के साथ एडमिन विशेषाधिकार होने चाहिए।

