# Module Help Messages

antiflood_help_msg: "क्या आप जानते हैं कि कभी-कभी लोग जुड़ते हैं, 100 संदेश भेजते हैं, और आपकी चैट को बर्बाद कर देते हैं? Antiflood के साथ, अब ऐसा नहीं होगा!


  Antiflood आपको उन उपयोगकर्ताओं पर कार्रवाई करने की अनुमति देता है जो एक के बाद एक x संदेश भेजते हैं। कार्रवाई हैं: ban/kick/mute


  *एडमिन कमांड*:

  × /flood: वर्तमान antiflood सेटिंग्स प्राप्त करें।

  × /setflood `<number/off/no>`: संदेशों की संख्या सेट करें जिसके बाद उपयोगकर्ता पर कार्रवाई की जाएगी। अक्षम करने के लिए '0', 'off', या 'no' सेट करें।

  × /setfloodmode `<action type>`: चुनें कि flooding करने वाले उपयोगकर्ता पर कौन सी कार्रवाई की जाए। विकल्प: ban/kick/mute

  × /delflood `<yes/no/on/off>`: यदि आप चाहते हैं कि बॉट उपयोगकर्ता द्वारा flood किए गए संदेशों को हटाए।"

bans_help_msg: "कभी-कभी उपयोगकर्ता परेशान कर सकते हैं और आप उन्हें अपनी चैट से हटाना चाह सकते हैं, यह मॉड्यूल इसी में आपकी मदद करता है!

  अपनी चैट से उपयोगकर्ताओं को Ban/kick करें, और बाद में उन्हें अनबैन करें यदि वे ठीक से व्यवहार कर रहे हैं।


  *उपयोगकर्ता कमांड:*

  × /kickme: जिस उपयोगकर्ता ने कमांड दिया उसे किक करता है।


  *बैन कमांड* (केवल एडमिन):

  × /ban <userhandle>: एक उपयोगकर्ता को बैन करता है। (हैंडल द्वारा, या रिप्लाई द्वारा)

  × /sban <userhandle>: एक उपयोगकर्ता को चुपचाप बैन करता है, ग्रुप में संदेश नहीं भेजता और आपके कमांड को भी हटा देता है। (हैंडल द्वारा, या रिप्लाई द्वारा)

  × /dban <userhandle>: एक उपयोगकर्ता को बैन करता है और रिप्लाई किए गए संदेश को हटा देता है। (हैंडल द्वारा, या रिप्लाई द्वारा)

  × /tban <userhandle> x(m/h/d): एक उपयोगकर्ता को `x` समय के लिए बैन करता है। (हैंडल द्वारा, या रिप्लाई द्वारा)। m = मिनट, h = घंटे, d = दिन।

  × /unban <userhandle>: एक उपयोगकर्ता को अनबैन करता है। (हैंडल द्वारा, या रिप्लाई द्वारा)


  *प्रतिबंध कमांड:* (केवल एडमिन)

  × /restrict: kick, ban और mute में से विकल्प चुनने के लिए InlineKeyboard दिखाता है

  × /unrestrict: unmute और unban में से विकल्प चुनने के लिए InlineKeyboard दिखाता है।"

blacklists_help_msg: "*उपयोगकर्ता कमांड:*

  × /blacklists: चैट में सभी ब्लैकलिस्ट देखें।


  *एडमिन कमांड:*

  × /addblacklist `<trigger>`: वर्तमान चैट में शब्द को ब्लैकलिस्ट करें।

  × /rmblacklist `<trigger>`: चैट में ब्लैकलिस्ट किए गए शब्दों से शब्द हटाएं।

  × /blaction `<mute/kick/ban/warn/none>`: ब्लैकलिस्ट शब्द का पता चलने पर बॉट द्वारा की जाने वाली कार्रवाई सेट करें।

  × /blacklistaction: ऊपर जैसा ही


  *केवल मालिक:*

  × /remallbl: चैट से सभी ब्लैकलिस्ट किए गए शब्दों को हटाता है


  *नोट:*

  ब्लैकलिस्ट के लिए डिफ़ॉल्ट मोड *none* है, जो केवल चैट से संदेशों को हटाएगा।"

captcha_help_msg: "CAPTCHA सत्यापन के साथ अपने ग्रुप को बॉट्स और स्पैमर्स से बचाएं!


  नए सदस्यों को संदेश भेजने से पहले एक साधारण चुनौती को हल करके यह साबित करना होगा कि वे मानव हैं।


  *कैप्चा प्रकार:*

  × Math: सरल अंकगणितीय समस्याएं हल करें

  × Text: एक छवि में दिखाए गए टेक्स्ट की पहचान करें


  *एडमिन कमांड:*

  × /captcha `<on/off>`: कैप्चा सत्यापन सक्षम या अक्षम करें

  × /captchamode `<math/text>`: कैप्चा प्रकार सेट करें (गणित की समस्याएं या टेक्स्ट पहचान)

  × /captchatime `<1-10>`: टाइमआउट मिनटों में सेट करें (डिफ़ॉल्ट: 2)

  × /captchaaction `<kick/ban/mute>`: विफल सत्यापन के लिए कार्रवाई सेट करें (डिफ़ॉल्ट: kick)

  × /captchaattempts `<1-10>`: अधिकतम सत्यापन प्रयास सेट करें (डिफ़ॉल्ट: 3)


  सक्षम होने पर, नए सदस्य कैप्चा पूरा करने तक स्वचालित रूप से म्यूट हो जाते हैं।

  यदि वे विफल होते हैं या टाइमआउट होता है, तो कॉन्फ़िगर की गई कार्रवाई की जाती है।"

connections_help_msg: "यह मॉड्यूल आपको चैट के डेटाबेस से जुड़ने और चैट को जाने बिना उसमें चीजें जोड़ने की अनुमति देता है! स्पष्ट कारणों से, चीजें जोड़ने के लिए आपको एडमिन होना चाहिए; लेकिन कोई भी सदस्य आपका डेटा देख सकता है। (banned/kicked उपयोगकर्ता नहीं!)


  *कमांड*:

  × /connect `<chatid>`: निर्दिष्ट चैट से जुड़ें, जिससे आप सामग्री देख/संपादित कर सकें।

  × /disconnect: वर्तमान चैट से डिस्कनेक्ट करें।

  × /reconnect: पहले से जुड़ी चैट से फिर से जुड़ें

  × /connection: वर्तमान में जुड़ी चैट के बारे में जानकारी देखें।


  *एडमिन कमांड:*

  × /allowconnect <yes/no>: उपयोगकर्ताओं को चैट से जुड़ने की अनुमति दें या नहीं।


  आप अपनी चैट में /id कमांड का उपयोग करके चैट id प्राप्त कर सकते हैं। यदि id नकारात्मक है तो आश्चर्यचकित न हों; सभी सुपर ग्रुप्स में नकारात्मक id होती है।"

disabling_help_msg: "यह मॉड्यूल आपको कुछ आमतौर पर उपयोग किए जाने वाले कमांड को अक्षम करने की अनुमति देता है, इसलिए कोई भी उनका उपयोग नहीं कर सकता। यह आपको उन्हें ऑटोडिलीट करने की भी अनुमति देगा, लोगों को ब्लू टेक्स्ट करने से रोकेगा।


  *एडमिन कमांड*:

  × /disable `<commandname>`: इस ग्रुप में उपयोगकर्ताओं को commandname का उपयोग करने से रोकें।

  × /enable `<item name>`: इस ग्रुप में उपयोगकर्ताओं को commandname का उपयोग करने की अनुमति दें।

  × /disableable: सभी अक्षम करने योग्य कमांड की सूची।

  × /disabledel `<yes/no/on/off>`: गैर-एडमिन द्वारा उपयोग किए जाने पर अक्षम कमांड को हटाएं।

  × /disabled: इस चैट में अक्षम कमांड की सूची।


  नोट:

  किसी कमांड को अक्षम करने पर, कमांड केवल गैर-एडमिन के लिए अक्षम होता है। सभी एडमिन अभी भी उन कमांड का उपयोग कर सकते हैं।

  अक्षम कमांड अभी भी /connect सुविधा के माध्यम से सुलभ हैं। यदि आप इसे भी अक्षम देखना चाहते हैं, तो सपोर्ट चैट में मुझे बताएं।"

filters_help_msg: "फ़िल्टर केस इनसेंसिटिव हैं; जब भी कोई आपके ट्रिगर शब्द कहता है, Alita कुछ और जवाब देगा! इसका उपयोग आपके कमांड बनाने के लिए किया जा सकता है, यदि वांछित हो।


  कमांड:

  - /filter <trigger> <reply>: जब भी कोई trigger कहता है, बॉट sentence के साथ जवाब देगा। एकाधिक शब्द फ़िल्टर के लिए, trigger को quote करें।

  - /filters: सभी चैट फ़िल्टर की सूची।

  - /stop <trigger>: बॉट को trigger का जवाब देने से रोकें।

  - /stopall: वर्तमान चैट में सभी फ़िल्टर रोकें। यह क्रिया पूर्ववत नहीं की जा सकती।


  उदाहरण:

  - फ़िल्टर सेट करें:

  -> /filter hello नमस्ते! कैसे हैं आप?

  - मल्टीवर्ड फ़िल्टर सेट करें:

  -> /filter hello friend नमस्ते! बहुत दिनों बाद मिले!

  - फ़िल्टर सेट करें जो केवल एडमिन द्वारा उपयोग किया जा सकता है:

  -> /filter example यह फ़िल्टर नहीं होगा यदि कोई सामान्य उपयोगकर्ता इसे कहता है {admin}

  - फ़ाइल, इमेज, gif, या कोई अन्य अटैचमेंट सेव करने के लिए, बस फ़ाइल पर रिप्लाई करें:

  -> /filter trigger"

formatting_help_msg: "Alita आपके संदेशों को अधिक अभिव्यंजक बनाने के लिए बड़ी संख्या में फॉर्मेटिंग विकल्पों का समर्थन करता है। नीचे दिए गए बटनों पर क्लिक करके देखें!"

greetings_help_msg: "अपने ग्रुप में नए सदस्यों का स्वागत करें या उनके जाने के बाद अलविदा कहें!


  *एडमिन कमांड:*

  × /setwelcome `<reply/text>`: ग्रुप के लिए स्वागत टेक्स्ट सेट करें।

  × /welcome `<yes/no/on/off>`: ग्रुप के लिए स्वागत सेटिंग सक्षम या अक्षम करें।

  × /resetwelcome: स्वागत संदेश को डिफ़ॉल्ट पर रीसेट करें।

  × /setgoodbye `<reply/text>`: ग्रुप के लिए अलविदा टेक्स्ट सेट करें।

  × /goodbye `<yes/no/on/off>`: ग्रुप के लिए अलविदा सेटिंग सक्षम या अक्षम करें।

  × /resetgoodbye: अलविदा संदेश को डिफ़ॉल्ट पर रीसेट करें।

  × /cleanservice `<yes/no/on/off>`: सभी सेवा संदेशों को हटाएं जैसे 'x ने ग्रुप में शामिल हुआ' सूचना।

  × /cleanwelcome `<yes/no/on/off>`: जब भी कोई नया सदस्य शामिल होता है, पुराने स्वागत संदेश को हटाएं।

  × /autoapprove `<yes/no/on/off>`: सभी नए सदस्यों को स्वचालित रूप से स्वीकृत करें।"

lang_sample: नमस्ते, मैं एक ग्रुप प्रबंधन बॉट हूँ
language_flag: 🇮🇳
language_name: हिन्दी

languages_help_msg: "बॉट की भाषा बदलने में सक्षम नहीं हैं?

  इस मॉड्यूल का उपयोग करके आसानी से बदलें!


  बस /lang टाइप करें और अपने या अपने ग्रुप के लिए भाषा चुनने के लिए इनलाइन कीबोर्ड का उपयोग करें।


  आप [Crowdin](https://crowdin.com/project/alita_robot) पर मदद करके बॉट को और भाषाओं में लाने में हमारी मदद कर सकते हैं"

locks_help_msg: "*केवल एडमिन*:

  × /lock `<permission>`: चैट अनुमति लॉक करें।।

  × /unlock `<permission>`: चैट अनुमति अनलॉक करें।

  × /locks: चैट अनुमति देखें।

  × /locktypes: उपलब्ध लॉक प्रकार देखें!


  लॉक्स का उपयोग ग्रुप के उपयोगकर्ताओं को प्रतिबंधित करने के लिए किया जा सकता है।

  URLs को लॉक करने से URLs वाले सभी संदेश ऑटो-डिलीट हो जाएंगे, स्टिकर्स को लॉक करने से सभी स्टिकर्स हट जाएंगे, आदि।

  बॉट्स को लॉक करने से गैर-एडमिन को चैट में बॉट जोड़ने से रोका जाएगा।


  **उदाहरण:**

  `/lock media`: यह चैट में सभी मीडिया संदेशों को लॉक करता है।"

misc_help_msg: "× /info: अपनी उपयोगकर्ता जानकारी प्राप्त करें, जिसे रिप्लाई के रूप में या उपयोगकर्ता Id या Username पास करके उपयोग किया जा सकता है।

  × /id: वर्तमान ग्रुप id प्राप्त करें। यदि किसी संदेश का जवाब देते हुए उपयोग किया जाए, तो उस उपयोगकर्ता की id प्राप्त करें।

  × /ping: Telegram सर्वर को पिंग करें!

  × /tr <lang code> <msg/reply to message>: संदेश का अनुवाद करें।

  × /removebotkeyboard: आपकी चैट से अटके हुए बॉट कीबोर्ड को हटाता है।

  × /stat: चैट में संदेशों की कुल संख्या की गिनती प्राप्त करें।"

mutes_help_msg: "कभी-कभी उपयोगकर्ता परेशान कर सकते हैं और आप उन्हें चैट में संदेश भेजने से प्रतिबंधित करना चाह सकते हैं, यह मॉड्यूल मदद के लिए यहां है, आप इस मॉड्यूल का उपयोग अपने ग्रुप में सदस्यों को म्यूट करने के लिए कर सकते हैं।


  *म्यूट कमांड:* (केवल एडमिन)

  × /mute <userhandle>: एक उपयोगकर्ता को म्यूट करता है, (हैंडल द्वारा, या रिप्लाई द्वारा)

  × /smute <userhandle>: एक उपयोगकर्ता को चुपचाप म्यूट करता है, ग्रुप में संदेश नहीं भेजता, और आपके कमांड को भी हटा देता है। (हैंडल द्वारा, या रिप्लाई द्वारा)

  × /dmute <userhandle>: एक उपयोगकर्ता को म्यूट करता है और रिप्लाई किए गए संदेश को हटा देता है। (हैंडल द्वारा, या रिप्लाई द्वारा)

  × /tmute <userhandle> x(m/h/d): एक उपयोगकर्ता को `x` समय के लिए म्यूट करता है। (हैंडल द्वारा, या रिप्लाई द्वारा)। m = मिनट, h = घंटे, d = दिन।

  × /unmute <userhandle>: एक उपयोगकर्ता को अनम्यूट करता है। (हैंडल द्वारा, या रिप्लाई द्वारा)"

notes_help_msg: "भविष्य के उपयोगकर्ताओं के लिए नोट्स के साथ डेटा सेव करें!

  नोट्स यादृच्छिक जानकारी के टुकड़ों को सेव करने के लिए बहुत अच्छे हैं; एक फोन नंबर, एक अच्छा gif, एक मजेदार तस्वीर - कुछ भी!

  *उपयोगकर्ता कमांड:*

  - /get <notename>: एक नोट प्राप्त करें।

  - #notename: /get जैसा ही।

  एडमिन कमांड:

  - /save <notename> <note text>: \"word\" नामक एक नया नोट सेव करें। किसी संदेश का जवाब देने से वह संदेश सेव हो जाएगा। मीडिया पर भी काम करता है!

  - /clear <notename>: संबंधित नोट हटाएं।

  - /notes: वर्तमान चैट में सभी नोट्स की सूची।

  - /saved: /notes जैसा ही।

  - /clearall: चैट में सभी नोट्स हटाएं। इसे पूर्ववत नहीं किया जा सकता।"

pins_help_msg: "सभी पिन-संबंधित कमांड यहां पाए जा सकते हैं; एक साधारण पिन किए गए संदेश के साथ अपनी चैट को नवीनतम समाचारों से अपडेट रखें!


  *उपयोगकर्ता कमांड:*

  × /pinned: वर्तमान पिन किया गया संदेश प्राप्त करें।


  *एडमिन कमांड:*

  × /pin: जिस संदेश का आपने जवाब दिया उसे पिन करें। ग्रुप सदस्यों को नोटिफिकेशन भेजने के लिए 'loud' या 'notify' जोड़ें।

  × /pinned: वर्तमान चैट में नवीनतम पिन किया गया संदेश प्राप्त करता है।

  × /permapin <text>: बॉट के माध्यम से एक कस्टम संदेश पिन करें। इस संदेश में मार्कडाउन, बटन और सभी अन्य अच्छी सुविधाएं हो सकती हैं।

  × /unpin: वर्तमान पिन किए गए संदेश को अनपिन करें। यदि रिप्लाई के रूप में उपयोग किया जाए, तो रिप्लाई किए गए संदेश को अनपिन करता है।

  × /unpinall: सभी पिन किए गए संदेशों को अनपिन करें।

  × /antichannelpin <yes/no/on/off>: लिंक किए गए चैनलों को टेलीग्राम को ऑटो-पिन न करने दें। यदि कोई तर्क नहीं दिए गए हैं, तो वर्तमान सेटिंग दिखाएं।

  × /cleanlinked <yes/no/on/off>: लिंक किए गए चैनल द्वारा भेजे गए संदेशों को हटाएं।

  नोट: एंटी चैनल पिन का उपयोग करते समय, मैन्युअल रूप से करने के बजाय /unpin कमांड का उपयोग करना सुनिश्चित करें। अन्यथा, जब चैनल कोई संदेश भेजता है तो पुराना संदेश फिर से पिन हो जाएगा।"

purges_help_msg: "*केवल एडमिन:*

  - /purge: इस और रिप्लाई किए गए संदेश के बीच के सभी संदेशों को हटाता है।

  - /del: जिस संदेश का आपने जवाब दिया उसे हटाता है।


  *उदाहरण*:

  - रिप्लाई किए गए संदेश से अब तक के सभी संदेश हटाएं।

  -> `/purge`"

reports_help_msg: "हम सभी व्यस्त लोग हैं जिनके पास 24/7 अपने ग्रुप की निगरानी करने का समय नहीं है। लेकिन अगर आपके ग्रुप में कोई स्पैम कर रहा है तो आप कैसे प्रतिक्रिया करते हैं?


  × /report `<reason>`: एडमिन को रिपोर्ट करने के लिए संदेश का जवाब दें।

  - @admin: /report जैसा ही लेकिन कमांड नहीं।


  *केवल एडमिन:*

  × /reports `<on/off/yes/no>`: रिपोर्ट सेटिंग बदलें, या वर्तमान स्थिति देखें।

  - यदि PM में किया गया, तो आपकी स्थिति टॉगल करता है।

  - यदि ग्रुप में, तो उस ग्रुप की स्थिति टॉगल करता है।

  × /reports `block` (केवल रिप्लाई द्वारा): एक उपयोगकर्ता को /report या @admin का उपयोग करने से ब्लॉक करें।

  × /reports `unblock` (केवल रिप्लाई द्वारा): एक उपयोगकर्ता को /report या @admin का उपयोग करने से अनब्लॉक करें।

  × /reports `showblocklist`: उन सभी ब्लॉक किए गए उपयोगकर्ताओं की जांच करें जो /report या @admin का उपयोग नहीं कर सकते।


  किसी उपयोगकर्ता को रिपोर्ट करने के लिए, बस उनके संदेश का @admin या /report के साथ जवाब दें; Natalie तब एक संदेश के साथ जवाब देगी जिसमें बताया जाएगा कि एडमिन को सूचित कर दिया गया है।

  आपको रिपोर्ट करने के लिए किसी संदेश का जवाब देना होगा; आप बिना किसी कारण के एडमिन को टैग करने के लिए @admin का उपयोग नहीं कर सकते!


  *नोट:* एडमिन द्वारा उपयोग किए जाने पर इनमें से कोई भी ट्रिगर नहीं होगा।"

rules_help_msg: "हर चैट अलग-अलग नियमों के साथ काम करती है; यह मॉड्यूल उन नियमों को स्पष्ट करने में मदद करेगा!

  *उपयोगकर्ता कमांड*:

  × /rules: वर्तमान चैट नियम देखें।

  *एडमिन कमांड*:

  × /setrules `<text>`: इस चैट के लिए नियम सेट करें।

  × /privaterules `<yes/no/on/off>`: सक्षम/अक्षम करें कि नियम प्राइवेट में भेजे जाने चाहिए या नहीं।

  × /resetrules: चैट नियमों को डिफ़ॉल्ट पर रीसेट करें

  × /rulesbtn `<custom text>`: नियम बटन का टेक्स्ट सेट करें।

  × /resetrulesbutton: नियम बटन के टेक्स्ट को डिफ़ॉल्ट पर रीसेट करें।

  × /resetrulesbtn: ऊपर जैसा ही।"

warns_help_msg: "चेतावनियों के साथ अपने सदस्यों को नियंत्रण में रखें; उन्हें नियंत्रण से बाहर होने से रोकें!

  यदि आप स्वचालित चेतावनियों की तलाश में हैं, तो ब्लैकलिस्ट मॉड्यूल के बारे में पढ़ें!


  *एडमिन कमांड:*

  - /warn <reason>: एक उपयोगकर्ता को चेतावनी दें।

  - /dwarn <reason>: रिप्लाई द्वारा एक उपयोगकर्ता को चेतावनी दें, और उनका संदेश हटाएं।

  - /swarn <reason>: एक उपयोगकर्ता को चुपचाप चेतावनी दें, और अपना संदेश हटाएं।

  - /warns: एक उपयोगकर्ता की चेतावनियां देखें।

  - /rmwarn: एक उपयोगकर्ता की नवीनतम चेतावनी हटाएं।

  - /resetwarn: एक उपयोगकर्ता की सभी चेतावनियों को 0 पर रीसेट करें।

  - /resetallwarns: चैट में सभी चेतावनियां हटाएं। सभी उपयोगकर्ता 0 चेतावनियों पर वापस आ जाते हैं।

  - /warnings: चैट की चेतावनी सेटिंग्स प्राप्त करें।

  - /setwarnmode <ban/kick/mute>: चैट का चेतावनी मोड सेट करें।

  - /setwarnlimit <number>: उपयोगकर्ताओं को दंडित करने से पहले चेतावनियों की संख्या सेट करें।"

antispam_help_msg: |
  एंटीस्पैम मॉड्यूल आपके ग्रुप्स के लिए स्वचालित, बैकग्राउंड स्पैम सुरक्षा प्रदान करता है।

  अन्य मॉड्यूल के विपरीत, यह बिना किसी उपयोगकर्ता कमांड की आवश्यकता के स्वचालित रूप से काम करता है।

  <b>यह कैसे काम करता है:</b>
  प्रति-उपयोगकर्ता-प्रति-चैट रेट लिमिटिंग स्वचालित रूप से स्पैम को रोकती है।
  • <b>रेट लिमिट:</b> प्रति सेकंड प्रति उपयोगकर्ता प्रति चैट 18 संदेश
  • <b>स्वचालित:</b> कोई कॉन्फ़िगरेशन आवश्यक नहीं - बॉक्स से बाहर काम करता है
  • <b>पारदर्शी:</b> सामान्य उपयोगकर्ताओं को बाधित किए बिना चुपचाप अतिरिक्त संदेशों को हटाता है
  • <b>प्रति-उपयोगकर्ता ट्रैकिंग:</b> कई वैध उपयोगकर्ताओं वाले व्यस्त ग्रुप झूठी सकारात्मक ट्रिगर नहीं करेंगे

