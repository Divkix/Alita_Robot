disabling_invalid_option: "मैं केवल इन विकल्पों को समझता हूं: `yes`/`no`/`on`/`off`"
disabling_extended_docs: |
  <b>मुख्य विशेषताएं:</b>
  • गैर-एडमिन उपयोगकर्ताओं के लिए विशिष्ट बॉट कमांड अक्षम करें
  • एडमिन हमेशा अक्षम कमांड को बायपास कर सकते हैं
  • अक्षम कमांड संदेशों का वैकल्पिक स्वचालित विलोपन
  • एक साथ कई कमांड अक्षम करने का समर्थन

  <b>कई कमांड अक्षम करें:</b>
  <code>/disable adminlist rules info</code>
  एक साथ <code>/adminlist</code>, <code>/rules</code>, और <code>/info</code> कमांड अक्षम करता है।

  <b>कमांड विलोपन टॉगल करें:</b>
  <code>/disabledel on</code> - अक्षम संदेश अब हटा दिए जाएंगे।
  <code>/disabledel off</code> - अक्षम संदेश अब हटाए नहीं जाएंगे।
  <code>/disabledel</code> - वर्तमान विलोपन सेटिंग जांचें।
disabling_notes_docs: |
  <b>महत्वपूर्ण नोट्स:</b>
  • <b>एडमिन बायपास:</b> अक्षम कमांड केवल गैर-एडमिन उपयोगकर्ताओं को प्रभावित करते हैं। सभी एडमिन अभी भी किसी भी कमांड का उपयोग कर सकते हैं।
  • <b>कनेक्शन समर्थन:</b> अक्षम कमांड अभी भी जुड़े हुए चैट के लिए <code>/connect</code> सुविधा के माध्यम से सुलभ हैं।
  • <b>कई कमांड:</b> <code>/disable</code> और <code>/enable</code> दोनों एक ही संदेश में कई कमांड नामों का समर्थन करते हैं।
  • <b>त्रुटि हैंडलिंग:</b> यदि कुछ कमांड अक्षम/सक्षम करने में विफल होते हैं, तो आपको सूचित किया जाएगा कि कौन से सफल हुए और कौन से विफल।

  <b>आवश्यक अनुमतियां:</b>
  • <code>/disable</code>, <code>/enable</code>, <code>/disabledel</code>: केवल एडमिन
  • <code>/disableable</code>, <code>/disabled</code>: सभी उपयोगकर्ता (लेकिन <code>/disabled</code> अक्षम किया जा सकता है)

