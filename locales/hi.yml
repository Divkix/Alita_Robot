admin_extended_docs: |
  <b>गुमनाम एडमिन सपोर्ट</b>

  <code>/anonadmin</code> कमांड ग्रुप मालिकों को गुमनाम एडमिन पहचान को टॉगल करने की अनुमति देता है:
  <code>/anonadmin on</code> - गुमनाम एडमिन जांच सक्षम करें
  <code>/anonadmin off</code> - गुमनाम एडमिन जांच अक्षम करें

  सक्षम होने पर, बॉट गुमनाम खातों से एडमिन कार्यों के लिए सत्यापन का अनुरोध करेगा।

  <b>गुमनाम एडमिन सत्यापन कैसे काम करता है:</b>
  1. बॉट पता लगाता है कि प्रेषक GroupAnonymousBot है
  2. मूल संदेश 20-सेकंड TTL के साथ कैश किया गया
  3. चैट में "एडमिन सत्यापित करें" बटन भेजा गया
  4. क्लिक करने वाले उपयोगकर्ता को एडमिन के रूप में सत्यापित किया गया, कमांड निष्पादित
  5. यदि सत्यापित नहीं किया गया तो बटन 20 सेकंड बाद समाप्त हो जाता है

  <b>समर्थित कमांड:</b>
  एडमिन: /promote, /demote, /title
  प्रतिबंध: /ban, /dban, /sban, /tban, /unban
  म्यूट: /mute, /smute, /dmute, /tmute, /unmute
  पिन: /pin, /unpin, /permapin, /unpinall
  पर्ज: /purge, /del
  चेतावनी: /warn, /swarn, /dwarn

admin_notes_docs: |
  <b>सुरक्षा नोट्स</b>
  • इंजेक्शन हमलों को रोकने के लिए सभी उपयोगकर्ता-नियंत्रित इनपुट HTML-एस्केप किए गए हैं
  • एडमिन अनुमति परिवर्तन उचित त्रुटि हैंडलिंग और पैनिक रिकवरी के साथ चलते हैं

