# This is to run the alita-robot in debug mode with alpine image
# This starts up fast and does not do any optimizations
services:
  alita:
    build:
      context: .
      dockerfile: docker/alpine.debug
    container_name: alita-robot
    restart: always
    env_file:
      - .env
    environment:
      MONGO_DB_URL: mongodb://mongo:27017/alita_robot
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:latest
    container_name: alita-mongo-debug
    restart: always
    env_file:
      - .env
    volumes:
      - mongo_debug_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    # no ports published; internal use

volumes:
  mongo_debug_data:
  telegram-bot-api-data:
